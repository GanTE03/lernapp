<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infor LN Cloud — Lern-App (153 Fragen)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F8F7F4;color:#1a1a1a;min-height:100vh;}
.app{max-width:560px;margin:0 auto;padding:20px 16px 40px;}
button{font-family:inherit;cursor:pointer;}
select{font-family:inherit;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;letter-spacing:0.02em;white-space:nowrap;}
.card-flat{background:#F1EFE8;border:none;border-radius:12px;padding:14px 16px;}
.pbar{height:4px;border-radius:2px;background:#e8e6e1;overflow:hidden;margin-bottom:18px;}
.pbar-fill{height:100%;border-radius:2px;transition:width 0.35s ease;}
.opt-btn{width:100%;text-align:left;padding:10px 13px;border-radius:10px;border:1.5px solid #e8e6e1;background:#fff;font-size:13px;line-height:1.45;display:flex;align-items:center;gap:9px;transition:all 0.15s;color:#1a1a1a;}
.opt-btn:hover:not(:disabled){border-color:#b8b5ae;background:#faf9f6;}
.opt-btn.selected{border-color:#3B7BE8;background:#EBF2FD;}
.opt-btn.correct{border-color:#1D9E75;background:#E8F5EC;}
.opt-btn.wrong{border-color:#E24B4A;background:#FDF0F0;}
.opt-btn.dimmed{opacity:0.45;}
.indicator{width:18px;height:18px;border-radius:99px;border:1.5px solid #c5c3bc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:all 0.15s;}
.indicator.multi{border-radius:4px;}
.indicator.active{background:#3B7BE8;border-color:#3B7BE8;}
.order-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.order-arrows{display:flex;flex-direction:column;gap:2px;}
.arrow-btn{width:26px;height:20px;border:1px solid #e8e6e1;border-radius:5px;background:#fff;font-size:10px;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
.arrow-btn:hover:not(:disabled){background:#f0efe8;border-color:#c5c3bc;}
.arrow-btn:disabled{opacity:0.25;cursor:default;}
.order-item{flex:1;padding:9px 12px;border-radius:9px;border:1.5px solid #e8e6e1;background:#fff;font-size:12.5px;line-height:1.4;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.order-item.correct{border-color:#1D9E75;background:#E8F5EC;}
.order-item.wrong{border-color:#E24B4A;background:#FDF0F0;}
.order-num{width:22px;height:22px;border-radius:6px;background:#F1EFE8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#888;flex-shrink:0;}
.match-block{margin-bottom:10px;}
.match-label{font-size:13px;font-weight:500;margin-bottom:4px;}
.match-select{width:100%;padding:8px 10px;border-radius:9px;font-size:12px;border:1.5px solid #e8e6e1;background:#fff;color:#1a1a1a;appearance:auto;}
.match-select.correct{border-color:#1D9E75;background:#E8F5EC;}
.match-select.wrong{border-color:#E24B4A;background:#FDF0F0;}
.match-hint{font-size:11px;color:#1D9E75;margin-top:2px;}
.btn{padding:8px 20px;border-radius:9px;font-size:13px;font-weight:500;border:1.5px solid #c5c3bc;background:#fff;color:#1a1a1a;transition:all 0.15s;}
.btn:hover{background:#f0efe8;}
.btn:disabled{opacity:0.35;cursor:default;background:#fff;}
.btn-primary{border-color:#3B7BE8;background:#EBF2FD;color:#1B5EC2;}
.btn-primary:hover{background:#d9e8fc;}
.btn-danger{border-color:#E24B4A;background:#FDF0F0;color:#6E1616;}
.feedback{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:12.5px;line-height:1.55;}
.feedback.ok{background:#E8F5EC;color:#0F5132;}
.feedback.fail{background:#FDF0F0;color:#6E1616;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.nav-back{font-size:12px;color:#888;background:none;border:none;padding:0;}
.nav-back:hover{color:#555;}
.nav-info{font-size:12px;color:#888;display:flex;gap:10px;align-items:center;}
.timer{font-family:'DM Sans',monospace;letter-spacing:0.04em;}
.result-ring{position:relative;width:80px;height:80px;}
.result-ring svg{transform:rotate(-90deg);}
.result-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:600;}
.cat-bar{margin-bottom:8px;}
.cat-bar-track{height:5px;border-radius:3px;background:#e8e6e1;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.menu-card{padding:16px;border-radius:12px;border:1.5px solid #e8e6e1;background:#fff;text-align:left;transition:all 0.15s;}
.menu-card:hover{border-color:#c5c3bc;background:#faf9f6;}
.menu-card h3{font-size:14px;font-weight:500;margin-bottom:3px;}
.menu-card p{font-size:11px;color:#888;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.ov-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
.ov-stat{background:#fff;border:1.5px solid #e8e6e1;border-radius:10px;padding:12px;text-align:center;}
.ov-stat-val{font-size:20px;font-weight:600;margin-bottom:2px;}
.ov-stat-lbl{font-size:11px;color:#888;}
.ov-cat{margin-bottom:14px;}
.ov-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.ov-dot{width:30px;height:30px;border-radius:7px;border:1.5px solid #e8e6e1;background:#fff;font-size:10px;font-weight:500;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.12s;cursor:pointer;}
.ov-dot:hover{border-color:#b8b5ae;transform:scale(1.08);}
.ov-dot.ok{background:#E8F5EC;border-color:#1D9E75;color:#0F5132;}
.ov-dot.fail{background:#FDF0F0;border-color:#E24B4A;color:#6E1616;}
.ov-dot.current{border-color:#3B7BE8;box-shadow:0 0 0 2px #3B7BE844;}
.ov-legend{display:flex;gap:14px;margin-bottom:18px;font-size:11px;color:#888;}
.ov-legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle;}
@media(max-width:480px){.app{padding:14px 12px 30px;}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const Q=[{"id": "m1", "type": "single", "cat": "Manufacturing", "q": "What is a production order in LN?", "opts": ["A request to purchase raw materials from a supplier", "An order comprising the instruction to produce an item and the conditions under which manufacturing takes place (routing, delivery date, order quantity)", "A document used exclusively for quality inspection", "A shipping instruction for finished goods"], "cor": 1, "exp": "A production order comprises the order to produce an item and the conditions under which manufacturing takes place."}, {"id": "m2", "type": "single", "cat": "Manufacturing", "q": "How are production orders typically originated in LN?", "opts": ["Always manually by shop floor workers", "Generated from Enterprise Planning and Warehousing, then transferred to Production Orders session", "Imported from external ERP systems only", "Created automatically by the CRM module"], "cor": 1, "exp": "Usually generated from Enterprise Planning and Warehousing, then transferred to the Production Orders session."}, {"id": "m3", "type": "single", "cat": "Manufacturing", "q": "Which two LN sessions can be used to create a BOM?", "opts": ["Item Master and Cost Calculation", "Production Item 360 and Bill of Material", "Work Center and Routing", "Enterprise Planning and Inventory"], "cor": 1, "exp": "Production Item 360 und Bill of Material."}, {"id": "m4", "type": "multi", "cat": "Manufacturing", "q": "Which master data must be created for the shop floor layout? (Select all)", "opts": ["Work centers", "Employees", "Machine capacity groups", "Sales territories", "Machine types", "Reference operations"], "cor": [0, 1, 2, 4, 5], "exp": "Work centers, employees, machine capacity groups, machine types, reference operations."}, {"id": "m5", "type": "order", "cat": "Manufacturing", "q": "Reorder: Calculate cost/valuation prices (1-3):", "items": ["Calculate standard costs for main item and subassemblies", "Update the standard costs", "Print the standard cost calculation"], "corOrd": [0, 1, 2], "exp": "Calculate → Update → Print."}, {"id": "m6", "type": "order", "cat": "Manufacturing", "q": "Reorder: Production order with manual material issue (1-9):", "items": ["Create production order", "Print documents and release order", "Initiate material from production order", "Generate and release outbound advice", "Report operation complete", "Register hours", "Report order completed", "Process warehouse receipt", "Close production order"], "corOrd": [0, 1, 2, 3, 4, 5, 6, 7, 8], "exp": "Create → Print/Release → Material → Outbound → Report Op → Hours → Report Order → Receipt → Close."}, {"id": "m7", "type": "single", "cat": "Manufacturing", "q": "Which two check boxes enable direct processing of materials in Item – Production?", "opts": ["Allow Backflushing and Backflush Materials", "Direct Initiate Inventory Issue and Direct Process Warehouse Order Line", "Auto Release and Auto Complete", "Material Planning and Auto Allocate"], "cor": 1, "exp": "Direct Initiate Inventory Issue und Direct Process Warehouse Order Line."}, {"id": "m8", "type": "single", "cat": "Manufacturing", "q": "After recording time via Setup button in JSC Operator Workbench, where is it registered?", "opts": ["Work Center Hours session", "Production Order Hours session", "Employee Time Registration", "Machine Utilization session"], "cor": 1, "exp": "In der Production Order Hours session."}, {"id": "m9", "type": "multi", "cat": "Manufacturing", "q": "To enable backflushing, which check boxes are needed? (Select all)", "opts": ["Allow backflushing as material", "Backflush materials", "Backflush hours", "Direct Initiate Inventory Issue", "Auto Release Order"], "cor": [0, 1, 2], "exp": "Allow backflushing as material, Backflush materials, Backflush hours."}, {"id": "m10", "type": "order", "cat": "Manufacturing", "q": "Reorder: Production order with backflushing (1-5):", "items": ["Create production order", "Print documents and release order", "Report order completed", "Backflush materials and hours", "Close production order"], "corOrd": [0, 1, 2, 3, 4], "exp": "Create → Print/Release → Report Complete → Backflush → Close."}, {"id": "m11", "type": "multi", "cat": "Manufacturing", "q": "Which master data must be configured to use subcontracting? (Select all)", "opts": ["Subcontracting with Material Flow check box in Implemented Software Components", "Subcontractor business partner data", "Subcontractor warehouse linked to external site", "Automatic procedure for warehouse receipt", "Employee shift schedules for subcontractors", "Purchase order type for subcontracting with material flow"], "cor": [0, 1, 2, 3, 5], "exp": "Subcontracting checkbox, BP data, warehouse, receipt procedure, PO type — not employee shifts."}, {"id": "m12", "type": "single", "cat": "Manufacturing", "q": "What does subcontracting with material support in LN include?", "opts": ["Only outsourcing work to a subcontractor", "Outsourcing work plus supply and receipt of required material, with LN supporting physical and administrative flow", "Only tracking costs of external work", "Automatically creating purchase orders for raw materials"], "cor": 1, "exp": "Includes outsourcing work AND supply/receipt of material. LN supports the full physical and administrative flow."}, {"id": "m13", "type": "single", "cat": "Manufacturing", "q": "What is the purpose of EP order groups?", "opts": ["Group sales orders by customer", "Collectively confirm or transfer planned production orders", "Organize warehouse locations", "Manage employee shifts"], "cor": 1, "exp": "EP order groups enable collective confirmation or transfer of planned production orders."}, {"id": "m14", "type": "order", "cat": "Manufacturing", "q": "Reorder: Create an EP order group (1-3):", "items": ["Create planned production orders", "Create an order group for planned production orders", "Assign planned orders to order group"], "corOrd": [0, 1, 2], "exp": "Create Orders → Create Group → Assign."}, {"id": "m15", "type": "single", "cat": "Manufacturing", "q": "What is the purpose of JSC order groups?", "opts": ["To automatically generate production orders from sales", "A group of production orders to carry out actions on all orders simultaneously", "To link production orders to quality inspections", "To schedule machine maintenance"], "cor": 1, "exp": "JSC order group = group of production orders for simultaneous action processing."}, {"id": "m16", "type": "order", "cat": "Manufacturing", "q": "Reorder: Process JSC order groups (1-4):", "items": ["Print and release production orders", "Report operations completed by group", "Report orders completed globally", "Close production orders"], "corOrd": [0, 1, 2, 3], "exp": "Print/Release → Report Ops → Report Orders → Close."}, {"id": "m17", "type": "single", "cat": "Manufacturing", "q": "What is unit effectivity?", "opts": ["Employee effectiveness metrics", "Method to control validity of variations on an end item for pegging/exceptions", "Machine uptime measurement", "Standard cost per unit calculation"], "cor": 1, "exp": "Controls validity of variations on an end item — for pegging or modeling exceptions."}, {"id": "m18", "type": "order", "cat": "Manufacturing", "q": "Reorder: Logistics process with unit effectivity (1-5):", "items": ["Create and process sales order", "Generate and process production orders", "Generate and release outbound advice", "Pack and ship items", "Create invoice"], "corOrd": [0, 1, 2, 3, 4], "exp": "Sales → Production → Outbound → Ship → Invoice."}, {"id": "m19", "type": "order", "cat": "Manufacturing", "q": "Reorder: Define a tool for production (1-5):", "items": ["Create tool using Items session", "Calculate standard cost", "Define tool numbers", "Set status to Active", "Assign tool to an operation"], "corOrd": [0, 1, 2, 3, 4], "exp": "Create → Cost → Numbers → Activate → Assign."}, {"id": "m20", "type": "single", "cat": "Manufacturing", "q": "Why must a receipt line be generated for each tool?", "opts": ["Tools are too expensive for groups", "Tools are serialized items — serial numbers needed at receipt", "Accounting requires individual receipts", "Tools expire and need individual dates"], "cor": 1, "exp": "Tools are serialized items; serial numbers must be generated at receipt."}, {"id": "m21", "type": "multi", "cat": "Manufacturing", "q": "True about JSC module? (Select all)", "opts": ["Allows manual creation/modification of production orders", "Allows automatic creation of production orders", "Can plan production orders", "Can execute production order procedures"], "cor": [0, 2, 3], "exp": "Manual create/modify, plan, execute — NOT auto-create."}, {"id": "m23", "type": "multi", "cat": "Manufacturing", "q": "Identify TRUE statements about production orders:", "opts": ["You can view if a document was printed in Production Orders session", "After reporting completed, you can no longer process materials or hours", "Only Completed production orders can be closed"], "cor": [0, 2], "exp": "Statement 1 (T) and 3 (T) are true. Statement 2 is False — you CAN still process after reporting complete."}, {"id": "m24", "type": "multi", "cat": "Manufacturing", "q": "What does JSC Operator Workbench allow? (Select all)", "opts": ["Record setup and run times", "Register completed and rejected quantities", "Report operations complete", "View production order operation data", "Filter and sort operation data", "Create new item master records"], "cor": [0, 1, 2, 3, 4], "exp": "Record times, register qtys, report ops, view data, filter/sort — NOT create item masters."}, {"id": "m25", "type": "single", "cat": "Manufacturing", "q": "What is backflushing?", "opts": ["Manual inventory count at shift end", "Automatic issue of materials/hours based on theoretical usage and reported qty", "Quality inspection after production", "Reversing a completed order"], "cor": 1, "exp": "Automatic material issue or hour accounting based on theoretical usage."}, {"id": "m26", "type": "single", "cat": "Manufacturing", "q": "What is the purpose of a subcontracting model in LN?", "opts": ["To define employee roles in subcontracting", "Contains all data needed for subcontracting; managed via Subcontracting Models session (tisub1100m000)", "To calculate subcontractor invoices", "To track subcontractor delivery performance"], "cor": 1, "exp": "A subcontracting model contains all data needed for subcontracting manufacture of subassemblies or end product."}, {"id": "m27", "type": "single", "cat": "Manufacturing", "q": "Two ways to create JSC order groups?", "opts": ["Via CRM or email", "Directly in JSC module or automatically from EP transfer", "Only manually", "Through Warehouse or Quality"], "cor": 1, "exp": "Directly in JSC or automatically when transferring from EP."}, {"id": "m28", "type": "order", "cat": "Manufacturing", "q": "Reorder: Create a requirement for unit effectivity (1-3):", "items": ["Create a new requirement in the Requirements session", "Define the upgrade price for the end item", "Assign the requirement to the end item using Item – Requirements session"], "corOrd": [0, 1, 2], "exp": "Create requirement → Define price → Assign to end item."}, {"id": "m29", "type": "single", "cat": "Manufacturing", "q": "Purpose of tools planning?", "opts": ["Order new tools", "Estimate tools needed and check availability using Estimated Tool Requirements session", "Schedule maintenance", "Calculate depreciation"], "cor": 1, "exp": "Estimate tool requirements and check availability."}, {"id": "p1", "type": "multi", "cat": "Planning", "q": "Which describe a planning system? (Select all)", "opts": ["Monitors demand/supply changes and balances requirements", "Isolated, not integrated with materials management", "Integral part of overall materials management", "Static system that doesn't change"], "cor": [0, 2], "exp": "Monitors changes and is integral to materials management."}, {"id": "p2", "type": "single", "cat": "Planning", "q": "What does EP generate for master/detailed planning?", "opts": ["Sales quotation", "Planning run", "Quality report", "Shipping manifest"], "cor": 1, "exp": "Planning run."}, {"id": "p3", "type": "single", "cat": "Planning", "q": "What is the input and output of the planning process?", "opts": ["Input: customer orders only; Output: shipping schedules", "Input: demand and supply data; Output: recommendations that become input for the next planning run", "Input: financial budgets; Output: cost reports", "Input: warehouse data; Output: inventory adjustments"], "cor": 1, "exp": "Demand/supply data is analyzed, recommendations generated — outputs become input for next planning run."}, {"id": "p4", "type": "match", "cat": "Planning", "q": "Match planning methods with descriptions:", "pairs": [{"l": "Capacity requirements planning", "r": "Planned orders result in capacity use of resources"}, {"l": "Order planning", "r": "Like MRP; handles data as orders, second-by-second"}, {"l": "Supply planning", "r": "Supply planned within item's horizon based on forecast"}, {"l": "Master planning", "r": "Like MPS; demand/supply/inventory in time buckets"}], "exp": "CRP=capacity, Order=MRP, Supply=horizon, Master=MPS/buckets."}, {"id": "p5", "type": "multi", "cat": "Planning", "q": "Three types of master data for successful plans?", "opts": ["Scenarios", "Cluster and plan items", "General item data", "Employee schedules", "Customer contacts"], "cor": [0, 1, 2], "exp": "Scenarios, Cluster/Plan Items, General Item Data."}, {"id": "p6", "type": "single", "cat": "Planning", "q": "What does a cluster represent?", "opts": ["Group of employees", "Warehouses near each other at a site/country", "Sales order collection", "Shop floor machines"], "cor": 1, "exp": "One or more warehouses at a particular site or country."}, {"id": "p7", "type": "single", "cat": "Planning", "q": "How are scenarios used in EP?", "opts": ["Track actual costs", "Simulate planning runs for various situations and compare options", "Manage reviews", "Generate invoices"], "cor": 1, "exp": "Simulate planning runs and compare options."}, {"id": "p8", "type": "order", "cat": "Planning", "q": "Reorder: Create a new calendar in EP (1-4):", "items": ["Define calendar code", "Attach availability type to calendar", "Define calendar working hours", "Attach calendar to work center"], "corOrd": [0, 1, 2, 3], "exp": "Code → Availability → Hours → Attach to WC."}, {"id": "p9", "type": "single", "cat": "Planning", "q": "Starting point for attaching calendar to work center?", "opts": ["Calendar Codes", "Work Centers", "EP Parameters", "Items – Planning"], "cor": 1, "exp": "Work Centers session."}, {"id": "p10", "type": "multi", "cat": "Planning", "q": "Order planning combines which? (Select all)", "opts": ["Material requirements planning", "Exception requirements planning", "Distribution requirements planning", "Capacity requirements planning"], "cor": [0, 2, 3], "exp": "MRP, DRP, CRP — not Exception requirements."}, {"id": "p11", "type": "multi", "cat": "Planning", "q": "Order quantity determined by which two settings?", "opts": ["Order method", "Order quantity settings", "Item type", "Planning method"], "cor": [0, 1], "exp": "Order method and Order quantity settings."}, {"id": "p12", "type": "order", "cat": "Planning", "q": "Reorder: Define manufactured item for order planning (1-5):", "items": ["Define new item", "Add safety stock", "Define time fence and horizons", "Define BOM and routing", "Calculate costing data"], "corOrd": [0, 1, 2, 3, 4], "exp": "Item → Safety Stock → Time Fence → BOM/Routing → Costing."}, {"id": "p13", "type": "single", "cat": "Planning", "q": "Default status for transferring planned orders?", "opts": ["Created", "Confirmed", "Released", "Completed"], "cor": 1, "exp": "Confirmed."}, {"id": "p14", "type": "single", "cat": "Planning", "q": "Session for checking ATP/CTP?", "opts": ["Items – Planning", "ATP Handling (cprrp4800m000)", "Order Planning", "Inventory 360"], "cor": 1, "exp": "ATP Handling (cprrp4800m000)."}, {"id": "p15", "type": "single", "cat": "Planning", "q": "How to enter special demand for an order-based item?", "opts": ["Use Sales Orders session", "Use Special Demand by Item (cpdsp2100m000) session", "Use EP Parameters", "Use Forecast session"], "cor": 1, "exp": "Special Demand by Item (cpdsp2100m000)."}, {"id": "p16", "type": "multi", "cat": "Planning", "q": "Exception messages do what? (Select all)", "opts": ["Monitor plan performance", "Identify bottlenecks", "Analyze and solve problems", "Automatically resolve conflicts"], "cor": [0, 1, 2], "exp": "Monitor, identify, analyze — not auto-resolve."}, {"id": "p17", "type": "single", "cat": "Planning", "q": "How to direct an exception message to a specific planner for an item?", "opts": ["Set planner in the Scenario session", "Open Items – Planning detail session and input planner ID in the Planner field", "Assign via the Work Centers session", "Configure in EP Parameters"], "cor": 1, "exp": "Items – Planning detail → Planner field."}, {"id": "p18", "type": "single", "cat": "Planning", "q": "Where is the Master Plan check box?", "opts": ["General tab", "Horizons tab of Items – Planning detail", "EP Parameters", "Scenario session"], "cor": 1, "exp": "Horizons tab of Items – Planning detail session."}, {"id": "p19", "type": "single", "cat": "Planning", "q": "Two ways to define BCM for an item?", "opts": ["Import from Excel or define in Routing", "Define manually or auto-generate via Generate Bill of Critical Materials option", "Copy from another item or use BOM session", "Create in EP or Warehousing"], "cor": 1, "exp": "Manually or auto-generate via Bill of Critical Materials (cprpd3120m000)."}, {"id": "p20", "type": "single", "cat": "Planning", "q": "What is an item master plan?", "opts": ["A list of all items in the system", "An item-specific logistic plan with planning data and targets for sales, supply, and inventory by plan period", "A report of historical item usage", "A quality control plan for manufactured items"], "cor": 1, "exp": "Item-specific overall logistic plan used for master-planning simulations."}, {"id": "p21", "type": "order", "cat": "Planning", "q": "Reorder: Define a product family (1-3):", "items": ["Define plan item in Items – Planning", "Set Plan Item Type to Family", "Define aggregation relationships"], "corOrd": [0, 1, 2], "exp": "Plan Item → Family → Aggregation."}, {"id": "p22", "type": "single", "cat": "Planning", "q": "Two purposes of product families in aggregation relationships?", "opts": ["To manage warehouse locations and track shipments", "To define item demand forecasts on different levels and as a management reporting tool", "To create purchase orders and schedule deliveries", "To calculate standard costs and plan maintenance"], "cor": 1, "exp": "Define demand forecasts on different levels + high-end management reporting."}, {"id": "p23", "type": "single", "cat": "Planning", "q": "How to set a work center as critical?", "opts": ["In Items – Planning", "Planning tab of Work Centers detail → 'Critical in Planning'", "EP Parameters", "Routing session"], "cor": 1, "exp": "Planning tab → Critical in Planning checkbox."}, {"id": "p24", "type": "order", "cat": "Planning", "q": "Reorder: Generate resource master plan (1-5):", "items": ["Start Initialize/Roll/Update Scenario session", "Specify scenario", "Select Generate Resource Master Plan", "Specify resources", "Click Initialize"], "corOrd": [0, 1, 2, 3, 4], "exp": "Start → Scenario → Checkbox → Resources → Initialize."}, {"id": "p25", "type": "single", "cat": "Planning", "q": "Session for viewing resource capacity planning?", "opts": ["Work Center Capacity", "Resource Master Plan (cprmp3501m000)", "CRP", "Items – Planning"], "cor": 1, "exp": "Resource Master Plan (cprmp3501m000)."}, {"id": "p26", "type": "match", "cat": "Planning", "q": "Match supply chain strategy layers:", "pairs": [{"l": "Sourcing strategies", "r": "How LN chooses between sources of supply"}, {"l": "Supply strat "multi", "cat": "Services Procurement", "q": "Business Partner Classifications? (Select all)", "opts": ["Agency labor", "Other", "Equipment supply", "HVAC labor", "Subcontracting"], "cor": [0, 1, 2, 4], "exp": "Agency, Other, Equipment, Subcontracting."}, {"id": "s2", "type": "single", "cat": "Services Procurement", "q": "True/false: Natures of Supply allows you to organize service providers.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s3", "type": "multi", "cat": "Services Procurement", "q": "Subcontracting cost methods? (Select all)", "opts": ["Amount of Time", "Quantity", "Amount Only", "Rate Only"], "cor": [0, 1, 2, 3], "exp": "All four."}, {"id": "s4", "type": "multi", "cat": "Services Procurement", "q": "Two equipment cost methods?", "opts": ["Amount of Time", "Quantity", "Amount Only", "Rate Only"], "cor": [0, 2], "exp": "Amount of Time, Amount Only."}, {"id": "s5", "type": "match", "cat": "Services Procurement", "q": "Match features/sessions:", "pairs": [{"l": "SPO Lines", "r": "Description/Amount/Qty/Qty+Rate/Rate Only"}, {"l": "SPO", "r": "Hiring subcontractors for scopes of work"}, {"l": "Blocking Definitions", "r": "Prevents subcontractor payment"}, {"l": "EPO", "r": "Renting equipment"}], "exp": "Lines=cost types, SPO=hire, Blocking=payment block, EPO=rent."}, {"id": "s6", "type": "single", "cat": "Services Procurement", "q": "True/false: AFP auto-released when date ≥ assessment date.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s7", "type": "single", "cat": "Services Procurement", "q": "True/false: If vendor's assessed values < applied values, a Payless notice must be printed.", "opts": ["True", "False"], "cor": 0, "exp": "True — Payless notice must be printed and contractor must agree."}, {"id": "s8", "type": "single", "cat": "Services Procurement", "q": "True/false: Retention only with final AFP.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s9", "type": "single", "cat": "Services Procurement", "q": "True/false: You can access Initiate Variation Request from the SPO.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s10", "type": "multi", "cat": "Services Procurement", "q": "SPO variation request can? (Select all)", "opts": ["Expand scope", "Decrease scope", "Cancel scope", "Adjust quantities"], "cor": [0, 1, 2, 3], "exp": "All four."}, {"id": "s11", "type": "single", "cat": "Services Procurement", "q": "True/false: EPOs can only be created using project or manual creation.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s12", "type": "multi", "cat": "Services Procurement", "q": "EPO line types? (Select all)", "opts": ["Description Only", "Quantity and Rate", "Quantity Only", "Rate Only"], "cor": [0, 1, 3], "exp": "Description, Qty+Rate, Rate Only — not Qty Only."}, {"id": "s13", "type": "single", "cat": "Services Procurement", "q": "True/false: Equipment Utilization session under Service > Rental > Equipment Rental Workbench.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s14", "type": "multi", "cat": "Services Procurement", "q": "Mandatory EPO fields from service? (Select all)", "opts": ["External Hire checkbox", "Supplier", "External Serial Number", "Rate"], "cor": [0, 1, 2, 3], "exp": "All four mandatory."}];

const CATS=[...new Set(Q.map(q=>q.cat))];
const CC={"Manufacturing":{bg:"#EEEDFE",t:"#3C3489",b:"#AFA9EC"},"Planning":{bg:"#E6F1FB",t:"#0C447C",b:"#85B7EB"},"Project Control":{bg:"#E1F5EE",t:"#085041",b:"#5DCAA5"},"Warehousing":{bg:"#FAEEDA",t:"#633806",b:"#FAC775"},"Infor OS":{bg:"#FAECE7",t:"#712B13",b:"#F0997B"},"Services Procurement":{bg:"#FBEAF0",t:"#72243E",b:"#ED93B1"}};
const TL={single:"Single Choice",multi:"Multiple Choice",order:"Reihenfolge",match:"Zuordnung"};
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function badge(text,bg,color,border){return `<span class="badge" style="background:${bg};color:${color};border:1px solid ${border}">${text}</span>`;}
function $(s){return document.querySelector(s);}

let state={mode:"menu",qs:[],idx:0,ans:{},filter:"all",exam:false,t0:0,timer:null};

function render(){
  const app=document.getElementById("app");
  if(state.mode==="menu") return renderMenu(app);
  if(state.mode==="results") return renderResults(app);
  if(state.mode==="overview") return renderOverview(app);
  renderQuestion(app);
}

function renderMenu(el){
  const fc=state.filter==="all"?Q.length:Q.filter(q=>q.cat===state.filter).length;
  el.innerHTML=`
    <div style="margin-bottom:22px">
      <h1 style="font-size:22px;font-weight:600;margin-bottom:4px">LN Cloud: Manufacturing & Planning</h1>
      <p style="font-size:13px;color:#888">Zertifizierungs-Lernapp — ${Q.length} Fragen, 6 Bereiche</p>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Bereich filtern</label>
      <select id="catFilter" style="width:100%;padding:9px 12px;border-radius:10px;font-size:13px;border:1.5px solid #e8e6e1;background:#fff">
        <option value="all">Alle Bereiche (${Q.length})</option>
        ${CATS.map(c=>`<option value="${c}" ${state.filter===c?"selected":""}>${c} (${Q.filter(q=>q.cat===c).length})</option>`).join("")}
      </select>
    </div>
    <div class="menu-grid">
      <button class="menu-card" id="btnLearn"><h3>Lernmodus</h3><p>Sofortiges Feedback, ${fc} Fragen</p></button>
      <button class="menu-card" id="btnExam"><h3>Prüfungsmodus</h3><p>Timer + Auswertung, ${fc} Fragen</p></button>
    </div>
    <div class="card-flat">
      <div style="font-size:12px;color:#888;margin-bottom:6px">Bereiche</div>
      <div class="tags" style="margin-bottom:6px">${CATS.map(c=>{const col=CC[c];return badge(c+" ("+Q.filter(q=>q.cat===c).length+")",col.bg,col.t,col.b);}).join("")}</div>
      <div class="tags">${Object.entries(TL).map(([k,v])=>badge(v,"#F1EFE8","#444","#B4B2A9")).join("")}</div>
    </div>`;
  $("#catFilter").onchange=e=>{state.filter=e.target.value;render();};
  $("#btnLearn").onclick=()=>startSession(false);
  $("#btnExam").onclick=()=>startSession(true);
}

function startSession(isExam){
  let qs=state.filter==="all"?[...Q]:Q.filter(q=>q.cat===state.filter);
  qs=shuf(qs);
  state={...state,mode:isExam?"exam":"learn",qs,idx:0,ans:{},exam:isExam,t0:Date.now()};
  if(state.timer)clearInterval(state.timer);
  if(isExam){state.timer=setInterval(()=>{const el=$("#timer");if(el){const d=Date.now()-state.t0,m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);el.textContent=m+":"+String(s).padStart(2,"0");}},1000);}
  render();
}

function renderQuestion(el){
  const q=state.qs[state.idx],col=CC[q.cat],total=state.qs.length,done=state.idx in state.ans;
  const pct=((state.idx+1)/total*100).toFixed(1);
  el.innerHTML=`
    <div class="nav">
      <button class="nav-back" id="navMenu">← Menü</button>
      <div class="nav-info">${!state.exam?'<button class="btn" id="ovBtn" style="padding:4px 12px;font-size:11px;border-radius:6px;">Übersicht</button>':''}${state.exam?'<span class="timer" id="timer">0:00</span>':""}<span>${state.idx+1}/${total}</span></div>
    </div>
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:#3B7BE8"></div></div>
    <div class="tags" style="margin-bottom:10px">${badge(TL[q.type],"#F1EFE8","#444","#B4B2A9")} ${badge(q.cat,col.bg,col.t,col.b)}</div>
    <h2 style="font-size:15px;font-weight:500;line-height:1.5;margin-bottom:14px">${q.q}</h2>
    <div id="qBody"></div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn" id="prevBtn" ${state.idx===0?"disabled":""}>← Zurück</button>
      <button class="btn btn-primary" id="nextBtn" ${!done?"disabled":""}>${state.idx===total-1&&state.exam?"Auswerten":"Weiter →"}</button>
    </div>`;
  $("#navMenu").onclick=()=>{clearInterval(state.timer);state.mode="menu";render();};
  const ovb=$("#ovBtn");if(ovb)ovb.onclick=()=>{state.mode="overview";render();};
  $("#prevBtn").onclick=()=>{if(state.idx>0){state.idx--;render();}};
  $("#nextBtn").onclick=()=>{if(state.idx<total-1){state.idx++;render();}else if(state.exam){clearInterval(state.timer);state.mode="results";render();}};
  if(q.type==="single"||q.type==="multi") renderChoice(q,done);
  else if(q.type==="order") renderOrder(q,done);
  else if(q.type==="match") renderMatch(q,done);
}

function renderChoice(q,done){
  const isM=q.type==="multi";let sel=isM?[]:-1;const body=$("#qBody");
  function draw(){
    body.innerHTML=(isM?'<p style="font-size:12px;color:#888;margin-bottom:6px">Mehrere Antworten möglich</p>':"")+
      q.opts.map((o,i)=>{const isSel=isM?sel.includes(i):sel===i;let cls="opt-btn";if(!done&&isSel)cls+=" selected";if(done){const ic=isM?q.cor.includes(i):q.cor===i;const wp=isM?sel.includes(i):sel===i;if(ic)cls+=" correct";else if(wp)cls+=" wrong";else cls+=" dimmed";}return `<button class="${cls}" data-i="${i}"><span class="indicator${isM?" multi":""}${isSel?" active":""}"></span>${o}</button>`;}).join("")+
      (!done?`<button class="btn" id="checkBtn" style="margin-top:10px" ${(isM?sel.length===0:sel===-1)?"disabled":""}>Prüfen</button>`:"")+
      (done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".opt-btn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;if(isM){sel.includes(i)?sel=sel.filter(x=>x!==i):sel.push(i);}else sel=i;draw();});const cb=body.querySelector("#checkBtn");if(cb)cb.onclick=()=>{let c;if(isM){const s=[...sel].sort(),cr=[...q.cor].sort();c=s.length===cr.length&&s.every((v,i)=>v===cr[i]);}else c=sel===q.cor;state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderOrder(q,done){
  let items=done?q._userOrder||shuf(q.items):shuf(q.items);if(!done)q._userOrder=items;const body=$("#qBody");
  function draw(){
    body.innerHTML='<p style="font-size:12px;color:#888;margin-bottom:6px">Mit Pfeilen sortieren</p>'+items.map((item,i)=>{let cls="order-item";if(done){cls+=q.items[q.corOrd[i]]===item?" correct":" wrong";}return `<div class="order-row"><div class="order-arrows"><button class="arrow-btn" data-d="up" data-i="${i}" ${done||i===0?"disabled":""}>▲</button><button class="arrow-btn" data-d="dn" data-i="${i}" ${done||i===items.length-1?"disabled":""}>▼</button></div><div class="${cls}"><span class="order-num">${i+1}</span>${item}</div></div>`;}).join("")+(!done?'<button class="btn" id="checkBtn" style="margin-top:8px">Prüfen</button>':"")+(done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".arrow-btn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i,d=b.dataset.d==="up"?-1:1,t=i+d;if(t<0||t>=items.length)return;[items[i],items[t]]=[items[t],items[i]];q._userOrder=items;draw();});body.querySelector("#checkBtn").onclick=()=>{const c=items.every((item,i)=>q.items[q.corOrd[i]]===item);state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderMatch(q,done){
  const rights=shuf(q.pairs.map(p=>p.r));let asgn={};const body=$("#qBody");
  function draw(){
    const used=Object.values(asgn);
    body.innerHTML='<p style="font-size:12px;color:#888;margin-bottom:6px">Richtige Beschreibung zuordnen</p>'+q.pairs.map((p,i)=>{const ok=done&&asgn[i]===p.r;const cls=done?(ok?"correct":"wrong"):"";return `<div class="match-block"><div class="match-label" style="${done?"color:"+(ok?"#1D9E75":"#E24B4A"):""}">${p.l} ${done?(ok?"✓":"✗"):""}</div><select class="match-select ${cls}" data-i="${i}" ${done?"disabled":""}><option value="">— Bitte wählen —</option>${rights.map(r=>`<option value="${r}" ${asgn[i]===r?"selected":""} ${used.includes(r)&&asgn[i]!==r?"disabled":""}>${r}</option>`).join("")}</select>${done&&!ok?`<div class="match-hint">→ ${p.r}</div>`:""}</div>`;}).join("")+(!done?`<button class="btn" id="checkBtn" style="margin-top:8px" ${Object.keys(asgn).length<q.pairs.length?"disabled":""}>Prüfen</button>`:"")+(done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".match-select").forEach(s=>s.onchange=()=>{const i=+s.dataset.i;if(s.value)asgn[i]=s.value;else delete asgn[i];draw();});const cb=body.querySelector("#checkBtn");if(cb)cb.onclick=()=>{const c=q.pairs.every((p,i)=>asgn[i]===p.r);state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderOverview(el){
  const total=state.qs.length,answered=Object.keys(state.ans).length,score=Object.values(state.ans).filter(Boolean).length,wrong=answered-score,open=total-answered,pct=answered>0?Math.round(score/answered*100):0;
  const catGroups={};state.qs.forEach((q,i)=>{if(!catGroups[q.cat])catGroups[q.cat]=[];catGroups[q.cat].push({q,i});});
  let catHTML=Object.entries(catGroups).map(([cat,items])=>{const cl=CC[cat];const ca=items.filter(x=>x.i in state.ans).length;const cc=items.filter(x=>state.ans[x.i]===true).length;const cp=ca>0?Math.round(cc/ca*100):0;
    return `<div class="ov-cat"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px">${badge(cat,cl.bg,cl.t,cl.b)}<span style="font-size:12px;color:#888">${cc}/${items.length}</span></div>${ca>0?`<span style="font-size:12px;font-weight:500;color:${cp>=80?"#1D9E75":cp>=50?"#EF9F27":"#E24B4A"}">${cp}%</span>`:'<span style="font-size:12px;color:#ccc">—</span>'}</div><div class="ov-grid">${items.map(({q,i})=>{const d=i in state.ans;const cls=d?(state.ans[i]?"ok":"fail"):"";const cur=i===state.idx?"current":"";return `<button class="ov-dot ${cls} ${cur}" data-i="${i}" title="${q.q.substring(0,60)}">${i+1}</button>`;}).join("")}</div>${ca>0?`<div style="height:3px;border-radius:2px;background:#e8e6e1;overflow:hidden;margin-top:4px"><div style="height:100%;width:${items.length>0?(cc/items.length*100):0}%;background:${cl.b};border-radius:2px"></div></div>`:''}</div>`;
  }).join("");
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:20px;font-weight:600">Übersicht</h1><button class="btn" id="ovBack" style="padding:5px 14px;font-size:12px">← Weiterlernen</button></div>
    <div class="ov-stats"><div class="ov-stat"><div class="ov-stat-val" style="color:#1D9E75">${score}</div><div class="ov-stat-lbl">Richtig</div></div><div class="ov-stat"><div class="ov-stat-val" style="color:#E24B4A">${wrong}</div><div class="ov-stat-lbl">Falsch</div></div><div class="ov-stat"><div class="ov-stat-val" style="color:#888">${open}</div><div class="ov-stat-lbl">Offen</div></div></div>
    ${answered>0?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:12px 14px;border-radius:10px;background:#fff;border:1.5px solid #e8e6e1"><div style="position:relative;width:48px;height:48px;flex-shrink:0"><svg width="48" height="48" style="transform:rotate(-90deg)"><circle cx="24" cy="24" r="20" fill="none" stroke="#e8e6e1" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A"}" stroke-width="4" stroke-dasharray="${2*3.14159*20}" stroke-dashoffset="${2*3.14159*20-(pct/100)*2*3.14159*20}" stroke-linecap="round"/></svg><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:600">${pct}%</span></div><div><div style="font-size:13px;font-weight:500">${score} von ${answered} richtig</div><div style="font-size:11px;color:#888">${open} Fragen offen</div></div></div>`:''}
    <div class="ov-legend"><span><span class="ov-legend-dot" style="background:#1D9E75"></span>Richtig</span><span><span class="ov-legend-dot" style="background:#E24B4A"></span>Falsch</span><span><span class="ov-legend-dot" style="background:#e8e6e1"></span>Offen</span><span><span class="ov-legend-dot" style="background:transparent;border:2px solid #3B7BE8;width:8px;height:8px"></span>Aktuell</span></div>
    ${catHTML}
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn" id="ovMenu" style="flex:1">Menü</button>${wrong>0?`<button class="btn btn-danger" id="ovRetry" style="flex:1">Nur Fehler (${wrong})</button>`:''}</div>`;
  $("#ovBack").onclick=()=>{state.mode="learn";render();};
  $("#ovMenu").onclick=()=>{state.mode="menu";render();};
  const rw=$("#ovRetry");if(rw)rw.onclick=()=>{const wqs=Object.entries(state.ans).filter(([k,v])=>!v).map(([k])=>state.qs[+k]);state.qs=shuf(wqs);state.idx=0;state.ans={};state.mode="learn";render();};
  el.querySelectorAll(".ov-dot").forEach(d=>d.onclick=()=>{state.idx=+d.dataset.i;state.mode="learn";render();});
}

function renderResults(el){
  const score=Object.values(state.ans).filter(Boolean).length,total=state.qs.length,pct=total?Math.round(score/total*100):0;
  const d=Date.now()-state.t0,m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);
  const col=pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";const r=37,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  let catHTML=CATS.filter(c=>state.qs.some(q=>q.cat===c)).map(c=>{const cq=state.qs.map((q,i)=>({q,i})).filter(x=>x.q.cat===c);const cs=cq.filter(x=>state.ans[x.i]).length;const cl=CC[c];return `<div class="cat-bar"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">${badge(c,cl.bg,cl.t,cl.b)}<span style="font-size:12px;color:#888">${cs}/${cq.length}</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${cq.length?(cs/cq.length*100):0}%;background:${cl.b}"></div></div></div>`;}).join("");
  el.innerHTML=`
    <div style="text-align:center;margin-bottom:22px"><h1 style="font-size:22px;font-weight:600;margin-bottom:4px">Ergebnis</h1><p style="font-size:13px;color:#888">${m}:${String(s).padStart(2,"0")} Minuten</p></div>
    <div style="display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:24px"><div class="result-ring"><svg width="80" height="80"><circle cx="40" cy="40" r="${r}" fill="none" stroke="#e8e6e1" stroke-width="5"/><circle cx="40" cy="40" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="result-pct">${pct}%</div></div><div><div style="font-size:24px;font-weight:600">${score}/${total}</div><div style="font-size:12px;color:#888">richtig</div></div></div>
    ${catHTML}
    <div style="display:flex;gap:10px;margin-top:18px"><button class="btn" id="backMenu" style="flex:1">Menü</button><button class="btn btn-primary" id="retry" style="flex:1">Nochmal</button></div>`;
  $("#backMenu").onclick=()=>{state.mode="menu";render();};
  $("#retry").onclick=()=>startSession(true);
}

render();
</script>
</body>
</html>
