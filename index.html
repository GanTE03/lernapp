"cor":0},{"id":"cp145","cat":"Cost Price Calculation and Valuation","exp":"LN supports Standard, FIFO, LIFO and MAUC for inventory valuation.","q":"Company XYZ is choosing the inventory valuation method for a new item group. Which inventory valuation methods does LN support? (Select all)","type":"multi","opts":["Standard cost","FIFO","LIFO","Moving Average Unit Cost (MAUC)","Customer-specific cost"],"cor":[0,1,2,3]},{"id":"cp146","cat":"Cost Price Calculation and Valuation","exp":"Actualizing standard cost updates the item's standard cost and revalues inventory at the difference, posting variance/revaluation entries.","q":"Company XYZ updates standard costs once per year. What happens at standard cost actualization?","type":"single","opts":["The new standard cost replaces the old, and inventory revaluation may be triggered for existing stock","Sales prices are reset","All purchase orders are cancelled","The general ledger is closed"],"cor":0},{"id":"cp147","cat":"Cost Price Calculation and Valuation","exp":"Cost component schemes group components for analysis and map them to GL accounts via integration.","q":"Company XYZ wants reusable cost-component templates that can be applied to many items. What is a cost component scheme used for?","type":"single","opts":["To group cost components for analysis and posting (mapping to ledger accounts)","To group customers","To define warehouses","To define tax"],"cor":0},{"id":"cp148","cat":"Cost Price Calculation and Valuation","exp":"Surcharges/overheads add indirect costs (e.g., warehousing, energy, admin) on top of direct costs.","q":"Company XYZ adds a fixed percentage to material cost to cover indirect costs. What is overhead (surcharge) in cost price calculation?","type":"single","opts":["Additional indirect costs added on top of direct material/operations as a percentage or fixed amount","Customer-specific discounts","Tax on imports","Customer payment penalty"],"cor":0},{"id":"cp149","cat":"Cost Price Calculation and Valuation","exp":"Simulated purchase prices feed cost calculations with planned/expected future prices without affecting real procurement.","q":"Company XYZ wants to test 'what if' purchase prices without changing the live price book. What is a simulated purchase price used for?","type":"single","opts":["To estimate future purchase cost in cost calculations without changing the actual purchase price","To overwrite the supplier price","To set the sales price","To process credit notes"],"cor":0},{"id":"cp150","cat":"Cost Price Calculation and Valuation","exp":"Cost-price flow: maintain master data → calculate → review → actualize.","q":"Company XYZ is documenting the standard cost calculation procedure for the controllers. Reorder the standard cost calculation steps (1-4):","type":"order","items":["Maintain master data (BOM, routing, prices, surcharges)","Run cost calculation (simulation)","Review the results","Actualize standard cost"],"corOrd":[0,1,2,3]},{"id":"cp151","cat":"Cost Price Calculation and Valuation","exp":"Purchase price variance arises when supplier invoice prices differ from PO/standard prices and is posted to a variance account.","q":"Company XYZ's supplier invoiced more than the PO price. What is a price variance in procurement?","type":"single","opts":["The difference between the standard/PO price and the actual invoice price","A type of discount","A customer credit limit","A tax code"],"cor":0},{"id":"cp152","cat":"Cost Price Calculation and Valuation","exp":"Usage variance reflects consumption differences (more or less material/labor than the standard) and is posted to a variance account.","q":"Company XYZ used more raw material than the BOM specifies on a production order. What is a usage variance?","type":"single","opts":["Difference between actual material consumption and planned/standard consumption in production","Difference in invoice currency","Discount difference","Customer payment delay"],"cor":0},{"id":"cp153","cat":"Cost Price Calculation and Valuation","exp":"FIFO assigns oldest receipts' costs to issues; the remaining inventory carries the most recent costs.","q":"Company XYZ wants the oldest receipt cost to flow out first when goods are issued. How does FIFO valuation determine inventory value?","type":"single","opts":["The oldest receipts' costs are used first when issuing inventory","The newest receipts' costs are used first","All issues use the average cost","Issues use the customer price"],"cor":0},{"id":"cp154","cat":"Cost Price Calculation and Valuation","exp":"MAUC recalculates a weighted average cost on every receipt; issues use that current average.","q":"Company XYZ revalues stock to a moving average each time a new receipt comes in. How does MAUC valuation work?","type":"single","opts":["Inventory value is recalculated as a moving weighted average each time stock is received","Always uses the standard cost","Always uses the latest invoice","Uses customer-specific values"],"cor":0},{"id":"cp155","cat":"Cost Price Calculation and Valuation","exp":"Cost price is the calculated/quoted cost; valuation price is what posts to financial inventory and depends on valuation method.","q":"Company XYZ's controller asks why two different prices appear on the same item. What is the difference between cost price and inventory valuation price?","type":"single","opts":["Cost price is calculated for an item (planning/quoting); valuation price is what is used to value inventory in finance","They are always identical","Cost price is for sales only","Valuation price is for production only"],"cor":0},{"id":"cp156","cat":"Cost Price Calculation and Valuation","exp":"Warehouse-order variances are posted when actuals (qty/value) differ from expected, e.g., on receipts, issues, count differences.","q":"Company XYZ runs warehouse orders and wants to understand which financial differences can arise. Which inventory results / variances arise in warehouse orders?","type":"single","opts":["Differences between expected and actual quantities/values posted at receipts, issues, and counts","Customer-specific discounts","Salesperson commissions","Carrier surcharges only"],"cor":0},{"id":"cp157","cat":"Cost Price Calculation and Valuation","exp":"A BOM lists the materials and quantities required to make an end item; it drives cost rolls and production planning.","q":"Company XYZ manufactures finished goods from components. What is a Bill of Materials (BOM)?","type":"single","opts":["A structured list of components and quantities required to produce a parent item","A type of invoice","A pricing matrix","A customer agreement"],"cor":0},{"id":"cp158","cat":"Cost Price Calculation and Valuation","exp":"Routings specify operations, resources, times, and rates; cost calculation uses them to derive operation cost.","q":"Company XYZ wants to include labor and machine time in the standard cost. What is a routing in cost calculation?","type":"single","opts":["The sequence of operations and resources/work centers required to produce an item, with times/rates","A customer area","A tax code list","A purchase contract"],"cor":0},{"id":"cp159","cat":"Cost Price Calculation and Valuation","exp":"Cost roll-up aggregates lower-level material and operation costs up the BOM/routing to derive the parent item's cost.","q":"Company XYZ wants to recompute the cost of every parent item from updated component costs. What does a 'cost roll-up' do?","type":"single","opts":["Aggregates costs of components and operations from low-level items up to the parent item","Closes the ledger period","Recalculates customer credit limits","Posts depreciation"],"cor":0},{"id":"cp160","cat":"Cost Price Calculation and Valuation","exp":"Changes apply going forward; old transactions retain their values, so retroactive consistency requires explicit revaluation.","q":"Company XYZ is considering switching its cost component scheme. What's the typical effect on existing inventory?","type":"single","opts":["Existing inventory keeps the value already booked; new postings use the new scheme — leading to potential inconsistencies","All inventory is automatically revalued retroactively","Inventory becomes zero","There is no effect at all"],"cor":0},{"id":"cp161","cat":"Cost Price Calculation and Valuation","exp":"Operation/labor rates value operation time (setup, run) in cost calculations and posting.","q":"Company XYZ uses operations with different worker rates. What is a labor rate (operation rate) used for?","type":"single","opts":["To value the time spent in operations as part of cost calculation","To set sales price","To define customer credit","To classify items"],"cor":0},{"id":"cp162","cat":"Cost Price Calculation and Valuation","exp":"Revaluations happen for cost actualization, FX changes, or policy changes to keep inventory value correct.","q":"Company XYZ saw a 30% raw material price drop and wants the GL to reflect today's reality. Why might LN run an inventory revaluation?","type":"single","opts":["Because of standard cost changes, currency revaluation, or accounting policy adjustments","Only for tax purposes","Only when the customer asks","Never; LN does not revalue"],"cor":0},{"id":"cp163","cat":"Cost Price Calculation and Valuation","exp":"Simulations test cost outcomes for changes (price hikes, route changes) without affecting live data.","q":"Company XYZ wants to test an alternate scenario before committing to an annual cost update. What is a 'simulated cost calculation'?","type":"single","opts":["A what-if calculation based on hypothetical input data without updating the actual standard cost","A real-time cost update","A historical recalculation","A tax simulation"],"cor":0},{"id":"cp164","cat":"Cost Price Calculation and Valuation","exp":"When using standard cost, the difference (actual − standard) is recorded in variance accounts so inventory remains valued at standard.","q":"Company XYZ posts the difference between actual and standard cost to a separate GL account. What is the relationship between standard cost and variance accounts?","type":"single","opts":["Variances = actual − standard; they are posted to dedicated variance accounts to keep inventory at standard","Variances feed customer accounts","Variances always go to retained earnings","There is no link"],"cor":0},{"id":"cp165","cat":"Cost Price Calculation and Valuation","exp":"When invoice price differs from receipt price, the difference posts to an invoice price variance (or PPV) account.","q":"Company XYZ's supplier invoice arrives later at a different price than the goods receipt cost. Which variance posts when the supplier invoice price differs from the receipt-time cost?","type":"single","opts":["Invoice price variance (or PPV at invoice)","Cycle count variance","Customer rebate","Salesperson commission"],"cor":0},{"id":"cp166","cat":"Cost Price Calculation and Valuation","exp":"Subcontracting components add the supplier-performed work cost to the item's cost build-up.","q":"Company XYZ outsources part of its production to subcontractors. What is the purpose of subcontracting cost components?","type":"single","opts":["To capture the cost of work performed by external suppliers within the cost calculation","To track customer rebates","To assign warehouses","To compute payroll"],"cor":0},{"id":"cp167","cat":"Cost Price Calculation and Valuation","exp":"FIFO maintains layers; receipts are added at their actual cost and consumed in order at issue.","q":"Company XYZ uses FIFO valuation. What happens at receipt?","type":"single","opts":["Inventory value increases at the actual receipt cost; layered by date/lot for issues","Standard cost is updated","All inventory is revalued","Sales prices are recalculated"],"cor":0},{"id":"cp168","cat":"Cost Price Calculation and Valuation","exp":"Under standard costing, COGS is booked at standard cost; variances flow to dedicated GL accounts.","q":"Company XYZ wants to know how COGS is computed under standard costing. What is the effect on cos by LN to be archived automatically in IDM. What is the purpose of the IDM integration setup with LN?","type":"single","opts":["To allow LN-generated documents to be archived and referenced from IDM (and accessed back from LN sessions)","To replace LN's database","To run payroll","To do tax filing"],"cor":0},{"id":"dom185","cat":"Document Output Management","exp":"Always start with the configuration: Document Type active? Report rule matching? Recipient configured?","q":"Company XYZ's customer reports they did not receive their invoice. Which step would you take FIRST when troubleshooting that a document is not generated/sent?","type":"single","opts":["Verify the Document Type is active and the trigger/report rule applies","Reinstall LN","Delete the customer record","Reset the GL"],"cor":0},{"id":"dom186","cat":"Document Output Management","exp":"Rendering merges document data with the layout/template to produce the final output (e.g., PDF).","q":"Company XYZ wonders how DOM turns transaction data into a finished PDF or Word file. What is document rendering in DOM?","type":"single","opts":["Producing the formatted output (e.g., PDF) from data using a template","Approving an order","Deleting a document","Setting tax rates"],"cor":0},{"id":"dom187","cat":"Document Output Management","exp":"Document Type configuration deals with output format, channels, and templates. Discount schedules belong to pricing.","q":"Company XYZ is configuring a new document type in DOM. Which configuration choices commonly belong to a DOM Document Type? (Select all)","type":"multi","opts":["Output format (PDF, etc.)","Distribution channels (mail, print, IDM)","Templates and layouts","Discount schedules"],"cor":[0,1,2]},{"id":"dom188","cat":"Document Output Management","exp":"Central output ensures consistent layouts, easier governance, and a single archiving strategy.","q":"Company XYZ used to handle document generation in five different modules. Why is centralizing document output beneficial?","type":"single","opts":["Consistent branding, easier maintenance, and unified distribution & archiving across modules","It increases tax","It eliminates the need for security","It removes pricing"],"cor":0},{"id":"dom189","cat":"Document Output Management","exp":"Email recipients are derived from BP/contact data and DOM rules for that document type.","q":"Company XYZ sends invoices via email through DOM. Where does the recipient address typically come from?","type":"single","opts":["Business partner / contact data and report rules in DOM","Sales price book","Tax code","Warehouse master"],"cor":0},{"id":"dom190","cat":"Document Output Management","exp":"A typical sales invoice flow: render PDF → email to customer (per BP rules) → archive to IDM.","q":"Company XYZ wants invoices automatically rendered, emailed, and archived. What is a typical use case for DOM with sales invoices?","type":"single","opts":["Render the invoice as PDF, email it to the customer, and archive it in IDM","Reset the customer balance","Delete the order","Write off bad debt"],"cor":0},{"id":"dom191","cat":"Document Output Management","exp":"DOM logs distribution events and archives the rendered copy, supporting audit/traceability.","q":"Company XYZ's auditor needs to prove which documents were sent to which customer when. Which audit/traceability benefit does DOM bring?","type":"single","opts":["Recording when, how, and to whom a document was sent (with the archived copy)","Calculating depreciation","Computing taxes","Setting prices"],"cor":0},{"id":"dom192","cat":"Document Output Management","exp":"DOM keeps a distribution log/history showing recipient, channel, time, and status — useful for verification.","q":"Company XYZ's customer claims they didn't receive the latest acknowledgement. Where would you check whether the latest sales acknowledgement was sent to the right contact?","type":"single","opts":["DOM distribution log/history (and BP/contact configuration)","Tax handling session","Production schedule","Warehouse calendar"],"cor":0},{"id":"dom193","cat":"Document Output Management","exp":"IDM activation requires verified connectivity, authentication, and matching document types/categories on both sides.","q":"Company XYZ is about to switch on IDM in production. What should you confirm before activating IDM integration in production?","type":"single","opts":["That the IDM connection details, security/authentication, and target document types/categories are configured and tested","That all customers have credit on hold","That all warehouses are closed","That tax codes are deleted"],"cor":0},{"id":"dom194","cat":"Document Output Management","exp":"Rendering errors are typically caused by template/data/rule problems — start there in troubleshooting.","q":"Company XYZ sees a 'document not rendered' error after a recent change. What might cause a 'document not rendered' error in DOM?","type":"single","opts":["Missing/invalid template, missing data fields, or report rule not matched","Customer credit limit","Tax code blocked","Wrong currency"],"cor":0},{"id":"dom195","cat":"Document Output Management","exp":"DOM provides a session to download/import predefined document type templates.","q":"Company XYZ wants to download Infor's template for a new document type to start configuration. Which session lets you download a predefined Document Type template?","type":"single","opts":["Document Type templates / predefined templates session in DOM","Pricing Parameters","Tax Handling","Inventory 360"],"cor":0},{"id":"dom196","cat":"Document Output Management","exp":"Templates standardize layout, reduce custom development, and ease upgrades and changes.","q":"Company XYZ's developer suggests hard-coding output formats in custom code. What is the main reason to use templates rather than coding output per document?","type":"single","opts":["Faster setup, consistent layout, lower maintenance, and easier upgrades","Higher cost and more risk","To remove all output","Mandatory by tax law"],"cor":0},{"id":"dom197","cat":"Document Output Management","exp":"DOM setup: choose template → configure document type → define rules → test.","q":"Company XYZ's consultant is configuring DOM for a brand-new document type. Reorder the steps (1-4):","type":"order","items":["Identify the document and choose/import the template","Configure the Document Type (format, layout)","Define report rules (trigger and recipients)","Test the rendering and distribution end-to-end"],"corOrd":[0,1,2,3]},{"id":"dom198","cat":"Document Output Management","exp":"DOM can pick the right language template based on BP language settings and translated label texts.","q":"Company XYZ has customers in five countries that need invoices in their own language. How can DOM support multilingual customer communication?","type":"single","opts":["By selecting the template/language based on the BP's language preference and maintaining translations of texts","By disabling translation entirely","By using a single hardcoded language","Only via tax codes"],"cor":0},{"id":"dom199","cat":"Document Output Management","exp":"DOM builds on LN's reporting (templates) by adding standardized distribution and archiving.","q":"Company XYZ wonders if DOM and the LN Reporting layer are the same thing. What is the relationship between DOM and the LN Reporting layer?","type":"single","opts":["DOM uses report definitions to render and adds distribution/archiving capabilities on top","They are unrelated","DOM replaces all reports","Reports replace DOM"],"cor":0},{"id":"dom200","cat":"Document Output Management","exp":"Document errors are highly visible to customers; thorough testing prevents costly outages and reputational damage.","q":"Company XYZ wants to push DOM template changes directly to production. Why should DOM configuration changes be tested before go-live?","type":"single","opts":["Errors in templates/rules can cause missing or wrong customer-facing documents at scale","Changes never affect anything","Tests are forbidden","Only finance must approve"],"cor":0}];

const CATS=[...new Set(Q.map(q=>q.cat))];
const CC={"Prices and Discounts":{bg:"#FAEEDA",t:"#633806",b:"#FAC775"},"Sales Order Management":{bg:"#E1F5EE",t:"#085041",b:"#5DCAA5"},"Warehousing":{bg:"#E6F1FB",t:"#0C447C",b:"#85B7EB"},"Cost Price Calculation and Valuation":{bg:"#EEEDFE",t:"#3C3489",b:"#AFA9EC"},"Document Output Management":{bg:"#FBEAF0",t:"#72243E",b:"#ED93B1"}};
const TL={single:"Single Choice",multi:"Multiple Choice",order:"Reihenfolge",match:"Zuordnung"};
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function badge(text,bg,color,border){return `<span class="badge" style="background:${bg};color:${color};border:1px solid ${border}">${text}</span>`;}
function $(s){return document.querySelector(s);}

let state={mode:"menu",qs:[],idx:0,ans:{},filter:"all",exam:false,t0:0,timer:null};

function render(){
  const app=document.getElementById("app");
  if(state.mode==="menu") return renderMenu(app);
  if(state.mode==="results") return renderResults(app);
  if(state.mode==="overview") return renderOverview(app);
  renderQuestion(app);
}

function renderMenu(el){
  const fc=state.filter==="all"?Q.length:Q.filter(q=>q.cat===state.filter).length;
  el.innerHTML=`
    <div style="margin-bottom:22px">
      <h1 style="font-size:22px;font-weight:600;margin-bottom:4px">LN Cloud: Logistics</h1>
      <p style="font-size:13px;color:#888">Zertifizierungs-Lernapp — ${Q.length} Fragen, 5 Bereiche (P&amp;D · SOM · WH · CP · DOM)</p>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Bereich filtern</label>
      <select id="catFilter" style="width:100%;padding:9px 12px;border-radius:10px;font-size:13px;border:1.5px solid #e8e6e1;background:#fff">
        <option value="all">Alle Bereiche (${Q.length})</option>
        ${CATS.map(c=>`<option value="${c}" ${state.filter===c?"selected":""}>${c} (${Q.filter(q=>q.cat===c).length})</option>`).join("")}
      </select>
    </div>
    <div class="menu-grid">
      <button class="menu-card" id="btnLearn"><h3>Lernmodus</h3><p>Sofortiges Feedback, ${fc} Fragen</p></button>
      <button class="menu-card" id="btnExam"><h3>Prüfungsmodus</h3><p>Timer + Auswertung, ${fc} Fragen</p></button>
    </div>
    <div class="card-flat">
      <div style="font-size:12px;color:#888;margin-bottom:6px">Bereiche</div>
      <div class="tags" style="margin-bottom:6px">${CATS.map(c=>{const col=CC[c];return badge(c+" ("+Q.filter(q=>q.cat===c).length+")",col.bg,col.t,col.b);}).join("")}</div>
      <div class="tags">${Object.entries(TL).map(([k,v])=>badge(v,"#F1EFE8","#444","#B4B2A9")).join("")}</div>
    </div>`;
  $("#catFilter").onchange=e=>{state.filter=e.target.value;render();};
  $("#btnLearn").onclick=()=>startSession(false);
  $("#btnExam").onclick=()=>startSession(true);
}

function startSession(isExam){
  let qs=state.filter==="all"?[...Q]:Q.filter(q=>q.cat===state.filter);
  qs=shuf(qs);
  state={...state,mode:isExam?"exam":"learn",qs,idx:0,ans:{},exam:isExam,t0:Date.now()};
  if(state.timer)clearInterval(state.timer);
  if(isExam){state.timer=setInterval(()=>{const el=$("#timer");if(el){const d=Date.now()-state.t0,m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);el.textContent=m+":"+String(s).padStart(2,"0");}},1000);}
  render();
}

function renderQuestion(el){
  const q=state.qs[state.idx],col=CC[q.cat],total=state.qs.length,done=state.idx in state.ans;
  const pct=((state.idx+1)/total*100).toFixed(1);
  el.innerHTML=`
    <div class="nav">
      <button class="nav-back" id="navMenu">← Menü</button>
      <div class="nav-info">${!state.exam?'<button class="btn" id="ovBtn" style="padding:4px 12px;font-size:11px;border-radius:6px;">Übersicht</button>':''}${state.exam?'<span class="timer" id="timer">0:00</span>':""}<span>${state.idx+1}/${total}</span></div>
    </div>
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:#3B7BE8"></div></div>
    <div class="tags" style="margin-bottom:10px">${badge(TL[q.type],"#F1EFE8","#444","#B4B2A9")} ${badge(q.cat,col.bg,col.t,col.b)}</div>
    <h2 style="font-size:15px;font-weight:500;line-height:1.5;margin-bottom:14px">${q.q}</h2>
    <div id="qBody"></div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn" id="prevBtn" ${state.idx===0?"disabled":""}>← Zurück</button>
      <button class="btn btn-primary" id="nextBtn" ${!done?"disabled":""}>${state.idx===total-1&&state.exam?"Auswerten":"Weiter →"}</button>
    </div>`;
  $("#navMenu").onclick=()=>{clearInterval(state.timer);state.mode="menu";render();};
  const ovb=$("#ovBtn");if(ovb)ovb.onclick=()=>{state.mode="overview";render();};
  $("#prevBtn").onclick=()=>{if(state.idx>0){state.idx--;render();}};
  $("#nextBtn").onclick=()=>{if(state.idx<total-1){state.idx++;render();}else if(state.exam){clearInterval(state.timer);state.mode="results";render();}};
  if(q.type==="single"||q.type==="multi") renderChoice(q,done);
  else if(q.type==="order") renderOrder(q,done);
  else if(q.type==="match") renderMatch(q,done);
}

function renderChoice(q,done){
  const isM=q.type==="multi";let sel=isM?[]:-1;const body=$("#qBody");
  function draw(){
    body.innerHTML=(isM?'<p style="font-size:12px;color:#888;margin-bottom:6px">Mehrere Antworten möglich</p>':"")+
      q.opts.map((o,i)=>{const isSel=isM?sel.includes(i):sel===i;let cls="opt-btn";if(!done&&isSel)cls+=" selected";if(done){const ic=isM?q.cor.includes(i):q.cor===i;const wp=isM?sel.includes(i):sel===i;if(ic)cls+=" correct";else if(wp)cls+=" wrong";else cls+=" dimmed";}return `<button class="${cls}" data-i="${i}"><span class="indicator${isM?" multi":""}${isSel?" active":""}"></span>${o}</button>`;}).join("")+
      (!done?`<button class="btn" id="checkBtn" style="margin-top:10px" ${(isM?sel.length===0:sel===-1)?"disabled":""}>Prüfen</button>`:"")+
      (done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".opt-btn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;if(isM){sel.includes(i)?sel=sel.filter(x=>x!==i):sel.push(i);}else sel=i;draw();});const cb=body.querySelector("#checkBtn");if(cb)cb.onclick=()=>{let c;if(isM){const s=[...sel].sort(),cr=[...q.cor].sort();c=s.length===cr.length&&s.every((v,i)=>v===cr[i]);}else c=sel===q.cor;state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderOrder(q,done){
  let items=done?q._userOrder||shuf(q.items):shuf(q.items);if(!done)q._userOrder=items;const body=$("#qBody");
  function draw(){
    body.innerHTML='<p style="font-size:12px;color:#888;margin-bottom:6px">Mit Pfeilen sortieren</p>'+items.map((item,i)=>{let cls="order-item";if(done){cls+=q.items[q.corOrd[i]]===item?" correct":" wrong";}return `<div class="order-row"><div class="order-arrows"><button class="arrow-btn" data-d="up" data-i="${i}" ${done||i===0?"disabled":""}>▲</button><button class="arrow-btn" data-d="dn" data-i="${i}" ${done||i===items.length-1?"disabled":""}>▼</button></div><div class="${cls}"><span class="order-num">${i+1}</span>${item}</div></div>`;}).join("")+(!done?'<button class="btn" id="checkBtn" style="margin-top:8px">Prüfen</button>':"")+(done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".arrow-btn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i,d=b.dataset.d==="up"?-1:1,t=i+d;if(t<0||t>=items.length)return;[items[i],items[t]]=[items[t],items[i]];q._userOrder=items;draw();});body.querySelector("#checkBtn").onclick=()=>{const c=items.every((item,i)=>q.items[q.corOrd[i]]===item);state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderMatch(q,done){
  const rights=shuf(q.pairs.map(p=>p.r));let asgn={};const body=$("#qBody");
  function draw(){
    const used=Object.values(asgn);
    body.innerHTML='<p style="font-size:12px;color:#888;margin-bottom:6px">Richtige Beschreibung zuordnen</p>'+q.pairs.map((p,i)=>{const ok=done&&asgn[i]===p.r;const cls=done?(ok?"correct":"wrong"):"";return `<div class="match-block"><div class="match-label" style="${done?"color:"+(ok?"#1D9E75":"#E24B4A"):""}">${p.l} ${done?(ok?"✓":"✗"):""}</div><select class="match-select ${cls}" data-i="${i}" ${done?"disabled":""}><option value="">— Bitte wählen —</option>${rights.map(r=>`<option value="${r}" ${asgn[i]===r?"selected":""} ${used.includes(r)&&asgn[i]!==r?"disabled":""}>${r}</option>`).join("")}</select>${done&&!ok?`<div class="match-hint">→ ${p.r}</div>`:""}</div>`;}).join("")+(!done?`<button class="btn" id="checkBtn" style="margin-top:8px" ${Object.keys(asgn).length<q.pairs.length?"disabled":""}>Prüfen</button>`:"")+(done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".match-select").forEach(s=>s.onchange=()=>{const i=+s.dataset.i;if(s.value)asgn[i]=s.value;else delete asgn[i];draw();});const cb=body.querySelector("#checkBtn");if(cb)cb.onclick=()=>{const c=q.pairs.every((p,i)=>asgn[i]===p.r);state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderOverview(el){
  const total=state.qs.length,answered=Object.keys(state.ans).length,score=Object.values(state.ans).filter(Boolean).length,wrong=answered-score,open=total-answered,pct=answered>0?Math.round(score/answered*100):0;
  const catGroups={};state.qs.forEach((q,i)=>{if(!catGroups[q.cat])catGroups[q.cat]=[];catGroups[q.cat].push({q,i});});
  let catHTML=Object.entries(catGroups).map(([cat,items])=>{const cl=CC[cat];const ca=items.filter(x=>x.i in state.ans).length;const cc=items.filter(x=>state.ans[x.i]===true).length;const cp=ca>0?Math.round(cc/ca*100):0;
    return `<div class="ov-cat"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px">${badge(cat,cl.bg,cl.t,cl.b)}<span style="font-size:12px;color:#888">${cc}/${items.length}</span></div>${ca>0?`<span style="font-size:12px;font-weight:500;color:${cp>=80?"#1D9E75":cp>=50?"#EF9F27":"#E24B4A"}">${cp}%</span>`:'<span style="font-size:12px;color:#ccc">—</span>'}</div><div class="ov-grid">${items.map(({q,i})=>{const d=i in state.ans;const cls=d?(state.ans[i]?"ok":"fail"):"";const cur=i===state.idx?"current":"";return `<button class="ov-dot ${cls} ${cur}" data-i="${i}" title="${q.q.substring(0,60)}">${i+1}</button>`;}).join("")}</div>${ca>0?`<div style="height:3px;border-radius:2px;background:#e8e6e1;overflow:hidden;margin-top:4px"><div style="height:100%;width:${items.length>0?(cc/items.length*100):0}%;background:${cl.b};border-radius:2px"></div></div>`:''}</div>`;
  }).join("");
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:20px;font-weight:600">Übersicht</h1><button class="btn" id="ovBack" style="padding:5px 14px;font-size:12px">← Weiterlernen</button></div>
    <div class="ov-stats"><div class="ov-stat"><div class="ov-stat-val" style="color:#1D9E75">${score}</div><div class="ov-stat-lbl">Richtig</div></div><div class="ov-stat"><div class="ov-stat-val" style="color:#E24B4A">${wrong}</div><div class="ov-stat-lbl">Falsch</div></div><div class="ov-stat"><div class="ov-stat-val" style="color:#888">${open}</div><div class="ov-stat-lbl">Offen</div></div></div>
    ${answered>0?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:12px 14px;border-radius:10px;background:#fff;border:1.5px solid #e8e6e1"><div style="position:relative;width:48px;height:48px;flex-shrink:0"><svg width="48" height="48" style="transform:rotate(-90deg)"><circle cx="24" cy="24" r="20" fill="none" stroke="#e8e6e1" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A"}" stroke-width="4" stroke-dasharray="${2*3.14159*20}" stroke-dashoffset="${2*3.14159*20-(pct/100)*2*3.14159*20}" stroke-linecap="round"/></svg><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:600">${pct}%</span></div><div><div style="font-size:13px;font-weight:500">${score} von ${answered} richtig</div><div style="font-size:11px;color:#888">${open} Fragen offen</div></div></div>`:''}
    <div class="ov-legend"><span><span class="ov-legend-dot" style="background:#1D9E75"></span>Richtig</span><span><span class="ov-legend-dot" style="background:#E24B4A"></span>Falsch</span><span><span class="ov-legend-dot" style="background:#e8e6e1"></span>Offen</span><span><span class="ov-legend-dot" style="background:transparent;border:2px solid #3B7BE8;width:8px;height:8px"></span>Aktuell</span></div>
    ${catHTML}
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn" id="ovMenu" style="flex:1">Menü</button>${wrong>0?`<button class="btn btn-danger" id="ovRetry" style="flex:1">Nur Fehler (${wrong})</button>`:''}</div>`;
  $("#ovBack").onclick=()=>{state.mode="learn";render();};
  $("#ovMenu").onclick=()=>{state.mode="menu";render();};
  const rw=$("#ovRetry");if(rw)rw.onclick=()=>{const wqs=Object.entries(state.ans).filter(([k,v])=>!v).map(([k])=>state.qs[+k]);state.qs=shuf(wqs);state.idx=0;state.ans={};state.mode="learn";render();};
  el.querySelectorAll(".ov-dot").forEach(d=>d.onclick=()=>{state.idx=+d.dataset.i;state.mode="learn";render();});
}

function renderResults(el){
  const score=Object.values(state.ans).filter(Boolean).length,total=state.qs.length,pct=total?Math.round(score/total*100):0;
  const d=Date.now()-state.t0,m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);
  const col=pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";const r=37,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  let catHTML=CATS.filter(c=>state.qs.some(q=>q.cat===c)).map(c=>{const cq=state.qs.map((q,i)=>({q,i})).filter(x=>x.q.cat===c);const cs=cq.filter(x=>state.ans[x.i]).length;const cl=CC[c];return `<div class="cat-bar"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">${badge(c,cl.bg,cl.t,cl.b)}<span style="font-size:12px;color:#888">${cs}/${cq.length}</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${cq.length?(cs/cq.length*100):0}%;background:${cl.b}"></div></div></div>`;}).join("");
  el.innerHTML=`
    <div style="text-align:center;margin-bottom:22px"><h1 style="font-size:22px;font-weight:600;margin-bottom:4px">Ergebnis</h1><p style="font-size:13px;color:#888">${m}:${String(s).padStart(2,"0")} Minuten</p></div>
    <div style="display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:24px"><div class="result-ring"><svg width="80" height="80"><circle cx="40" cy="40" r="${r}" fill="none" stroke="#e8e6e1" stroke-width="5"/><circle cx="40" cy="40" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="result-pct">${pct}%</div></div><div><div style="font-size:24px;font-weight:600">${score}/${total}</div><div style="font-size:12px;color:#888">richtig</div></div></div>
    ${catHTML}
    <div style="display:flex;gap:10px;margin-top:18px"><button class="btn" id="backMenu" style="flex:1">Menü</button><button class="btn btn-primary" id="retry" style="flex:1">Nochmal</button></div>`;
  $("#backMenu").onclick=()=>{state.mode="menu";render();};
  $("#retry").onclick=()=>startSession(true);
}

render();
</script>
</body>
</html>
