<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infor LN Cloud — Lern-App (Logistics)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F8F7F4;color:#1a1a1a;min-height:100vh;}
.app{max-width:560px;margin:0 auto;padding:20px 16px 40px;}
button{font-family:inherit;cursor:pointer;}
select{font-family:inherit;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;letter-spacing:0.02em;white-space:nowrap;}
.card-flat{background:#F1EFE8;border:none;border-radius:12px;padding:14px 16px;}
.pbar{height:4px;border-radius:2px;background:#e8e6e1;overflow:hidden;margin-bottom:18px;}
.pbar-fill{height:100%;border-radius:2px;transition:width 0.35s ease;}
.opt-btn{width:100%;text-align:left;padding:10px 13px;border-radius:10px;border:1.5px solid #e8e6e1;background:#fff;font-size:13px;line-height:1.45;display:flex;align-items:center;gap:9px;transition:all 0.15s;color:#1a1a1a;}
.opt-btn:hover:not(:disabled){border-color:#b8b5ae;background:#faf9f6;}
.opt-btn.selected{border-color:#3B7BE8;background:#EBF2FD;}
.opt-btn.correct{border-color:#1D9E75;background:#E8F5EC;}
.opt-btn.wrong{border-color:#E24B4A;background:#FDF0F0;}
.opt-btn.dimmed{opacity:0.45;}
.indicator{width:18px;height:18px;border-radius:99px;border:1.5px solid #c5c3bc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:all 0.15s;}
.indicator.multi{border-radius:4px;}
.indicator.active{background:#3B7BE8;border-color:#3B7BE8;}
.order-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.order-arrows{display:flex;flex-direction:column;gap:2px;}
.arrow-btn{width:26px;height:20px;border:1px solid #e8e6e1;border-radius:5px;background:#fff;font-size:10px;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
.arrow-btn:hover:not(:disabled){background:#f0efe8;border-color:#c5c3bc;}
.arrow-btn:disabled{opacity:0.25;cursor:default;}
.order-item{flex:1;padding:9px 12px;border-radius:9px;border:1.5px solid #e8e6e1;background:#fff;font-size:12.5px;line-height:1.4;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.order-item.correct{border-color:#1D9E75;background:#E8F5EC;}
.order-item.wrong{border-color:#E24B4A;background:#FDF0F0;}
.order-num{width:22px;height:22px;border-radius:6px;background:#F1EFE8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#888;flex-shrink:0;}
.match-block{margin-bottom:10px;}
.match-label{font-size:13px;font-weight:500;margin-bottom:4px;}
.match-select{width:100%;padding:8px 10px;border-radius:9px;font-size:12px;border:1.5px solid #e8e6e1;background:#fff;color:#1a1a1a;appearance:auto;}
.match-select.correct{border-color:#1D9E75;background:#E8F5EC;}
.match-select.wrong{border-color:#E24B4A;background:#FDF0F0;}
.match-hint{font-size:11px;color:#1D9E75;margin-top:2px;}
.btn{padding:8px 20px;border-radius:9px;font-size:13px;font-weight:500;border:1.5px solid #c5c3bc;background:#fff;color:#1a1a1a;transition:all 0.15s;}
.btn:hover{background:#f0efe8;}
.btn:disabled{opacity:0.35;cursor:default;background:#fff;}
.btn-primary{border-color:#3B7BE8;background:#EBF2FD;color:#1B5EC2;}
.btn-primary:hover{background:#d9e8fc;}
.btn-danger{border-color:#E24B4A;background:#FDF0F0;color:#6E1616;}
.feedback{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:12.5px;line-height:1.55;}
.feedback.ok{background:#E8F5EC;color:#0F5132;}
.feedback.fail{background:#FDF0F0;color:#6E1616;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.nav-back{font-size:12px;color:#888;background:none;border:none;padding:0;}
.nav-back:hover{color:#555;}
.nav-info{font-size:12px;color:#888;display:flex;gap:10px;align-items:center;}
.timer{font-family:'DM Sans',monospace;letter-spacing:0.04em;}
.result-ring{position:relative;width:80px;height:80px;}
.result-ring svg{transform:rotate(-90deg);}
.result-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:600;}
.cat-bar{margin-bottom:8px;}
.cat-bar-track{height:5px;border-radius:3px;background:#e8e6e1;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.menu-card{padding:16px;border-radius:12px;border:1.5px solid #e8e6e1;background:#fff;text-align:left;transition:all 0.15s;}
.menu-card:hover{border-color:#c5c3bc;background:#faf9f6;}
.menu-card h3{font-size:14px;font-weight:500;margin-bottom:3px;}
.menu-card p{font-size:11px;color:#888;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.ov-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
.ov-stat{background:#fff;border:1.5px solid #e8e6e1;border-radius:10px;padding:12px;text-align:center;}
.ov-stat-val{font-size:20px;font-weight:600;margin-bottom:2px;}
.ov-stat-lbl{font-size:11px;color:#888;}
.ov-cat{margin-bottom:14px;}
.ov-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.ov-dot{width:30px;height:30px;border-radius:7px;border:1.5px solid #e8e6e1;background:#fff;font-size:10px;font-weight:500;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.12s;cursor:pointer;}
.ov-dot:hover{border-color:#b8b5ae;transform:scale(1.08);}
.ov-dot.ok{background:#E8F5EC;border-color:#1D9E75;color:#0F5132;}
.ov-dot.fail{background:#FDF0F0;border-color:#E24B4A;color:#6E1616;}
.ov-dot.current{border-color:#3B7BE8;box-shadow:0 0 0 2px #3B7BE844;}
.ov-legend{display:flex;gap:14px;margin-bottom:18px;font-size:11px;color:#888;}
.ov-legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle;}
@media(max-width:480px){.app{padding:14px 12px 30px;}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const Q=[{"id":"pd1","cat":"Prices and Discounts","exp":"LN uses pricing matrices to retrieve the information used to calculate the price and discount of an order, load, or shipment.","q":"Company XYZ wants LN to automatically calculate the price and discount on every order, load, or shipment instead of relying on manual entry. Which mechanism does LN use to retrieve this pricing information?","type":"single","opts":["A purchase contract only","Pricing matrices","Item master data only","Tax codes"],"cor":1},{"id":"pd2","cat":"Prices and Discounts","exp":"Price matrix, Discount matrix, Promotion matrix, and Freight rate matrix are the four pricing matrix types in LN.","q":"Company XYZ is configuring LN pricing for sales, procurement, and freight calculations. Which types of pricing matrices can it leverage? (Select all)","type":"multi","opts":["Price matrix","Discount matrix","Promotion matrix","Freight rate matrix","Currency matrix"],"cor":[0,1,2,3]},{"id":"pd3","cat":"Prices and Discounts","exp":"A matrix definition includes a group of matrix attributes and a matrix type.","q":"Company XYZ's pricing consultant talks about creating a 'matrix definition' before maintaining any prices. What exactly is a matrix definition in LN?","type":"single","opts":["A type of currency conversion","A group of matrix attributes combined with a matrix type","The price book itself","A specific discount schedule"],"cor":1},{"id":"pd4","cat":"Prices and Discounts","exp":"A matrix priority is used to define the order in which LN searches matrix definitions. If a matrix definition has no matrix priority, LN does not search the pricing matrices that use that definition.","q":"Company XYZ has multiple matrix definitions and wants to control which one LN evaluates first. What does the matrix priority control?","type":"single","opts":["To define currency exchange order","To define the order in which LN searches matrix definitions","To rank business partners","To prioritize shipments"],"cor":1},{"id":"pd5","cat":"Prices and Discounts","exp":"LN searches: special contracts → normal contracts → high-priority price book lines → matrices → default price book → item master data. When a price is found, LN stops searching.","q":"Company XYZ wants to understand the exact order in which LN searches for a price when a sales order is entered. Reorder the pricing information retrieval sequence (1-6):","type":"order","items":["From valid special contracts","From valid normal contracts","From the supplier price book with High Priority","From valid matrices with matrix priority","From the default sales/supplier price book","From item sales data or item purchase data"],"corOrd":[0,1,2,3,4,5]},{"id":"pd6","cat":"Prices and Discounts","exp":"When a price is found, LN stops searching.","q":"Company XYZ notices that once LN finds a valid price during retrieval, it does not check any further sources. What is happening?","type":"single","opts":["LN continues searching for a better price","LN stops searching","LN averages all found prices","LN takes the lowest price always"],"cor":1},{"id":"pd7","cat":"Prices and Discounts","exp":"First Pricing Parameters → then Matrix Definition → then Price Book → finally define the price matrices that link them.","q":"Company XYZ is implementing a new price matrix from scratch. Reorder the steps to set up a price matrix (1-4):","type":"order","items":["Populate the fields in the Pricing Parameters session","Populate the fields in the Matrix Definition session","Populate the fields in the Price Book session","Define sales, purchase, and transfer price matrices"],"corOrd":[0,1,2,3]},{"id":"pd8","cat":"Prices and Discounts","exp":"Number group → price book header → price book lines → default codes.","q":"Company XYZ needs to set up a brand-new price book for a new region. Reorder the steps to set up a price book (1-4):","type":"order","items":["Define a price book number group","Define a price book","Define price book lines","Define default price book codes"],"corOrd":[0,1,2,3]},{"id":"pd9","cat":"Prices and Discounts","exp":"A discount matrix is a discount structure that offers flexible criteria to define and retrieve discounts.","q":"Company XYZ wants flexible discount rules that can be applied based on customer, item group, region, and order value. Which LN object provides this?","type":"single","opts":["A list of fixed discounts per customer","A discount structure that offers flexible criteria to define and retrieve discounts","A tax calculation tool","A type of price book"],"cor":1},{"id":"pd10","cat":"Prices and Discounts","exp":"A discount matrix includes a matrix definition, a set of matrix attributes, and discount information (amount, percentage, and/or schedule).","q":"Company XYZ is documenting the components that make up a discount matrix in its design document. Which elements does a discount matrix include? (Select all)","type":"multi","opts":["A matrix definition","A set of matrix attributes","Discount information (amount, percentage, and/or schedule)","A purchase order number"],"cor":[0,1,2]},{"id":"pd11","cat":"Prices and Discounts","exp":"The discounts specified in a discount schedule are expressed as a percentage or an amount and are subject to a minimum or maximum quantity or value.","q":"Company XYZ wants to define quantity-based discount tiers (e.g., 5% from 100 units, 10% from 500 units). How are discounts in a discount schedule expressed?","type":"single","opts":["Only as a fixed amount","As a percentage or an amount, subject to a minimum or maximum quantity or value","Only as a percentage","As a currency conversion"],"cor":1},{"id":"pd12","cat":"Prices and Discounts","exp":"Master data setup for prices and discounts covers business partners, items, and user profiles.","q":"Company XYZ is preparing the master data setup before the prices and discounts module can go live. Master data must be configured in which areas? (Select all)","type":"multi","opts":["Business partners","Items","User profiles","Shipping carriers"],"cor":[0,1,2]},{"id":"pd13","cat":"Prices and Discounts","exp":"A sales price list is an attribute that can be assigned to one or more sold-to BP. A sales price list does not contain prices.","q":"Company XYZ assigns its customers to wholesale, retail, and government segments. What is a sales price list in LN?","type":"single","opts":["A list of all sales prices in the system","An attribute that can be assigned to one or more sold-to BPs (does NOT contain prices)","A copy of the price book","A list of customers eligible for discounts"],"cor":1},{"id":"pd14","cat":"Prices and Discounts","exp":"BP for Prices/Discounts indicates the business partner for prices and discounts. If empty, LN uses the prices and discounts agreed with the sold-to business partner. The BP must share the same parent business partner.","q":"Company XYZ wants prices to be retrieved from a different BP than the one that placed the order. What does the 'BP for Prices/Discounts' field on a Sold-to BP control?","type":"single","opts":["It defines the shipping address","It indicates the business partner whose prices and discounts are used; if empty, the sold-to BP's are used","It blocks the BP from receiving discounts","It sets the default currency"],"cor":1},{"id":"pd15","cat":"Prices and Discounts","exp":"If the Multiple Discount Levels Implemented check box is cleared, only one discount level is allowed. Up to five discount levels are supported in LN.","q":"Company XYZ wants to apply chained discounts (header + line + customer-specific) on a single order. What does the 'Multiple Discount Levels Implemented' check box control?","type":"single","opts":["Whether multiple currencies are allowed","Whether more than one discount level can be applied (otherwise only one level is allowed)","Whether discount codes are mandatory","Whether the price book is active"],"cor":1},{"id":"pd16","cat":"Prices and Discounts","exp":"Up to five discount levels are supported in LN, resulting in up to eleven applied discount numbers (price book + 5 line + 5 total).","q":"Company XYZ wants to know how many simultaneous discount levels LN can apply to one order. Up to how many discount levels are supported in LN?","type":"single","opts":["3","5","10","Unlimited"],"cor":1},{"id":"pd17","cat":"Prices and Discounts","exp":"First price: For a specific matrix definition, LN uses the first price found in the price matrix with the most recent effective date.","q":"Company XYZ wants LN to always take the very first matching price found and stop. What does the 'First price' option in the Price Control parameter do?","type":"single","opts":["LN uses the first price found with the most recent effective date for a specific matrix definition","LN takes the lowest price across all matrices","LN takes the highest price found","LN averages all matched prices"],"cor":0},{"id":"pd18","cat":"Prices and Discounts","exp":"Lowest price: LN continues searching all relevant matrix definitions and uses the lowest price found in a price matrix.","q":"Company XYZ instead wants LN to keep searching and pick the cheapest valid price for the customer. What does the 'Lowest price' option do?","type":"single","opts":["LN uses only the first match found","LN searches all relevant matrices and uses the lowest price found","LN uses item master data only","LN ignores price matrices entirely"],"cor":1},{"id":"pd19","cat":"Prices and Discounts","exp":"First discount stops at first match; Best discount returns the best across all matrix definitions of that level; Accumulate sums them up.","q":"Company XYZ is fine-tuning each individual discount level. Which Discount Control options exist for each discount level? (Select all)","type":"multi","opts":["First discount","Best discount","Accumulate","Random discount"],"cor":[0,1,2]},{"id":"pd20","cat":"Prices and Discounts","exp":"Automatic: Prices and discounts are automatically recalculated after approving an order or an order line.","q":"Company XYZ noticed prices on a sales order line are stale after the order was approved. Which option recalculates prices and discounts automatically after approval?","type":"single","opts":["No","Interactive","Automatic","Manual"],"cor":2},{"id":"pd21","cat":"Prices and Discounts","exp":"A supplier price book maintains Buying, Item subcontracting, Operation subcontracting, and Service subcontracting price types.","q":"Company XYZ wants to maintain different procurement prices in its supplier price book. Which price types can be maintained? (Select all)","type":"multi","opts":["Buying","Item subcontracting","Operation subcontracting","Service subcontracting","Sales price"],"cor":[0,1,2,3]},{"id":"pd22","cat":"Prices and Discounts","exp":"Price validity can be set by break value, effective date, expiry date, price unit, and (optionally) by buy-from BP.","q":"Company XYZ wants supplier prices to be valid only under specific conditions. Price validity in the price book can be specified by which of the following? (Select all)","type":"multi","opts":["From a specific break value (from quantity)","From a specific effective date","Until a specific expiry date","For a defined price unit","For a specific Buy-from Business Partner (optional)","Only by item code"],"cor":[0,1,2,3,4]},{"id":"pd23","cat":"Prices and Discounts","exp":"The Price Simulator session initiates the simulation of prices and discounts for a specific item and business partner. Click CALCULATE to retrieve them.","q":"Company XYZ wants its sales reps to test what a customer would actually pay before quoting. What is the purpose of the Price Simulator session?","type":"single","opts":["To delete obsolete prices","To initiate the simulation of prices and discounts for a specific item and business partner","To create new price books","To finalize a sales order"],"cor":1},{"id":"pd24","cat":"Prices and Discounts","exp":"The standard procurement price book setup goes from controlling attribute → matrix definition → matrix priority → price book → prices → purchase price matrices → verification.","q":"Company XYZ wants completely separate price books for procurement vs. sales. Reorder the steps to set up separate price books for procurement (1-7):","type":"order","items":["Verify the attribute that controls the pricing","Define the matrix definition with the attributes","Define the matrix priority (search sequence)","Create a price book","Maintain prices in the new price book","Maintain purchase price matrices to assign the price book","Verify the configuration using the price simulator"],"corOrd":[0,1,2,3,4,5,6]},{"id":"pd25","cat":"Prices and Discounts","exp":"A matrix definition consists of a matrix type and up to six attributes.","q":"Company XYZ is designing a procurement matrix definition and wants to know its capacity. How many attributes can a procurement matrix definition consist of in addition to the matrix type?","type":"single","opts":["Up to 3","Up to 5","Up to 6","Unlimited"],"cor":2},{"id":"pd26","cat":"Prices and Discounts","exp":"Retrieval and calculation of prices can be done in Procurement, Sales, Service, Freight, and Internal Invoice (Multisite).","q":"Company XYZ uses both sales and purchasing flows. Which areas of LN can retrieve and calculate prices and discounts? (Select all)","type":"multi","opts":["Procurement","Sales","Service","Freight","Internal Invoice (Multisite)"],"cor":[0,1,2,3,4]},{"id":"pd27","cat":"Prices and Discounts","exp":"Usually the price from a purchase contract is the most favorable price for an item. The highest price is often the price from a standard purchase price book.","q":"Company XYZ's buyer wants LN to default to the most attractive purchase price. Usually, which is the most favorable price for an item in procurement?","type":"single","opts":["The price from the standard purchase price book","The price from a purchase contract","The list price","The catalog price"],"cor":1},{"id":"pd28","cat":"Prices and Discounts","exp":"If High Priority is selected on a Price Book Line, the supplier price book has priority over pricing matrices.","q":"Company XYZ has a special supplier price book line that should always win against matrices. What does the High Priority check box on a Price Book Line affect?","type":"single","opts":["Whether the line is visible in reports","Whether the supplier price book line takes precedence over pricing matrices","Whether the price requires manager approval","Whether the line uses the company currency"],"cor":1},{"id":"pd29","cat":"Prices and Discounts","exp":"The two procurement discount matrix types are Purchase line discount and Purchase total discount.","q":"Company XYZ is setting up procurement discount logic and needs to know its options. What are the two procurement discount matrix types?","type":"single","opts":["Buy-from and Ship-from discounts","Purchase line discount and Purchase total discount","Quantity and value discounts","Standard and special discounts"],"cor":1},{"id":"pd30","cat":"Prices and Discounts","exp":"If Use in Agreement is selected, the discount can only be linked to price, discount, commission, or rebate agreements; it cannot be added to order lines manually.","q":"Company XYZ has discount codes that should only apply when a purchase agreement is in place. What does the 'Use in Agreement' check box on a Discount Code control?","type":"single","opts":["Whether the discount code prints on invoices","Whether the discount can only be linked to price/discount/commission/rebate agreements (and not to order lines manually)","Whether the discount applies in sales only","Whether the discount expires automatically"],"cor":1},{"id":"pd31","cat":"Prices and Discounts","exp":"A purchase price group is a group of items to which the same pricing characteristics apply. It can be used to assign discounts.","q":"Company XYZ wants to group items so a single procurement discount applies to a whole family. What is a purchase price group?","type":"single","opts":["A group of suppliers","A group of items to which the same pricing characteristics apply","A regional sales office","A group of currencies"],"cor":1},{"id":"pd32","cat":"Prices and Discounts","exp":"The Procurement User Profiles session is used to view and manage user defaults that determine the method of order entry and default values during order input.","q":"Company XYZ wants every buyer to start with the same defaults when entering a purchase order. Which session lets you maintain user defaults for the procurement order entry process?","type":"single","opts":["Sales User Profiles","Procurement User Profiles","Pricing Parameters","Business Partners"],"cor":1},{"id":"pd33","cat":"Prices and Discounts","exp":"To use a discount schedule in a discount matrix, it must be allocated to a standard sales order or purchase order — Used for Purchase Contracts, Sales Contracts, RFQs and Promotions check boxes must be cleared.","q":"Company XYZ links a discount matrix to a discount schedule for stepped discounts. What allocation is required for the discount schedule?","type":"single","opts":["It must be allocated to a standard sales order or purchase order (not to contracts/RFQs/promotions)","It must be allocated to all order origins","It must be allocated to RFQs only","It must be allocated to promotions only"],"cor":0},{"id":"pd34","cat":"Prices and Discounts","exp":"Price list is an attribute that can be assigned to several sold-to BPs and used as a matrix attribute to apply a common pricing or discount.","q":"Company XYZ wants to grant the same discount to every customer assigned to its 'Wholesale' price list. Which sales matrix attribute would you typically use?","type":"single","opts":["Item group","Price list","Currency","Sales office"],"cor":1},{"id":"pd35","cat":"Prices and Discounts","exp":"Minimum break type means the discount applies from the break value upward; Maximum means it applies up to that value.","q":"Company XYZ is defining a discount schedule and is unsure which break type to use. What is the difference between Minimum and Maximum break type?","type":"single","opts":["Minimum applies above the break value, Maximum applies up to the break value","Minimum is for sales, Maximum for purchase","Minimum applies in domestic, Maximum in international transactions","There is no difference; they are aliases"],"cor":0},{"id":"pd36","cat":"Prices and Discounts","exp":"After saving the discount schedule lines, you activate the discount schedule via Actions > Activate so it becomes usable.","q":"Company XYZ created a new discount schedule but cannot select it in the matrix. What must you do to a discount schedule before it can be used in a matrix?","type":"single","opts":["Print it","Activate it (Actions > Activate)","Delete its lines","Convert it to a price book"],"cor":1},{"id":"pd37","cat":"Prices and Discounts","exp":"Approving the sales order is the step that applies the total discount. The line discount is applied when the line is saved.","q":"Company XYZ wonders when exactly LN computes the total order discount. What happens at order line approval that triggers total discount calculation?","type":"single","opts":["Saving the order line","Approving the sales order applies the total discount; the line discount is applied at line save","Printing the order acknowledgement","Closing the order"],"cor":1},{"id":"pd38","cat":"Prices and Discounts","exp":"On the Sales Order Lines, the Selling tab > Line Discounts > Matrices tab shows the matrices (with type and description) that produced the discounts.","q":"Company XYZ's salesperson wants to verify which matrices were used for the discount on an order line. Where can you view this?","type":"single","opts":["Order header tab","Selling tab → Line Discounts → Matrices tab","Pricing Parameters","Order summary report"],"cor":1},{"id":"pd39","cat":"Prices and Discounts","exp":"Sales Total Discount Matrices is the session for specifying total-level sales discount matrices.","q":"Company XYZ wants to apply an additional total discount on top of line-level discounts. Which session is used to specify discount matrices for sales total discounts?","type":"single","opts":["Sales Line Discount Matrices","Sales Total Discount Matrices","Purchase Total Discount Matrices","Sales Price Matrices"],"cor":1},{"id":"pd40","cat":"Prices and Discounts","exp":"Update Default Purchase Price Book (Update Supplier Price Book) automatically updates the supplier price book when a purchase price is changed or added in Items – Purchase.","q":"Company XYZ wants the supplier price book to update automatically whenever an item's purchase price is changed in the Items – Purchase session. Which Pricing Parameters value enables this?","type":"single","opts":["Update Default Price Book","Update Default Purchase Price Book / Update Supplier Price Book","Recalculate Prices and Discounts","Price Date Type"],"cor":1},{"id":"som41","cat":"Sales Order Management","exp":"A sales order represents a customer agreement covering item, quantity, price, delivery date, and shipping/invoicing data.","q":"Company XYZ's sales rep just received an order from a customer and needs to record it. What is a sales order in Infor LN?","type":"single","opts":["An internal stock movement document","An agreement to deliver goods or services to a customer at agreed prices, quantities, and dates","A request to a supplier","A general ledger posting"],"cor":1},{"id":"som42","cat":"Sales Order Management","exp":"Sales orders use Sold-to, Ship-to, Invoice-to, and Pay-by BP roles. Buy-from is used in procurement.","q":"Company XYZ is mapping out which BP roles play a part in the order-to-cash flow. Which roles of a business partner are typically used in sales order processing? (Select all)","type":"multi","opts":["Sold-to BP","Ship-to BP","Invoice-to BP","Pay-by BP","Buy-from BP"],"cor":[0,1,2,3]},{"id":"som43","cat":"Sales Order Management","exp":"Sales Order Type controls the activities (quotation, approval, picking, shipping, invoicing, etc.) and is linked to a warehousing order type.","q":"Company XYZ needs different default behavior for normal orders, RMAs, and direct deliveries. What is the role of the Sales Order Type?","type":"single","opts":["It defines the customer","It defines the activities to be carried out for the order and is linked to a warehousing order type","It defines the currency only","It controls only the printout layout"],"cor":1},{"id":"som44","cat":"Sales Order Management","exp":"The standard sales order flow runs from creation → approval → warehousing release → shipment → invoicing → AR posting.","q":"Company XYZ is documenting its end-to-end sales process for new hires. Reorder the standard sales order process flow (1-6):","type":"order","items":["Create the sales order header and order lines","Approve the sales order","Release the order to warehousing (outbound)","Pick, ship and confirm the shipment","Generate the invoice","Process the invoice in Accounts Receivable"],"corOrd":[0,1,2,3,4,5]},{"id":"som45","cat":"Sales Order Management","exp":"The Sales Order Intake Workbench is the central session for entering and processing incoming sales orders.","q":"Company XYZ's order desk needs a single screen to manage incoming orders. Which session is the central work area to handle incoming sales orders?","type":"single","opts":["Sales Quotation Workbench","Sales Order Intake Workbench","Customer 360","Procurement Order Intake Workbench"],"cor":1},{"id":"som46","cat":"Sales Order Management","exp":"Customer 360 gives a consolidated view of a customer's orders, quotations, balances, contacts and other information.","q":"Company XYZ's sales team wants a 360° view of every customer (orders, invoices, balance, contacts) on one screen. What is the purpose of Customer 360?","type":"single","opts":["To send marketing emails","To provide a 360-degree view of the customer (orders, quotations, balances, contacts)","To configure tax codes","To plan production"],"cor":1},{"id":"som47","cat":"Sales Order Management","exp":"A sales quotation is an offer that may turn into a sales order if accepted; it is non-binding.","q":"Company XYZ wants to send a non-binding offer to a prospect before any commitment. What is a sales quotation?","type":"single","opts":["A finalized sales order","A non-binding offer of goods or services to a (prospective) customer","A purchase requisition","A backorder document"],"cor":1},{"id":"som48","cat":"Sales Order Management","exp":"After picking, the warehouse status moves toward 'Staged' before the actual shipment occurs.","q":"Company XYZ's warehouse picked a sales order line but it has not yet left the dock. What status indicates a sales order line has been picked but not yet shipped?","type":"single","opts":["Free","Staged (or similar warehousing status)","Invoiced","Closed"],"cor":1},{"id":"som49","cat":"Sales Order Management","exp":"A backorder represents the part of a sales order that was not delivered with the original shipment and is fulfilled later.","q":"Company XYZ promised 100 units but only 70 are available; the remaining 30 still need to be delivered. What is a backorder in Infor LN?","type":"single","opts":["A returned order from a customer","The remaining quantity of a sales order that could not be delivered in full and is delivered later","An order that exceeds the credit limit","A duplicated sales order"],"cor":1},{"id":"som50","cat":"Sales Order Management","exp":"Return orders are used to handle customer returns and to issue credit notes.","q":"Company XYZ's customer wants to return a defective product and receive a credit. Which order type is used to handle customer returns and credit notes?","type":"single","opts":["Sales contract","Return order","Cost-item order","Backorder"],"cor":1},{"id":"som51","cat":"Sales Order Management","exp":"Cost items are non-inventory items used in sales to invoice services or charges.","q":"Company XYZ wants to charge a non-stocked freight surcharge on its sales orders. What is a cost item in sales orders?","type":"single","opts":["An inventory item","A non-inventory item used to invoice charges (e.g., installation fees, freight, services)","A component of a BOM","A type of customer"],"cor":1},{"id":"som52","cat":"Sales Order Management","exp":"Additional cost sets bundle extra costs that should be added on top of the base sales price.","q":"Company XYZ wants to bundle insurance, packing, and freight as standard add-ons on certain orders. What is the purpose of additional cost sets?","type":"single","opts":["To add free items","To attach extra costs (e.g., freight, handling, installation) to a sales order or order line","To define quantity discounts","To configure tax codes"],"cor":1},{"id":"som53","cat":"Sales Order Management","exp":"A sales contract records the long-term agreed terms (prices, quantities, periods) that drive call-off sales orders.","q":"Company XYZ has a long-term agreement with a key customer for fixed prices and quantities. What is a sales contract used for?","type":"single","opts":["Recording one-time deliveries only","Storing long-term price/quantity/term agreements with a customer that act as a default for releases (sales orders)","Replacing the price book completely","Logging customer complaints"],"cor":1},{"id":"som54","cat":"Sales Order Management","exp":"Retro-billing handles retroactive price changes by generating supplemental debit/credit invoices for already invoiced lines.","q":"Company XYZ needs to bill a customer retroactively after a price change has been agreed. What is retro-billing?","type":"single","opts":["Reposting the same invoice","Issuing supplemental invoices or credit notes when a price changes retroactively for already invoiced orders","Sending a reminder for unpaid invoices","Calculating depreciation"],"cor":1},{"id":"som55","cat":"Sales Order Management","exp":"An installment plan splits the sales-order amount into multiple invoiced installments with their own due dates.","q":"Company XYZ sells expensive equipment and wants to invoice the customer in scheduled partial amounts. What is an installment plan?","type":"single","opts":["A schedule of partial invoices/payments for one sales order","A list of overdue invoices","A backorder follow-up","A type of pricing matrix"],"cor":0},{"id":"som56","cat":"Sales Order Management","exp":"Order blocking prevents the order or specific steps (release, ship, invoice) from continuing until the block is removed.","q":"Company XYZ wants the system to stop credit-risky orders from being shipped automatically. Why is sales order blocking used?","type":"single","opts":["To delete an order automatically","To prevent specific activities (e.g., shipping or invoicing) until conditions are resolved (credit, approval, compliance)","To archive orders","To merge two orders"],"cor":1},{"id":"som57","cat":"Sales Order Management","exp":"Credit blocks, margin control blocks, and global trade compliance blocks are common reasons for a blocked sales order.","q":"Company XYZ wants to know all situations that can trigger an automatic block. Which conditions can typically result in a sales order being blocked? (Select all)","type":"multi","opts":["Credit limit exceeded","Margin below threshold","Global trade compliance issue","Random selection by the system"],"cor":[0,1,2]},{"id":"som58","cat":"Sales Order Management","exp":"Margin Control compares actual sales margin against thresholds and can block a line/order when the margin is insufficient.","q":"Company XYZ's CFO wants to prevent sales reps from selling below a target margin. What is the function of the Margin Control feature?","type":"single","opts":["It calculates depreciation","It checks the margin between sales price and cost and blocks the order if the margin is too low","It controls warehouse capacity","It manages currencies"],"cor":1},{"id":"som59","cat":"Sales Order Management","exp":"Global Trade Compliance screens parties and items against export-control rules (embargoes, licenses, denied-party lists).","q":"Company XYZ exports goods and must comply with denied-party and embargo lists. What does Global Trade Compliance handle on a sales order?","type":"single","opts":["Embargo and denied-party screening, license checks, and export control","Tax-only compliance","Warehouse picking","Customer complaints"],"cor":0},{"id":"som60","cat":"Sales Order Management","exp":"In consignment sales, the supplier delivers goods to the customer location but retains ownership until the customer consumes or sells them.","q":"Company XYZ stores stock at a customer's premises but the customer only pays once it consumes the stock. What is consignment in sales?","type":"single","opts":["Goods stored at the customer site that remain owned by the supplier until consumed/used","Free samples sent to a prospect","Internal stock transfers","A type of return order"],"cor":0},{"id":"som61","cat":"Sales Order Management","exp":"Inventory commitment reserves on-hand or planned inventory for a specific sales order line so it cannot be allocated elsewhere.","q":"Company XYZ wants to reserve a specific quantity for a specific order so no other order can grab it. What is an inventory commitment on a sales order?","type":"single","opts":["A general manager approval","A reservation/allocation of inventory to fulfill the sales order line","A return policy entry","A discount level"],"cor":1},{"id":"som62","cat":"Sales Order Management","exp":"Inventory 360 consolidates all inventory information for an item: stock, allocations, reservations, planned receipts/issues.","q":"Company XYZ's planners want one screen showing on-hand, allocated, and incoming stock by item and warehouse. What does Inventory 360 provide?","type":"single","opts":["A 360-degree view of an item's inventory across warehouses, including on-hand, allocated, and planned","A view of customer balances only","Tax code overview","Production planning view only"],"cor":0},{"id":"som63","cat":"Sales Order Management","exp":"A sales user profile holds defaults (office, order type, warehouse, series) that fill in automatically when a user creates a sales order.","q":"Company XYZ wants every salesperson to start with their own personalized defaults. What is the role of a sales user profile?","type":"single","opts":["It controls payment methods","It defines defaults for sales order entry: sales office, order type, warehouse, series","It controls tax codes only","It is required for users in Finance only"],"cor":1},{"id":"som64","cat":"Sales Order Management","exp":"Sales user profile contains Order, Quotation, and Contract series. Invoice numbering is governed by Finance/AR.","q":"Company XYZ is configuring a new sales user profile and needs to assign default series. Which series are typically defined in a sales user profile? (Select all)","type":"multi","opts":["Order Series","Quotation Series","Contract Series","Invoice Series (AR)"],"cor":[0,1,2]},{"id":"som65","cat":"Sales Order Management","exp":"Approving the sales order applies total-level discounts, sets the order to approved, and produces the acknowledgement report.","q":"Company XYZ's sales rep clicks Approve on a freshly entered order. What happens?","type":"single","opts":["The order is deleted","Total discount is applied, the order is released to the next steps, and the Sales Order Acknowledgement/RMA report is produced","The customer is invoiced immediately","Stock is shipped automatically"],"cor":1},{"id":"som66","cat":"Sales Order Management","exp":"Sold-to BP is the buying party; Ship-to BP is the delivery address. They may differ for chain delivery scenarios.","q":"Company XYZ delivers to a different address than the customer's billing address. What is the difference between Sold-to BP and Ship-to BP?","type":"single","opts":["Both are always identical","Sold-to is the customer placing the order; Ship-to is the address where goods are delivered","Sold-to is the supplier; Ship-to is the customer","They are different currencies"],"cor":1},{"id":"som67","cat":"Sales Order Management","exp":"An RMA authorises a customer to return material; LN can issue an RMA document and tie the return order to it.","q":"Company XYZ requires the customer to obtain authorization before shipping anything back. What is an RMA (Return Material Authorization)?","type":"single","opts":["An approval allowing a customer to return goods, typically used for credit note creation","A purchase order for spares","A type of warehouse order","A way to block an order"],"cor":0},{"id":"som68","cat":"Sales Order Management","exp":"Sales Order Acknowledgement is the document produced upon approval to confirm the order to the customer.","q":"Company XYZ wants to send a confirmation document to the customer once the order is approved. Which sales document is normally produced after order approval to confirm details to the customer?","type":"single","opts":["Invoice","Sales Order Acknowledgement","Picking list","Statement"],"cor":1},{"id":"som69","cat":"Sales Order Management","exp":"Sales Order Parameters configure behaviour like default warehouse, history retention, recalculation, etc., for the whole company.","q":"Company XYZ wants to centrally control default behavior for all sales orders (numbering, default order type, etc.). What are sales order parameters used for?","type":"single","opts":["To globally control behavior of sales order processing (defaults, checks, history)","To define users","To define carriers","To classify customers"],"cor":0},{"id":"som70","cat":"Sales Order Management","exp":"Sales order history archives completed sales order information for traceability and reporting.","q":"Company XYZ wants auditors to see closed orders without cluttering the active order list. What is the function of sales order history?","type":"single","opts":["Storing closed/completed sales order data for reporting and traceability","Live order processing","Pricing simulation","Tax declaration"],"cor":0},{"id":"som71","cat":"Sales Order Management","exp":"Order Origin classifies how the sales order was created (manual entry, EDI, web service, planning, etc.).","q":"Company XYZ wants to know whether an order came from EDI, the web shop, or manual entry. What does the Order Origin field on a sales order indicate?","type":"single","opts":["The currency of the order","The source/origin of the order (e.g., manual, EDI, web, planning)","The company code","The shipping carrier"],"cor":1},{"id":"som72","cat":"Sales Order Management","exp":"Adjustment orders allow correcting inventory quantities (and related postings) outside of a normal sales/purchase flow.","q":"Company XYZ needs to correct a small detail (price, quantity) on an already-shipped sales order. What is the purpose of an adjustment order in sales?","type":"single","opts":["To correct inventory quantities or values without a regular sales transaction","To create a quotation","To approve invoices","To assign a price list"],"cor":0},{"id":"som73","cat":"Sales Order Management","exp":"Free status indicates the order line has not yet progressed to release/picking/shipping.","q":"Company XYZ's order line keeps showing the status 'Free' instead of progressing. Why might an order line remain in 'Free' status?","type":"single","opts":["It has not yet been approved/released to warehousing","It has been invoiced","It has been deleted","It has been cancelled"],"cor":0},{"id":"som74","cat":"Sales Order Management","exp":"A Number Group bundles series; first-free numbers are issued within a series of a number group.","q":"Company XYZ wants document numbers to follow specific ranges per document type and site. What is a Number Group in LN?","type":"single","opts":["A folder for item codes","A grouping of one or more series that determines numbering rules for documents","A group of business partners","A pricing strategy"],"cor":1},{"id":"som75","cat":"Sales Order Management","exp":"Default series codes for a user are defined in the Sales User Profile.","q":"Company XYZ's user wants their sales orders to use a personal series by default. Where is the default series code that the user gets when creating a sales order set?","type":"single","opts":["Pricing Parameters","Sales User Profile","General Ledger","Item master"],"cor":1},{"id":"som76","cat":"Sales Order Management","exp":"A sales order needs a sold-to BP, sales-enabled item(s), and a warehouse to ship from. Production schedules are not required to enter the order.","q":"Company XYZ is going live and the consultant lists prerequisites for entering the first sales order. Which master data must exist before a sales order can be entered? (Select all)","type":"multi","opts":["Sold-to business partner","Item (sales)","Warehouse","Production schedule"],"cor":[0,1,2]},{"id":"som77","cat":"Sales Order Management","exp":"Sales Order Types defines the activities and links the sales order type to a warehousing order type.","q":"Company XYZ needs to control which warehousing order type fires when a particular sales order type is approved. Which session is used to maintain the link between sales order types and warehousing order types?","type":"single","opts":["Sales Order Types","Sales Quotation Types","Pricing Parameters","Procurement Order Types"],"cor":0},{"id":"som78","cat":"Sales Order Management","exp":"Self-billing means the customer issues the invoice document; the supplier records the matching self-billed invoice.","q":"Company XYZ has a customer who creates and pays its own purchase invoices automatically based on receipts. What is Customer Self-Billing?","type":"single","opts":["The customer creates the supplier invoice themselves; the supplier processes the resulting self-billed invoice","The customer pays before the order","The customer adjusts pricing","A type of statement"],"cor":0},{"id":"som79","cat":"Sales Order Management","exp":"Direct delivery (drop shipment) sends the goods from the supplier straight to the customer; the seller never holds stock.","q":"Company XYZ wants its supplier to ship goods directly to the end customer, bypassing its own warehouse. What does Direct Delivery mean for a sales order?","type":"single","opts":["The supplier ships goods directly from a supplier to the customer, bypassing the seller's warehouse","The customer picks up goods at the warehouse","Stock is consumed from consignment","Delivery is internal between sites"],"cor":0},{"id":"som80","cat":"Sales Order Management","exp":"Price List for Direct Delivery assigns a price book specifically for the direct-delivery process.","q":"Company XYZ uses different prices when an order is direct-delivered. What is the purpose of the Price List for Direct Delivery field on a Sold-to BP?","type":"single","opts":["To assign a default price book that applies for direct delivery (drop-ship) flows","To manage tax for direct delivery","To set warehouse defaults","To override the credit limit"],"cor":0},{"id":"som81","cat":"Sales Order Management","exp":"Order Discount is the BP's default order-level discount percentage that is proposed on sales orders.","q":"Company XYZ wants every order from a specific customer to automatically receive a 5% header discount. What is the role of the Order Discount field on the Sold-to BP?","type":"single","opts":["Default order discount percentage applied to sales orders for that BP","It is the maximum line discount allowed","It is a tax exemption rate","It defines the bonus for the salesperson"],"cor":0},{"id":"som82","cat":"Sales Order Management","exp":"Release Sales Orders to Warehousing triggers the warehousing/outbound order so picking and shipping can be performed.","q":"Company XYZ needs to send approved sales order lines to the warehouse for picking. Which session is used to release approved sales order lines to the warehouse?","type":"single","opts":["Release Sales Orders to Warehousing","Sales Order Acknowledgement","Inventory 360","Sales Quotations"],"cor":0},{"id":"som83","cat":"Sales Order Management","exp":"The Sales Order Acknowledgement is sent to the customer to confirm the approved order details.","q":"Company XYZ wants to print or email the customer a formal acknowledgement after order approval. What is the purpose of Sales Order Acknowledgement printing?","type":"single","opts":["To confirm to the customer the agreed details (item, quantity, price, dates) of the approved order","To deliver goods","To create a credit note","To reverse a posting"],"cor":0},{"id":"som84","cat":"Sales Order Management","exp":"The Invoicing module's Compose/Print/Post Invoices session generates sales invoices from invoiceable lines (shipped goods, cost items, instalments).","q":"Company XYZ needs to invoice customers after shipments are confirmed. Which session lets you generate sales invoices from confirmed shipments / cost items?","type":"single","opts":["Compose/Print/Post Invoices (Invoicing module)","Sales Order Intake Workbench","Pricing Parameters","Inventory 360"],"cor":0},{"id":"som85","cat":"Sales Order Management","exp":"A sales contract is the long-term agreement; individual sales orders are placed under (released from) it for actual deliveries.","q":"Company XYZ's consultant explains how a contract differs from a normal order. What is the difference between a sales contract and a normal sales order?","type":"single","opts":["A sales contract is an umbrella agreement; sales orders (call-offs) are released against it","A sales contract is an invoice","A sales contract is a return order","There is no difference"],"cor":0},{"id":"som86","cat":"Sales Order Management","exp":"Warehouse + Warehousing Order Type (linked via Sales Order Type) define how the line is handled in WH (picking, shipping, etc.).","q":"Company XYZ wants to control how the warehouse picks, packs, and ships each order line. Which sales order line attribute most directly drives the warehousing handling rules?","type":"single","opts":["The customer's bank account","The Warehouse and the Warehousing Order Type linked to the Sales Order Type","The currency","The pay-by BP"],"cor":1},{"id":"som87","cat":"Sales Order Management","exp":"After invoicing and posting, the line is marked Invoiced; once all activities are done, the line/order is Closed.","q":"Company XYZ closed an order — it was shipped, invoiced, and the invoice is posted. What status is reached after the invoice is created and posted for a sales order?","type":"single","opts":["Free","Invoiced/Closed (depending on remaining activities)","Approved","Returned"],"cor":1},{"id":"som88","cat":"Sales Order Management","exp":"ATP/CTP checks (often surfaced via Inventory 360 and during order entry) tell the user when stock can be promised.","q":"Company XYZ's salesperson is on the phone with a customer and needs to promise a delivery date in real time. Which feature lets the salesperson see live availability before promising a delivery date?","type":"single","opts":["Tax Handling","ATP/CTP (Available-to-Promise / Capable-to-Promise) checks via Inventory 360 or order entry","Discount Schedule","Pricing Parameters"],"cor":1},{"id":"som89","cat":"Sales Order Management","exp":"Order lines flow Free → Approved → Shipped → Invoiced as activities are completed.","q":"Company XYZ's trainer is testing a new hire on the order line lifecycle. What is the typical sequence of statuses for an order line: (a) Free, (b) Approved, (c) Invoiced, (d) Shipped?","type":"single","opts":["a → b → d → c","c → b → a → d","d → a → b → c","a → c → b → d"],"cor":0},{"id":"som90","cat":"Sales Order Management","exp":"Contracts give automatic price/term application, contract-vs-call-off monitoring, and improved demand input. They do not bypass approvals.","q":"Company XYZ is debating whether to migrate key customers from individual orders to contracts. Which advantages does using sales contracts give? (Select all)","type":"multi","opts":["Pre-agreed prices and terms automatically applied to call-off orders","Easier monitoring of called and remaining quantities","Automatic warehousing release without approval","Better basis for forecasts and demand planning"],"cor":[0,1,3]},{"id":"wh91","cat":"Warehousing","exp":"A warehouse is the physical/logical location where inventory is received, stored, picked, and shipped; it has its own configuration.","q":"Company XYZ wants to model a physical storage location in LN. What is a warehouse in Infor LN?","type":"single","opts":["A storage location used to receive, store, and ship inventory; it has its own master data and procedures","A type of business partner","Only a financial entity","A purchase order header"],"cor":0},{"id":"wh92","cat":"Warehousing","exp":"Warehouse master data includes code, type, address, calendar, default settings — but not the default sales price (item-level data).","q":"Company XYZ is setting up its first warehouse master data. Which warehouse master data is typically maintained? (Select all)","type":"multi","opts":["Warehouse code and description","Warehouse type (e.g., normal, consignment, transit)","Default sales price","Calendar/availability"],"cor":[0,1,3]},{"id":"wh93","cat":"Warehousing","exp":"Warehousing orders are the working documents used to perform inbound, outbound, and transfer goods movements.","q":"Company XYZ approves a sales order and a warehousing document is generated automatically to drive the picking process. What is the function of a warehousing order?","type":"single","opts":["It records goods movements (inbound, outbound, transfer) and drives picking/shipping/receiving","It is a type of sales contract","It is the customer invoice","It is a tax document"],"cor":0},{"id":"wh94","cat":"Warehousing","exp":"Warehousing orders are generated from sales, purchase, production, and manual sources; tax declarations don't produce WH orders.","q":"Company XYZ wants to know all upstream documents that can trigger warehousing activity. Which warehousing order origins can produce a warehousing order? (Select all)","type":"multi","opts":["Sales order","Purchase order","Production order","Manual warehouse order","Tax declaration"],"cor":[0,1,2,3]},{"id":"wh95","cat":"Warehousing","exp":"The warehousing order type controls which warehousing activities run and in what order/automation level.","q":"Company XYZ wants different handling steps (e.g., inspection, put-away rules) per warehouse order category. What is the warehousing order type used for?","type":"single","opts":["It defines the activities (receipt, inspection, put-away, picking, shipping) and their sequence","It defines the customer","It defines the price book","It is purely a printout setting"],"cor":0},{"id":"wh96","cat":"Warehousing","exp":"Inbound flow: WH order → receipt → inspection (optional) → put-away.","q":"Company XYZ's new warehouse clerk needs to learn the inbound flow. Reorder the standard inbound (receipt) process (1-4):","type":"order","items":["Generate the warehouse receipt order","Receive the goods (Receipt)","Inspect the goods (Inspection, if applicable)","Put-away into final storage location (Put-away)"],"corOrd":[0,1,2,3]},{"id":"wh97","cat":"Warehousing","exp":"Outbound flow: outbound order → picking → staging/loading → shipment confirmation.","q":"Company XYZ's new warehouse clerk also needs to learn the outbound flow. Reorder the standard outbound (shipment) process (1-4):","type":"order","items":["Generate the warehouse outbound order","Pick the goods (Picking)","Stage and load the shipment","Confirm/Ship the shipment"],"corOrd":[0,1,2,3]},{"id":"wh98","cat":"Warehousing","exp":"A shipment groups one or more outbound order lines that are physically delivered together.","q":"Company XYZ groups outbound orders together for one truckload. What is a shipment in LN warehousing?","type":"single","opts":["The grouping of one or more outbound order lines into a deliverable consignment to a single destination","A type of sales contract","A pricing matrix","A purchase invoice"],"cor":0},{"id":"wh99","cat":"Warehousing","exp":"Inventory transfers move stock between warehouses or between locations of the same warehouse.","q":"Company XYZ wants to move stock between two of its own warehouses. What is an inventory movement / transfer order?","type":"single","opts":["A movement of stock between warehouses or locations within a warehouse","A customer return","A purchase invoice correction","A tax adjustment"],"cor":0},{"id":"wh100","cat":"Warehousing","exp":"LN supports lot, serial and effectivity-unit tracking; there is no 'tax-only' tracking.","q":"Company XYZ tracks items by lot, serial, batch and effective date. Which inventory tracking attributes can LN handle on items? (Select all)","type":"multi","opts":["Lot control","Serial control","Effectivity unit","Tax-only tracking"],"cor":[0,1,2]},{"id":"wh101","cat":"Warehousing","exp":"A lot identifies a batch of items sharing common characteristics like production date, expiry date, or quality.","q":"Company XYZ tracks pharmaceuticals by manufacturing batch with shared expiration dates. What is a lot?","type":"single","opts":["A grouping of items that share characteristics (e.g., production batch, expiry date)","A specific customer","A type of invoice","A warehouse zone"],"cor":0},{"id":"wh102","cat":"Warehousing","exp":"A serial number uniquely identifies a single physical item, used for traceability and warranty.","q":"Company XYZ tracks each individual high-value machine through its lifecycle. What is a serial number?","type":"single","opts":["A unique identifier for an individual physical item","A combined customer-supplier ID","A type of price list","An item group"],"cor":0},{"id":"wh103","cat":"Warehousing","exp":"Cross-docking sends incoming receipts straight to outbound to fulfill demand, skipping the storage step.","q":"Company XYZ wants incoming goods that match an open backorder to be redirected straight to outbound staging without being put away first, dynamically when the receipt happens. What is dynamic cross-docking?","type":"single","opts":["Receiving incoming goods and shipping them out without putting them away in storage, often automatically planned","A type of cycle count","Manual stock counting","Production scheduling"],"cor":0},{"id":"wh104","cat":"Warehousing","exp":"Cross-docking reduces handling, storage time and cost while accelerating order fulfilment.","q":"Company XYZ wants to evaluate whether to introduce cross-docking. What is the benefit of cross-docking?","type":"single","opts":["Faster delivery and reduced handling/storage costs","Higher inventory levels","Slower deliveries","Automatic invoicing"],"cor":0},{"id":"wh105","cat":"Warehousing","exp":"Packing definitions describe the packaging hierarchy (e.g., box → case → pallet) for an item.","q":"Company XYZ ships items in standard cartons, pallets, and full truckloads. What is a packing definition?","type":"single","opts":["Specification of how items are packed (e.g., units per case, cases per pallet)","A list of customers","A pricing rule","A document type"],"cor":0},{"id":"wh106","cat":"Warehousing","exp":"Handling units are physical containers (with their own ID, label) that group items for storage and shipping.","q":"Company XYZ wants a single tracked container that bundles multiple items for shipping and inventory. What is a handling unit?","type":"single","opts":["A physical container (carton, pallet, box) holding goods, identified for tracking and shipping","A type of business partner","A price book entry","A warehouse code"],"cor":0},{"id":"wh107","cat":"Warehousing","exp":"Cycle counting counts subsets of items repeatedly so accuracy is maintained without halting operations.","q":"Company XYZ wants to count a small percentage of stock daily instead of shutting down for an annual count. What is cycle counting?","type":"single","opts":["A periodic counting of part of the inventory to keep records accurate without a full stocktake","A type of production cycle","Counting employees","Counting orders"],"cor":0},{"id":"wh108","cat":"Warehousing","exp":"Cycle counts are recurring partial counts; a full physical inventory counts everything at once and usually stops other operations.","q":"Company XYZ's auditor asks how the two counting approaches differ. What is the difference between cycle counting and a full physical inventory?","type":"single","opts":["Cycle counting counts subsets continuously; full physical inventory counts everything at one point in time","They are the same","Cycle counting is only for serialized items","Full physical inventory is automatic"],"cor":0},{"id":"wh109","cat":"Warehousing","exp":"Adjustment orders correct stock quantities/values when there's a discrepancy (cycle count differences, damages, etc.).","q":"Company XYZ found a discrepancy between physical and system stock and needs to correct it. What is an inventory adjustment order?","type":"single","opts":["A document used to correct stock quantities (and corresponding values) outside of normal flows","A type of sales order","A type of customer","A pricing rule"],"cor":0},{"id":"wh110","cat":"Warehousing","exp":"Inventory planning balances service level vs. carrying cost: stocking strategy, safety stock, replenishment timing.","q":"Company XYZ wants to ensure stock is on hand when needed without overstocking. What is inventory planning concerned with?","type":"single","opts":["Determining how much stock to keep, where, and when to replenish","Customer credit checks","Tax calculation","Salary processing"],"cor":0},{"id":"wh111","cat":"Warehousing","exp":"Receipt processing flows through Warehouse Receipt → Inspection (if used) → Put-away. Sales Order Intake is for sales, not receipts.","q":"Company XYZ is documenting which sessions warehouse staff use during receipts. Which sessions are typically used in receipt processing? (Select all)","type":"multi","opts":["Warehouse Receipt","Inspection","Put-away (Receive Inventory to Location)","Sales Order Intake Workbench"],"cor":[0,1,2]},{"id":"wh112","cat":"Warehousing","exp":"Inspection checks quality after receipt and routes goods to accepted stock, rejected stock, or rework.","q":"Company XYZ wants to verify quality of incoming goods before they are usable. What is the purpose of the inspection step?","type":"single","opts":["To verify quality and decide whether received goods are accepted, rejected or reworked","To pay the supplier","To create the picking list","To approve the sales order"],"cor":0},{"id":"wh113","cat":"Warehousing","exp":"Put-away moves received and accepted goods to their final storage location.","q":"Company XYZ wants received goods to be moved from the dock to a storage location. What does a put-away activity do?","type":"single","opts":["Moves received goods from the receipt area to their designated storage location","Picks goods for shipping","Cancels the receipt","Triggers depreciation"],"cor":0},{"id":"wh114","cat":"Warehousing","exp":"Picking strategies define how LN selects inventory to fulfill picks: FIFO, LIFO, FEFO, fixed location, etc.","q":"Company XYZ wants to control whether pickers go in single-line, batched, or zone-based mode. What is a picking strategy?","type":"single","opts":["Rules used to choose which inventory (location/lot/serial) is picked to fulfill an outbound line (e.g., FIFO, FEFO)","A way to define discounts","A purchasing rule","A tax-determination rule"],"cor":0},{"id":"wh115","cat":"Warehousing","exp":"FIFO picks the oldest available stock first; commonly used to manage age/expiry.","q":"Company XYZ wants the oldest stock to ship first to minimize age in warehouse. What does FIFO mean in warehousing?","type":"single","opts":["First In, First Out — oldest stock is picked first","First Internal, First Outsourced","Final Inspection For Outbound","Free Inventory For Order"],"cor":0},{"id":"wh116","cat":"Warehousing","exp":"FEFO is critical for products with expiry dates (food, pharma): the soonest-expiring lots are picked first.","q":"Company XYZ ships perishable goods and must ship the closest-to-expiry stock first. What is FEFO?","type":"single","opts":["First Expired, First Out — picks goods nearest to expiry first","Final Entry For Order","First Entry For Output","Fastest Equipment For Operation"],"cor":0},{"id":"wh117","cat":"Warehousing","exp":"Staging is the intermediate step between picking and shipping where picked goods are gathered for loading.","q":"Company XYZ wants picked goods to wait in a marshalling area before loading. What is staging?","type":"single","opts":["Holding picked goods in a staging area until ready to load/ship","A type of inventory count","Receiving inspection","Customer credit hold"],"cor":0},{"id":"wh118","cat":"Warehousing","exp":"Standard cost, FIFO, LIFO, and MAUC are common valuation methods. 'Customer-specific cost' isn't a standard LN method.","q":"Company XYZ is choosing how inventory will be valued. Which inventory valuation methods are commonly used in LN? (Select all)","type":"multi","opts":["Standard cost","FIFO","LIFO","Moving Average Unit Cost (MAUC)","Customer-specific cost"],"cor":[0,1,2,3]},{"id":"wh119","cat":"Warehousing","exp":"ABC classifies items A/B/C by value or movement; A items get the most management attention.","q":"Company XYZ wants to focus tightest counting and security on the most valuable items. What does ABC analysis classify?","type":"single","opts":["Items by their importance/value (A high, B medium, C low) to focus management effort","Customers by region","Suppliers by country","Tax codes by rate"],"cor":0},{"id":"wh120","cat":"Warehousing","exp":"Warehouse calendars define when the warehouse is operational; planned dates respect non-working days.","q":"Company XYZ has different operating days and shifts per warehouse site. What is the role of warehouse calendars?","type":"single","opts":["They define availability/working days for the warehouse, affecting planned dates","They control depreciation periods","They define tax periods","They are mandatory for invoicing"],"cor":0},{"id":"wh121","cat":"Warehousing","exp":"Transit warehouses hold goods that have left one warehouse but not yet arrived at the destination, supporting in-transit visibility/ownership.","q":"Company XYZ ships goods from one warehouse to another and needs to track them while in transit. What is a transit warehouse used for?","type":"single","opts":["To track stock that is in transit between two warehouses (e.g., during inter-site transfers)","Customer returns only","Production scrap","Tax reporting"],"cor":0},{"id":"wh122","cat":"Warehousing","exp":"Consignment warehouses store stock not yet owned by the holder; ownership transfers upon consumption/sale.","q":"Company XYZ ships stock to a customer location but retains ownership until the customer uses it. What is a consignment warehouse?","type":"single","opts":["A warehouse holding goods owned by a supplier or a customer until consumed/sold","A scrap warehouse","A purely virtual warehouse","Only a financial concept"],"cor":0},{"id":"wh123","cat":"Warehousing","exp":"Inventory analysis sessions and Inventory 360 surface stock levels, valuation, and movement history.","q":"Company XYZ's warehouse manager wants live insight into inventory levels and movements. Which session lets you analyze inventory levels, value, and movements?","type":"single","opts":["Inventory analysis / Inventory 360","Pricing Parameters","Sales Order Type","Tax Codes by Country"],"cor":0},{"id":"wh124","cat":"Warehousing","exp":"A wave bundles outbound orders into a release window so picking/shipping can be optimized.","q":"Company XYZ groups multiple outbound orders into one batch released to picking together. What is a wave in warehouse picking?","type":"single","opts":["A grouping of outbound orders/lines released together for efficient picking and shipping","A type of warehouse calendar","A pricing rule","A type of packaging"],"cor":0},{"id":"wh125","cat":"Warehousing","exp":"Zones group locations by purpose (bulk vs. pick face, cold vs. ambient, hazardous vs. normal) for routing rules.","q":"Company XYZ subdivides each warehouse into ambient, refrigerated, and bulk areas. What is a zone (location zone) in a warehouse?","type":"single","opts":["A logical grouping of locations sharing characteristics (e.g., bulk, fast-mover, cold storage)","A regional sales office","A pricing zone","A customer area"],"cor":0},{"id":"wh126","cat":"Warehousing","exp":"Warehousing procedures specify which activities run, in what order, and how (auto-execute vs. manual) for an order type.","q":"Company XYZ wants standard step sequences (receive → inspect → put away) defined once and reused. What does a warehousing procedure define?","type":"single","opts":["The sequence and behavior of warehousing activities (auto/manual, mandatory/optional) per order type","Customer credit policy","Tax calculation","Sales order pricing"],"cor":0},{"id":"wh127","cat":"Warehousing","exp":"Receipts, issues/shipments, adjustments, and cycle-count corrections all change on-hand quantities.","q":"Company XYZ wants to know which transactions actually move on-hand quantities. Which inventory transactions affect on-hand quantities? (Select all)","type":"multi","opts":["Receipt","Issue / Shipment","Inventory adjustment","Cycle count discrepancy posting","Tax declaration"],"cor":[0,1,2,3]},{"id":"wh128","cat":"Warehousing","exp":"Allocated stock is reserved for a specific order/demand; it's on-hand but not free to allocate elsewhere.","q":"Company XYZ has 100 pieces in stock but 30 are reserved for an open sales order. What is allocated stock?","type":"single","opts":["Stock that is reserved/committed to specific demand and not freely available","Stock that has been written off","Stock that has been sold and shipped","Stock that has been counted"],"cor":0},{"id":"wh129","cat":"Warehousing","exp":"Available inventory subtracts allocations/blocks from physical (on-hand) to show what is freely usable.","q":"Company XYZ's planner is confused that on-hand and available quantities differ. What is the difference between physical inventory and available inventory?","type":"single","opts":["Physical = total on-hand; Available = on-hand minus allocations/blocked stock","They are the same","Available is bigger than physical","Physical excludes lots"],"cor":0},{"id":"wh130","cat":"Warehousing","exp":"RF/mobile warehousing lets workers scan and confirm WH transactions in real time using handheld terminals.","q":"Company XYZ wants warehouse operators to confirm picks via handheld devices on the floor. What is RF (Radio Frequency) / mobile warehousing used for?","type":"single","opts":["Real-time barcode-based capture of warehouse activities (receipt, picking, count) on handheld devices","Streaming sales data to customers","Tax registration","Producing financial statements"],"cor":0},{"id":"wh131","cat":"Warehousing","exp":"Traceability is critical for recall management, warranty, and meeting industry regulations (food, pharma, automotive, etc.).","q":"Company XYZ must respond to a regulatory recall by tracing every unit of a defective batch. Why is lot/serial traceability important?","type":"single","opts":["To track origin, quality, and shipment of items for recalls, warranty, and regulatory compliance","To configure tax codes","To set sales prices","To rank suppliers"],"cor":0},{"id":"wh132","cat":"Warehousing","exp":"Receipt confirmation produces a goods receipt note documenting received quantities and lot/serial info.","q":"Company XYZ's clerk confirms goods received and the system prints/sends a document. Which document is typically generated at receipt confirmation?","type":"single","opts":["Goods Receipt Note (GRN) / Receipt confirmation document","Invoice","Sales acknowledgement","Quotation"],"cor":0},{"id":"wh133","cat":"Warehousing","exp":"Blocked stock is on-hand but cannot be used for fulfilment due to quality holds, expirations, or customer-specific blocks.","q":"Company XYZ has stock that failed inspection and cannot be sold yet. What is blocked stock?","type":"single","opts":["Stock that is unavailable for allocation/shipment (e.g., quality block, customer-specific block)","Stock that has been deleted","Stock in transit only","Stock in the receiving area"],"cor":0},{"id":"wh134","cat":"Warehousing","exp":"Revaluation changes the booked value of inventory when costs/rates change; it produces value-only postings.","q":"Company XYZ's accountant wants to update the value of inventory after a major price change. What does the term 'inventory revaluation' mean?","type":"single","opts":["Updating the financial value of inventory based on a new cost or rate (e.g., standard cost change, FX revaluation)","Counting inventory","Selling old inventory","Customer discount"],"cor":0},{"id":"wh135","cat":"Warehousing","exp":"Positive adjustments raise inventory value and post the counter-amount to an inventory gain/variance account; negative ones do the opposite.","q":"Company XYZ counts stock and finds 5 more pieces than the system showed. Which effect does a positive cycle-count adjustment have on the GL?","type":"single","opts":["It increases the inventory account and posts a counter-entry to an inventory variance/gain account","It decreases inventory only","It posts only to AR","It has no GL effect"],"cor":0},{"id":"wh136","cat":"Warehousing","exp":"Warehouse Order Type configures the automation level (auto vs. manual) of each activity in the procedure.","q":"Company XYZ wants to control whether a warehousing flow runs fully manually or fully automatically. What is the role of Warehouse Order Type in automation level?","type":"single","opts":["It determines whether activities (receipt, inspection, put-away, pick, ship) run automatically or require manual confirmation","It sets the customer's credit limit","It sets the price book","It defines depreciation"],"cor":0},{"id":"wh137","cat":"Warehousing","exp":"Kits group multiple component items into one shippable bundle, supported via packing definitions/handling units.","q":"Company XYZ ships pre-assembled bundles (printer + cable + cartridge) under one SKU. What is a kit (packing definition usage) in warehousing?","type":"single","opts":["A predefined combination of items packed and shipped together as one logical unit","An item with negative stock","A type of customer","A pricing rule"],"cor":0},{"id":"wh138","cat":"Warehousing","exp":"Inter-site transfers usually require a transit warehouse and, for cross-financial-company moves, internal-invoicing/multisite setup.","q":"Company XYZ moves stock between two production sites. What does a transfer order between two sites typically need in addition to standard transfer master data?","type":"single","opts":["A transit warehouse and inter-company / inter-site setup if both belong to different financial companies","A new sales tax code","A new currency","A new customer"],"cor":0},{"id":"wh139","cat":"Warehousing","exp":"Packing lists/shipping docs show shipped items, packaging, and BPs. Credit balance is not typically printed there.","q":"Company XYZ's customer asks what should appear on the packing list. Which information typically appears on a packing list / shipping document? (Select all)","type":"multi","opts":["Item, quantity, lot/serial info","Handling units / packaging hierarchy","Ship-to / Sold-to BP","Customer credit balance"],"cor":[0,1,2]},{"id":"wh140","cat":"Warehousing","exp":"The link from sales order type to warehousing order type is set up in the Sales Order Types session.","q":"Company XYZ needs to control which warehousing order type is used per sales order type. Where do you typically link a sales order type to a warehousing order type?","type":"single","opts":["In the Sales Order Types session (Sales module)","In Pricing Parameters","In Tax Codes by Country","In the Item master"],"cor":0},{"id":"cp141","cat":"Cost Price Calculation and Valuation","exp":"Standard cost is the pre-calculated baseline cost; variances arise when actuals differ. It supports stable financial reporting.","q":"Company XYZ values inventory at a fixed planned cost rather than a moving actual cost. What is a standard cost in Infor LN?","type":"single","opts":["A pre-calculated cost of an item used to value transactions; differences from actual costs become variances","The current sales price","The supplier's invoice price","The customer's price"],"cor":0},{"id":"cp142","cat":"Cost Price Calculation and Valuation","exp":"Material, labor (operations), overhead surcharges, and subcontracting are standard cost components. Credit cost is not part of cost price.","q":"Company XYZ is rolling up the standard cost for a manufactured item. Which cost components are typically included? (Select all)","type":"multi","opts":["Material cost","Operation/labor cost","Overhead (surcharges)","Subcontracting cost","Customer credit cost"],"cor":[0,1,2,3]},{"id":"cp143","cat":"Cost Price Calculation and Valuation","exp":"Cost components categorize cost build-up so the system can post and report by component.","q":"Company XYZ wants to break the total cost of an item into material, labor, and overhead for analysis. What is the role of cost components?","type":"single","opts":["They classify cost build-up (material, operation, surcharge, subcontracting, etc.) for analysis and posting","They define tax codes","They define customer groups","They control packaging"],"cor":0},{"id":"cp144","cat":"Cost Price Calculation and Valuation","exp":"Valuation price is the price LN uses to value inventory; it depends on the chosen valuation method (standard, FIFO, MAUC, etc.).","q":"Company XYZ uses a separate price for valuing on-hand inventory in the GL. What is a valuation price in Infor LN?","type":"single","opts":["The price used to value inventory transactions and stock","The customer's selling price","The list price for marketing","The procurement budget price"],
