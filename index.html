<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infor LN Cloud — Lern-App (Manufacturing & Planning)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F8F7F4;color:#1a1a1a;min-height:100vh;}
.app{max-width:560px;margin:0 auto;padding:20px 16px 40px;}
button{font-family:inherit;cursor:pointer;}
select{font-family:inherit;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;letter-spacing:0.02em;white-space:nowrap;}
.card-flat{background:#F1EFE8;border:none;border-radius:12px;padding:14px 16px;}
.pbar{height:4px;border-radius:2px;background:#e8e6e1;overflow:hidden;margin-bottom:18px;}
.pbar-fill{height:100%;border-radius:2px;transition:width 0.35s ease;}
.opt-btn{width:100%;text-align:left;padding:10px 13px;border-radius:10px;border:1.5px solid #e8e6e1;background:#fff;font-size:13px;line-height:1.45;display:flex;align-items:center;gap:9px;transition:all 0.15s;color:#1a1a1a;}
.opt-btn:hover:not(:disabled){border-color:#b8b5ae;background:#faf9f6;}
.opt-btn.selected{border-color:#3B7BE8;background:#EBF2FD;}
.opt-btn.correct{border-color:#1D9E75;background:#E8F5EC;}
.opt-btn.wrong{border-color:#E24B4A;background:#FDF0F0;}
.opt-btn.dimmed{opacity:0.45;}
.indicator{width:18px;height:18px;border-radius:99px;border:1.5px solid #c5c3bc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:all 0.15s;}
.indicator.multi{border-radius:4px;}
.indicator.active{background:#3B7BE8;border-color:#3B7BE8;}
.order-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.order-arrows{display:flex;flex-direction:column;gap:2px;}
.arrow-btn{width:26px;height:20px;border:1px solid #e8e6e1;border-radius:5px;background:#fff;font-size:10px;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
.arrow-btn:hover:not(:disabled){background:#f0efe8;border-color:#c5c3bc;}
.arrow-btn:disabled{opacity:0.25;cursor:default;}
.order-item{flex:1;padding:9px 12px;border-radius:9px;border:1.5px solid #e8e6e1;background:#fff;font-size:12.5px;line-height:1.4;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.order-item.correct{border-color:#1D9E75;background:#E8F5EC;}
.order-item.wrong{border-color:#E24B4A;background:#FDF0F0;}
.order-num{width:22px;height:22px;border-radius:6px;background:#F1EFE8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#888;flex-shrink:0;}
.match-block{margin-bottom:10px;}
.match-label{font-size:13px;font-weight:500;margin-bottom:4px;}
.match-select{width:100%;padding:8px 10px;border-radius:9px;font-size:12px;border:1.5px solid #e8e6e1;background:#fff;color:#1a1a1a;appearance:auto;}
.match-select.correct{border-color:#1D9E75;background:#E8F5EC;}
.match-select.wrong{border-color:#E24B4A;background:#FDF0F0;}
.match-hint{font-size:11px;color:#1D9E75;margin-top:2px;}
.btn{padding:8px 20px;border-radius:9px;font-size:13px;font-weight:500;border:1.5px solid #c5c3bc;background:#fff;color:#1a1a1a;transition:all 0.15s;}
.btn:hover{background:#f0efe8;}
.btn:disabled{opacity:0.35;cursor:default;background:#fff;}
.btn-primary{border-color:#3B7BE8;background:#EBF2FD;color:#1B5EC2;}
.btn-primary:hover{background:#d9e8fc;}
.btn-danger{border-color:#E24B4A;background:#FDF0F0;color:#6E1616;}
.feedback{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:12.5px;line-height:1.55;}
.feedback.ok{background:#E8F5EC;color:#0F5132;}
.feedback.fail{background:#FDF0F0;color:#6E1616;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.nav-back{font-size:12px;color:#888;background:none;border:none;padding:0;}
.nav-back:hover{color:#555;}
.nav-info{font-size:12px;color:#888;display:flex;gap:10px;align-items:center;}
.timer{font-family:'DM Sans',monospace;letter-spacing:0.04em;}
.result-ring{position:relative;width:80px;height:80px;}
.result-ring svg{transform:rotate(-90deg);}
.result-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:600;}
.cat-bar{margin-bottom:8px;}
.cat-bar-track{height:5px;border-radius:3px;background:#e8e6e1;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.menu-card{padding:16px;border-radius:12px;border:1.5px solid #e8e6e1;background:#fff;text-align:left;transition:all 0.15s;}
.menu-card:hover{border-color:#c5c3bc;background:#faf9f6;}
.menu-card h3{font-size:14px;font-weight:500;margin-bottom:3px;}
.menu-card p{font-size:11px;color:#888;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.ov-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
.ov-stat{background:#fff;border:1.5px solid #e8e6e1;border-radius:10px;padding:12px;text-align:center;}
.ov-stat-val{font-size:20px;font-weight:600;margin-bottom:2px;}
.ov-stat-lbl{font-size:11px;color:#888;}
.ov-cat{margin-bottom:14px;}
.ov-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.ov-dot{width:30px;height:30px;border-radius:7px;border:1.5px solid #e8e6e1;background:#fff;font-size:10px;font-weight:500;color:#888;display:flex;align-items:center;justify-content:center;transition:all 0.12s;cursor:pointer;}
.ov-dot:hover{border-color:#b8b5ae;transform:scale(1.08);}
.ov-dot.ok{background:#E8F5EC;border-color:#1D9E75;color:#0F5132;}
.ov-dot.fail{background:#FDF0F0;border-color:#E24B4A;color:#6E1616;}
.ov-dot.current{border-color:#3B7BE8;box-shadow:0 0 0 2px #3B7BE844;}
.ov-legend{display:flex;gap:14px;margin-bottom:18px;font-size:11px;color:#888;}
.ov-legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle;}
@media(max-width:480px){.app{padding:14px 12px 30px;}}
</style>

<script>
const Q=[{"id": "m1", "type": "single", "cat": "Manufacturing", "q": "What is a production order in LN?", "opts": ["A request to purchase raw materials from a supplier", "An order comprising the instruction to produce an item and the conditions under which manufacturing takes place (routing, delivery date, order quantity)", "A document used exclusively for quality inspection", "A shipping instruction for finished goods"], "cor": 1, "exp": "A production order comprises the order to produce an item and the conditions under which manufacturing takes place."}, {"id": "m2", "type": "single", "cat": "Manufacturing", "q": "How are production orders typically originated in LN?", "opts": ["Always manually by shop floor workers", "Generated from Enterprise Planning and Warehousing, then transferred to Production Orders session", "Imported from external ERP systems only", "Created automatically by the CRM module"], "cor": 1, "exp": "Usually generated from Enterprise Planning and Warehousing, then transferred to the Production Orders session."}, {"id": "m3", "type": "single", "cat": "Manufacturing", "q": "Which two LN sessions can be used to create a BOM?", "opts": ["Item Master and Cost Calculation", "Production Item 360 and Bill of Material", "Work Center and Routing", "Enterprise Planning and Inventory"], "cor": 1, "exp": "Production Item 360 und Bill of Material."}, {"id": "m4", "type": "multi", "cat": "Manufacturing", "q": "Which master data must be created for the shop floor layout? (Select all)", "opts": ["Work centers", "Employees", "Machine capacity groups", "Sales territories", "Machine types", "Reference operations"], "cor": [0, 1, 2, 4, 5], "exp": "Work centers, employees, machine capacity groups, machine types, reference operations."}, {"id": "m5", "type": "order", "cat": "Manufacturing", "q": "Reorder: Calculate cost/valuation prices (1-3):", "items": ["Calculate standard costs for main item and subassemblies", "Update the standard costs", "Print the standard cost calculation"], "corOrd": [0, 1, 2], "exp": "Calculate → Update → Print."}, {"id": "m6", "type": "order", "cat": "Manufacturing", "q": "Reorder: Production order with manual material issue (1-9):", "items": ["Create production order", "Print documents and release order", "Initiate material from production order", "Generate and release outbound advice", "Report operation complete", "Register hours", "Report order completed", "Process warehouse receipt", "Close production order"], "corOrd": [0, 1, 2, 3, 4, 5, 6, 7, 8], "exp": "Create → Print/Release → Material → Outbound → Report Op → Hours → Report Order → Receipt → Close."}, {"id": "m7", "type": "single", "cat": "Manufacturing", "q": "Which two check boxes enable direct processing of materials in Item – Production?", "opts": ["Allow Backflushing and Backflush Materials", "Direct Initiate Inventory Issue and Direct Process Warehouse Order Line", "Auto Release and Auto Complete", "Material Planning and Auto Allocate"], "cor": 1, "exp": "Direct Initiate Inventory Issue und Direct Process Warehouse Order Line."}, {"id": "m8", "type": "single", "cat": "Manufacturing", "q": "After recording time via Setup button in JSC Operator Workbench, where is it registered?", "opts": ["Work Center Hours session", "Production Order Hours session", "Employee Time Registration", "Machine Utilization session"], "cor": 1, "exp": "In der Production Order Hours session."}, {"id": "m9", "type": "multi", "cat": "Manufacturing", "q": "To enable backflushing, which check boxes are needed? (Select all)", "opts": ["Allow backflushing as material", "Backflush materials", "Backflush hours", "Direct Initiate Inventory Issue", "Auto Release Order"], "cor": [0, 1, 2], "exp": "Allow backflushing as material, Backflush materials, Backflush hours."}, {"id": "m10", "type": "order", "cat": "Manufacturing", "q": "Reorder: Production order with backflushing (1-5):", "items": ["Create production order", "Print documents and release order", "Report order completed", "Backflush materials and hours", "Close production order"], "corOrd": [0, 1, 2, 3, 4], "exp": "Create → Print/Release → Report Complete → Backflush → Close."}, {"id": "m11", "type": "multi", "cat": "Manufacturing", "q": "Which master data must be configured to use subcontracting? (Select all)", "opts": ["Subcontracting with Material Flow check box in Implemented Software Components", "Subcontractor business partner data", "Subcontractor warehouse linked to external site", "Automatic procedure for warehouse receipt", "Employee shift schedules for subcontractors", "Purchase order type for subcontracting with material flow"], "cor": [0, 1, 2, 3, 5], "exp": "Subcontracting checkbox, BP data, warehouse, receipt procedure, PO type — not employee shifts."}, {"id": "m12", "type": "single", "cat": "Manufacturing", "q": "What does subcontracting with material support in LN include?", "opts": ["Only outsourcing work to a subcontractor", "Outsourcing work plus supply and receipt of required material, with LN supporting physical and administrative flow", "Only tracking costs of external work", "Automatically creating purchase orders for raw materials"], "cor": 1, "exp": "Includes outsourcing work AND supply/receipt of material. LN supports the full physical and administrative flow."}, {"id": "m13", "type": "single", "cat": "Manufacturing", "q": "What is the purpose of EP order groups?", "opts": ["Group sales orders by customer", "Collectively confirm or transfer planned production orders", "Organize warehouse locations", "Manage employee shifts"], "cor": 1, "exp": "EP order groups enable collective confirmation or transfer of planned production orders."}, {"id": "m14", "type": "order", "cat": "Manufacturing", "q": "Reorder: Create an EP order group (1-3):", "items": ["Create planned production orders", "Create an order group for planned production orders", "Assign planned orders to order group"], "corOrd": [0, 1, 2], "exp": "Create Orders → Create Group → Assign."}, {"id": "m15", "type": "single", "cat": "Manufacturing", "q": "What is the purpose of JSC order groups?", "opts": ["To automatically generate production orders from sales", "A group of production orders to carry out actions on all orders simultaneously", "To link production orders to quality inspections", "To schedule machine maintenance"], "cor": 1, "exp": "JSC order group = group of production orders for simultaneous action processing."}, {"id": "m16", "type": "order", "cat": "Manufacturing", "q": "Reorder: Process JSC order groups (1-4):", "items": ["Print and release production orders", "Report operations completed by group", "Report orders completed globally", "Close production orders"], "corOrd": [0, 1, 2, 3], "exp": "Print/Release → Report Ops → Report Orders → Close."}, {"id": "m17", "type": "single", "cat": "Manufacturing", "q": "What is unit effectivity?", "opts": ["Employee effectiveness metrics", "Method to control validity of variations on an end item for pegging/exceptions", "Machine uptime measurement", "Standard cost per unit calculation"], "cor": 1, "exp": "Controls validity of variations on an end item — for pegging or modeling exceptions."}, {"id": "m18", "type": "order", "cat": "Manufacturing", "q": "Reorder: Logistics process with unit effectivity (1-5):", "items": ["Create and process sales order", "Generate and process production orders", "Generate and release outbound advice", "Pack and ship items", "Create invoice"], "corOrd": [0, 1, 2, 3, 4], "exp": "Sales → Production → Outbound → Ship → Invoice."}, {"id": "m19", "type": "order", "cat": "Manufacturing", "q": "Reorder: Define a tool for production (1-5):", "items": ["Create tool using Items session", "Calculate standard cost", "Define tool numbers", "Set status to Active", "Assign tool to an operation"], "corOrd": [0, 1, 2, 3, 4], "exp": "Create → Cost → Numbers → Activate → Assign."}, {"id": "m20", "type": "single", "cat": "Manufacturing", "q": "Why must a receipt line be generated for each tool?", "opts": ["Tools are too expensive for groups", "Tools are serialized items — serial numbers needed at receipt", "Accounting requires individual receipts", "Tools expire and need individual dates"], "cor": 1, "exp": "Tools are serialized items; serial numbers must be generated at receipt."}, {"id": "m21", "type": "multi", "cat": "Manufacturing", "q": "True about JSC module? (Select all)", "opts": ["Allows manual creation/modification of production orders", "Allows automatic creation of production orders", "Can plan production orders", "Can execute production order procedures"], "cor": [0, 2, 3], "exp": "Manual create/modify, plan, execute — NOT auto-create."}, {"id": "m23", "type": "multi", "cat": "Manufacturing", "q": "Identify TRUE statements about production orders:", "opts": ["You can view if a document was printed in Production Orders session", "After reporting completed, you can no longer process materials or hours", "Only Completed production orders can be closed"], "cor": [0, 2], "exp": "Statement 1 (T) and 3 (T) are true. Statement 2 is False — you CAN still process after reporting complete."}, {"id": "m24", "type": "multi", "cat": "Manufacturing", "q": "What does JSC Operator Workbench allow? (Select all)", "opts": ["Record setup and run times", "Register completed and rejected quantities", "Report operations complete", "View production order operation data", "Filter and sort operation data", "Create new item master records"], "cor": [0, 1, 2, 3, 4], "exp": "Record times, register qtys, report ops, view data, filter/sort — NOT create item masters."}, {"id": "m25", "type": "single", "cat": "Manufacturing", "q": "What is backflushing?", "opts": ["Manual inventory count at shift end", "Automatic issue of materials/hours based on theoretical usage and reported qty", "Quality inspection after production", "Reversing a completed order"], "cor": 1, "exp": "Automatic material issue or hour accounting based on theoretical usage."}, {"id": "m26", "type": "single", "cat": "Manufacturing", "q": "What is the purpose of a subcontracting model in LN?", "opts": ["To define employee roles in subcontracting", "Contains all data needed for subcontracting; managed via Subcontracting Models session (tisub1100m000)", "To calculate subcontractor invoices", "To track subcontractor delivery performance"], "cor": 1, "exp": "A subcontracting model contains all data needed for subcontracting manufacture of subassemblies or end product."}, {"id": "m27", "type": "single", "cat": "Manufacturing", "q": "Two ways to create JSC order groups?", "opts": ["Via CRM or email", "Directly in JSC module or automatically from EP transfer", "Only manually", "Through Warehouse or Quality"], "cor": 1, "exp": "Directly in JSC or automatically when transferring from EP."}, {"id": "m28", "type": "order", "cat": "Manufacturing", "q": "Reorder: Create a requirement for unit effectivity (1-3):", "items": ["Create a new requirement in the Requirements session", "Define the upgrade price for the end item", "Assign the requirement to the end item using Item – Requirements session"], "corOrd": [0, 1, 2], "exp": "Create requirement → Define price → Assign to end item."}, {"id": "m29", "type": "single", "cat": "Manufacturing", "q": "Purpose of tools planning?", "opts": ["Order new tools", "Estimate tools needed and check availability using Estimated Tool Requirements session", "Schedule maintenance", "Calculate depreciation"], "cor": 1, "exp": "Estimate tool requirements and check availability."}, {"id": "p1", "type": "multi", "cat": "Planning", "q": "Which describe a planning system? (Select all)", "opts": ["Monitors demand/supply changes and balances requirements", "Isolated, not integrated with materials management", "Integral part of overall materials management", "Static system that doesn't change"], "cor": [0, 2], "exp": "Monitors changes and is integral to materials management."}, {"id": "p2", "type": "single", "cat": "Planning", "q": "What does EP generate for master/detailed planning?", "opts": ["Sales quotation", "Planning run", "Quality report", "Shipping manifest"], "cor": 1, "exp": "Planning run."}, {"id": "p3", "type": "single", "cat": "Planning", "q": "What is the input and output of the planning process?", "opts": ["Input: customer orders only; Output: shipping schedules", "Input: demand and supply data; Output: recommendations that become input for the next planning run", "Input: financial budgets; Output: cost reports", "Input: warehouse data; Output: inventory adjustments"], "cor": 1, "exp": "Demand/supply data is analyzed, recommendations generated — outputs become input for next planning run."}, {"id": "p4", "type": "match", "cat": "Planning", "q": "Match planning methods with descriptions:", "pairs": [{"l": "Capacity requirements planning", "r": "Planned orders result in capacity use of resources"}, {"l": "Order planning", "r": "Like MRP; handles data as orders, second-by-second"}, {"l": "Supply planning", "r": "Supply planned within item's horizon based on forecast"}, {"l": "Master planning", "r": "Like MPS; demand/supply/inventory in time buckets"}], "exp": "CRP=capacity, Order=MRP, Supply=horizon, Master=MPS/buckets."}, {"id": "p5", "type": "multi", "cat": "Planning", "q": "Three types of master data for successful plans?", "opts": ["Scenarios", "Cluster and plan items", "General item data", "Employee schedules", "Customer contacts"], "cor": [0, 1, 2], "exp": "Scenarios, Cluster/Plan Items, General Item Data."}, {"id": "p6", "type": "single", "cat": "Planning", "q": "What does a cluster represent?", "opts": ["Group of employees", "Warehouses near each other at a site/country", "Sales order collection", "Shop floor machines"], "cor": 1, "exp": "One or more warehouses at a particular site or country."}, {"id": "p7", "type": "single", "cat": "Planning", "q": "How are scenarios used in EP?", "opts": ["Track actual costs", "Simulate planning runs for various situations and compare options", "Manage reviews", "Generate invoices"], "cor": 1, "exp": "Simulate planning runs and compare options."}, {"id": "p8", "type": "order", "cat": "Planning", "q": "Reorder: Create a new calendar in EP (1-4):", "items": ["Define calendar code", "Attach availability type to calendar", "Define calendar working hours", "Attach calendar to work center"], "corOrd": [0, 1, 2, 3], "exp": "Code → Availability → Hours → Attach to WC."}, {"id": "p9", "type": "single", "cat": "Planning", "q": "Starting point for attaching calendar to work center?", "opts": ["Calendar Codes", "Work Centers", "EP Parameters", "Items – Planning"], "cor": 1, "exp": "Work Centers session."}, {"id": "p10", "type": "multi", "cat": "Planning", "q": "Order planning combines which? (Select all)", "opts": ["Material requirements planning", "Exception requirements planning", "Distribution requirements planning", "Capacity requirements planning"], "cor": [0, 2, 3], "exp": "MRP, DRP, CRP — not Exception requirements."}, {"id": "p11", "type": "multi", "cat": "Planning", "q": "Order quantity determined by which two settings?", "opts": ["Order method", "Order quantity settings", "Item type", "Planning method"], "cor": [0, 1], "exp": "Order method and Order quantity settings."}, {"id": "p12", "type": "order", "cat": "Planning", "q": "Reorder: Define manufactured item for order planning (1-5):", "items": ["Define new item", "Add safety stock", "Define time fence and horizons", "Define BOM and routing", "Calculate costing data"], "corOrd": [0, 1, 2, 3, 4], "exp": "Item → Safety Stock → Time Fence → BOM/Routing → Costing."}, {"id": "p13", "type": "single", "cat": "Planning", "q": "Default status for transferring planned orders?", "opts": ["Created", "Confirmed", "Released", "Completed"], "cor": 1, "exp": "Confirmed."}, {"id": "p14", "type": "single", "cat": "Planning", "q": "Session for checking ATP/CTP?", "opts": ["Items – Planning", "ATP Handling (cprrp4800m000)", "Order Planning", "Inventory 360"], "cor": 1, "exp": "ATP Handling (cprrp4 om other modules, manual within). Statement 2 is True."}, {"id": "w32b", "type": "single", "cat": "Warehousing", "q": "The _____ determines order procedure sessions and sequence.", "opts": ["Warehouse manager", "Order type", "Item master", "Business partner"], "cor": 1, "exp": "Order type."}, {"id": "w33", "type": "single", "cat": "Warehousing", "q": "Session for picking to shipping?", "opts": ["Warehouse 360", "Warehouse Manager Dashboard", "Outbound Advice", "Shipment Processing"], "cor": 1, "exp": "Warehouse Manager Dashboard."}, {"id": "w34", "type": "single", "cat": "Warehousing", "q": "Difference between lots and serial numbers?", "opts": ["Lots and serial numbers are identical concepts", "Lots = group of products with common property; Serial numbers = unique per individual stock item", "Lots are for finished goods; serial numbers for raw materials", "Lots track location; serial numbers track cost"], "cor": 1, "exp": "Lots = group with common property; Serial numbers = unique per item."}, {"id": "w35", "type": "match", "cat": "Warehousing", "q": "Match cross-docking types:", "pairs": [{"l": "Static", "r": "PO from SO linked with cross dock order"}, {"l": "Dynamic", "r": "Ad hoc cross-dock orders"}], "exp": "Static=linked PO/SO, Dynamic=ad hoc."}, {"id": "w36", "type": "single", "cat": "Warehousing", "q": "What specifies identification code structure/length?", "opts": ["Handling units", "Shipment", "Masks", "Package definitions"], "cor": 2, "exp": "Masks."}, {"id": "w37", "type": "multi", "cat": "Warehousing", "q": "About adjustment orders — which are TRUE?", "opts": ["You can create a new adjustment order and define the stock point", "If a project is incomplete, adjustment orders delete related inventory", "You can only generate an adjustment order with a reason for adjustment"], "cor": [0, 2], "exp": "Can create and define stock point (T), NOT for deleting incomplete project inventory (F), need reason (T)."}, {"id": "w38", "type": "single", "cat": "Warehousing", "q": "How is the Perform Inventory Valuation session used?", "opts": ["To count physical inventory", "To perform inventory valuation for a specified range of items", "To generate purchase orders", "To plan warehouse capacity"], "cor": 1, "exp": "Perform inventory valuation for specified range of items."}, {"id": "w39", "type": "multi", "cat": "Warehousing", "q": "Assembly order statuses? (Select all)", "opts": ["Assemble", "Assembled", "On-hold", "Open", "Stored"], "cor": [0, 1, 3, 4], "exp": "Assemble, Assembled, Open, Stored — not On-hold."}, {"id": "o1", "type": "multi", "cat": "Infor OS", "q": "Capabilities of SPO? (Select all)", "opts": ["Retention % withholding", "Claim based payment", "Identifies required equipment", "Service based (not item)", "Record variations"], "cor": [0, 1, 3, 4], "exp": "Retention, Claims, Service-based, Variations — not Equipment ID."}, {"id": "o2", "type": "multi", "cat": "Infor OS", "q": "Infor OS integrates? (Select all)", "opts": ["Analytics", "Mobility", "Processes", "Applications", "People"], "cor": [2, 3, 4], "exp": "Processes, Applications, People."}, {"id": "o3", "type": "match", "cat": "Infor OS", "q": "Match Infor OS services:", "pairs": [{"l": "Applied Machine Learning", "r": "Algorithms to identify patterns/exceptions"}, {"l": "Workflow & Process Automation", "r": "Automates processes without custom codes"}, {"l": "Paperless Document Management", "r": "Stores/organizes/secures documents"}, {"l": "Extensibility & App Development", "r": "Rapid app dev for Infor Cloud"}], "exp": "ML=patterns, Workflow=automate, IDM=documents, Ext=apps."}, {"id": "o4", "type": "match", "cat": "Infor OS", "q": "Match Infor OS services (II):", "pairs": [{"l": "Device & System Integration", "r": "Connects systems, manages integration"}, {"l": "Security / SSO", "r": "Connect user directories for user setup"}, {"l": "Data Fabric / Analytics", "r": "Cloud data lake for analysis"}, {"l": "OS Portal", "r": "Modern personalizable experience"}], "exp": "Integration, SSO, Data Lake, Portal."}, {"id": "o5", "type": "single", "cat": "Infor OS", "q": "Intelligent portal to Infor application suite?", "opts": ["Infor Inbox", "Workspaces", "IDM", "Infor Go", "OS Portal"], "cor": 4, "exp": "OS Portal."}, {"id": "o6", "type": "multi", "cat": "Infor OS", "q": "Four Infor OS component categories?", "opts": ["Automation", "Data management & intelligence", "Extensibility", "BODs", "User experience", "Integration"], "cor": [0, 1, 4, 5], "exp": "Automation, Data Mgmt, UX, Integration."}, {"id": "o7", "type": "single", "cat": "Infor OS", "q": "What is OS Portal?", "opts": ["A web-based platform for integrated Infor ERP applications", "A tool exclusively for linking non-Infor applications", "A separate platform for mobile and desktop experiences"], "cor": 0, "exp": "A web-based platform for integrated Infor ERP applications."}, {"id": "o8", "type": "multi", "cat": "Infor OS", "q": "Navigation Menu features? (Select all)", "opts": ["Recently Closed", "User settings", "Applications", "Bookmarks", "Workspaces"], "cor": [0, 2, 3, 4], "exp": "Recently Closed, Applications, Bookmarks, Workspaces."}, {"id": "o9", "type": "match", "cat": "Infor OS", "q": "Match Navigation Menu features:", "pairs": [{"l": "Applications", "r": "All Infor apps you have access to"}, {"l": "Workspaces", "r": "Shortcuts with relevant widgets"}, {"l": "Bookmarks", "r": "Saved LN programs for quick access"}, {"l": "Recently Closed", "r": "Previously used pages for reopening"}], "exp": "Apps, Workspaces, Bookmarks, Recent."}, {"id": "o10", "type": "single", "cat": "Infor OS", "q": "Key benefit of LN Workspaces?", "opts": ["Limited customization", "Reduces integration with other tools", "Enhances user experience"], "cor": 2, "exp": "Enhances user experience."}, {"id": "o11", "type": "single", "cat": "Infor OS", "q": "LN Workspaces include dynamic, context-sensitive _____.", "opts": ["Shortcuts", "Icons", "Widgets"], "cor": 2, "exp": "Widgets."}, {"id": "s1", "type": "multi", "cat": "Services Procurement", "q": "Business Partner Classifications? (Select all)", "opts": ["Agency labor", "Other", "Equipment supply", "HVAC labor", "Subcontracting"], "cor": [0, 1, 2, 4], "exp": "Agency, Other, Equipment, Subcontracting."}, {"id": "s2", "type": "single", "cat": "Services Procurement", "q": "True/false: Natures of Supply allows you to organize service providers.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s3", "type": "multi", "cat": "Services Procurement", "q": "Subcontracting cost methods? (Select all)", "opts": ["Amount of Time", "Quantity", "Amount Only", "Rate Only"], "cor": [0, 1, 2, 3], "exp": "All four."}, {"id": "s4", "type": "multi", "cat": "Services Procurement", "q": "Two equipment cost methods?", "opts": ["Amount of Time", "Quantity", "Amount Only", "Rate Only"], "cor": [0, 2], "exp": "Amount of Time, Amount Only."}, {"id": "s5", "type": "match", "cat": "Services Procurement", "q": "Match features/sessions:", "pairs": [{"l": "SPO Lines", "r": "Description/Amount/Qty/Qty+Rate/Rate Only"}, {"l": "SPO", "r": "Hiring subcontractors for scopes of work"}, {"l": "Blocking Definitions", "r": "Prevents subcontractor payment"}, {"l": "EPO", "r": "Renting equipment"}], "exp": "Lines=cost types, SPO=hire, Blocking=payment block, EPO=rent."}, {"id": "s6", "type": "single", "cat": "Services Procurement", "q": "True/false: AFP auto-released when date ≥ assessment date.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s7", "type": "single", "cat": "Services Procurement", "q": "True/false: If vendor's assessed values < applied values, a Payless notice must be printed.", "opts": ["True", "False"], "cor": 0, "exp": "True — Payless notice must be printed and contractor must agree."}, {"id": "s8", "type": "single", "cat": "Services Procurement", "q": "True/false: Retention only with final AFP.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s9", "type": "single", "cat": "Services Procurement", "q": "True/false: You can access Initiate Variation Request from the SPO.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s10", "type": "multi", "cat": "Services Procurement", "q": "SPO variation request can? (Select all)", "opts": ["Expand scope", "Decrease scope", "Cancel scope", "Adjust quantities"], "cor": [0, 1, 2, 3], "exp": "All four."}, {"id": "s11", "type": "single", "cat": "Services Procurement", "q": "True/false: EPOs can only be created using project or manual creation.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s12", "type": "multi", "cat": "Services Procurement", "q": "EPO line types? (Select all)", "opts": ["Description Only", "Quantity and Rate", "Quantity Only", "Rate Only"], "cor": [0, 1, 3], "exp": "Description, Qty+Rate, Rate Only — not Qty Only."}, {"id": "s13", "type": "single", "cat": "Services Procurement", "q": "True/false: Equipment Utilization session under Service > Rental > Equipment Rental Workbench.", "opts": ["True", "False"], "cor": 0, "exp": "True."}, {"id": "s14", "type": "multi", "cat": "Services Procurement", "q": "Mandatory EPO fields from service? (Select all)", "opts": ["External Hire checkbox", "Supplier", "External Serial Number", "Rate"], "cor": [0, 1, 2, 3], "exp": "All four mandatory."}, {"id": "nq1", "type": "multi", "cat": "Manufacturing", "q": "Company XYZ configured backflushing, but when shop floor reports completion, materials and hours are not posted automatically. What should you do to fix the setup? (Select TWO)", "opts": ["In the Job Shop BOM line, set Report Material = Backflush for the relevant components", "In the operation planning, enable Backflush Hours for the operations", "Change the warehouse type to Shop floor", "Disable warehousing integration so issues are posted directly"], "cor": [0, 1], "exp": "Backflushing requires materials enabled for backflush at BOM line level AND hours enabled via Backflush Hours at operation level."}, {"id": "nq2", "type": "single", "cat": "Manufacturing", "q": "Company XYZ reports quantities for operation 10 and 20, but the system never offers to post the finished item to inventory. What do you do first?", "opts": ["Ensure they are reporting quantities on the last operation in Report Operations Completed", "Add a receiving location and staging location to the warehouse", "Create a warehousing assembly order instead of a production order", "Set the plan item to master-based planning"], "cor": 0, "exp": "LN offers booking the finished item to inventory only when reporting the LAST operation."}, {"id": "nq3", "type": "multi", "cat": "Planning", "q": "Company XYZ created a sourcing strategy to make 70% in-house and 30% purchase, but after running planning the demand forecast is not split. What do you do? (Select TWO)", "opts": ["Define/maintain the Sourcing Strategy with the intended percentages for the plan item", "Re-run Generate Order Planning (Item) with Allow Multiple Sources per Demand enabled", "Switch the item to 'Distribution' as default supply source", "Create a warehousing order type for 'Transfer'"], "cor": [0, 1], "exp": "Split is driven by a Sourcing Strategy + the planning run must allow Multiple Sources per Demand."}, {"id": "nq4", "type": "single", "cat": "Planning", "q": "Company XYZ uses master-based planning for an item, but planning fails because no master plan exists. What is the correct fix?", "opts": ["Define the item's master plan in Items – Planning (cprpd1100m000)", "Convert all supply to planned orders using order planning only", "Disable 'Update Goods Flow Data' in scenario initialization", "Enable handling units for the warehouse"], "cor": 0, "exp": "Master-based planning requires a master plan defined in Items – Planning."}, {"id": "nq5", "type": "multi", "cat": "Planning", "q": "Company XYZ received demand for item P500, but wants LN to supply it by distributing item P200 instead, creating a distribution order automatically. What do you do? (Select TWO)", "opts": ["Set the item's Default Supply Source (for P500) to Distribution", "Define an Item Supplying Relationship between the supplying cluster/item (P200) and receiving item (P500)", "Create a warehousing assembly order to 'convert' P200 into P500", "Turn on 'Use Handling Units in' for the warehouse"], "cor": [0, 1], "exp": "Requires supplying relationships + receiving item set to Distribution as default supply source."}, {"id": "nq6", "type": "single", "cat": "Warehousing", "q": "Company XYZ tries to change 'Handling Units in Use' for a single warehouse, but LN blocks the change. What should you do?", "opts": ["Change it in Warehousing Settings by Site, because this setting is propagated and cannot be changed per warehouse/item", "Change it in Warehouse – Locations because it's a location-level feature", "Change it in Enterprise Planning scenario initialization", "Change it by creating a new warehouse order type"], "cor": 0, "exp": "Handling Units in Use is controlled centrally in Warehousing Settings by Site and propagates regardless of Use Site Settings."}, {"id": "nq7", "type": "single", "cat": "Warehousing", "q": "Company XYZ has multiple issue order types sharing the same warehouse procedure. They set 'Generate Picking List = Automatic' in one order type and see the change affect other order types. What do you tell them?", "opts": ["This is expected: changes to a warehouse procedure in an order type apply to every order type that uses that procedure", "This is a bug; each order type stores its own independent procedure activities", "Only receipts are impacted; issues are never impacted by procedure reuse", "The change occurs only if Use Site Settings is selected"], "cor": 0, "exp": "LN procedures are reusable — changes at procedure level apply to all order types sharing that procedure."}, {"id": "nq8", "type": "single", "cat": "Warehousing", "q": "Company XYZ wants to create kits in the warehouse (no production involvement). What does LN generate when a warehousing assembly order is created?", "opts": ["Only an inbound order line for the finished kit; components are consumed via backflushing", "Only outbound lines for components; the finished kit is created by inventory adjustment", "Outbound order lines for each kit component and an inbound order line for the assembled item", "A production order plus a purchase order for missing components"], "cor": 2, "exp": "Warehousing assembly orders generate outbound lines for each component + an inbound line for the assembled item."}, {"id": "nq9", "type": "single", "cat": "Project Control", "q": "Company XYZ generates a budget structure from a sales quotation, but the item becomes a newly configured standard item causing redundant cost calculation. What configuration do you change?", "opts": ["Select With PCS for the item in Items (tcibd0501m000)", "Clear 'Make Customized' on the sales quotation line", "Disable 'Generate Budget Parts for all Quotations'", "Change the project type from Subproject to Budget"], "cor": 0, "exp": "With PCS must be selected so the budget is copied to a PCS project instead of creating a newly configured standard item."}, {"id": "nq10", "type": "multi", "cat": "Project Control", "q": "Company XYZ runs ETO projects and misses finish dates due to long lead-time materials tied to project activities. They want activity-based planning. What do you do? (Select TWO)", "opts": ["Use Module planning linked to Network Planning activities", "Define a safety time as a percentage of activity duration for customized items", "Replace module planning with warehousing assembly orders", "Turn off net requirement planning so proposed orders won't change"], "cor": [0, 1], "exp": "Module planning tied to Network Planning activities + safety time relative to activity duration."}, {"id": "nq11", "type": "single", "cat": "Manufacturing", "q": "Company XYZ enabled backflushing but warehouse still expects manual issues. Where can you verify backflushing is actually enabled for an order's material lines?", "opts": ["Open the Production Order → Materials tab → open each line's details and verify Backflushing is selected on inventory data", "Open Warehouse – Locations and verify picking sequences", "Open Items – Planning and change planning method to order-based", "Open Warehousing Order Types and set Release Outbound Advice to Automatic"], "cor": 0, "exp": "Verify on Production Order material line details (estimated materials → inventory data) where the backflush indicator is set."}, {"id": "nq12", "type": "multi", "cat": "Manufacturing", "q": "Company XYZ wants to reduce manual postings during reporting. Which configuration enables automatic posting of materials and hours? (Select TWO)", "opts": ["Set Report Material = Backflush on the relevant BOM lines", "Enable Backflush Hours for the related operations", "Set warehouse type to Consignment (owned)", "Disable warehousing so receipts never occur"], "cor": [0, 1], "exp": "Backflush at BOM line level + Backflush Hours at operation level."}, {"id": "nq13", "type": "single", "cat": "Manufacturing", "q": "Company XYZ reports operation progress, but supervisors cannot manage partial completion and rejects per operation. Which session best supports this?", "opts": ["Report Operations Completed", "Warehouse – Locations", "Items – Planning", "Warehousing Assembly Orders"], "cor": 0, "exp": "Report Operations Completed supports completed/rejected quantities per operation with partial reporting."}, {"id": "nq14", "type": "single", "cat": "Manufacturing", "q": "Company XYZ wants shop floor to book finished goods into inventory when production is done, but users never see the option. What do you check first?", "opts": ["Whether they are reporting completion on the last operation", "Whether the warehouse has a staging location", "Whether the item is planned with master planning", "Whether handling units are enabled"], "cor": 0, "exp": "The inventory booking option only appears on the final operation."}, {"id": "nq15", "type": "single", "cat": "Manufacturing", "q": "Company XYZ implements tool requirement planning and wants planners to request tools for a production order operation and track tool status. What do you use?", "opts": ["Estimated Tool Requirements with Request/Return processing", "Warehousing Settings by Site", "Sourcing Strategy", "Warehouse – Locations"], "cor": 0, "exp": "Estimated Tool Requirements + Request/Return processing manages tool status to 'in use'."}, {"id": "nq16", "type": "single", "cat": "Planning", "q": "Company XYZ uses master-based planning for a plan item and planning fails because no master plan exists. What do you do?", "opts": ["Create/maintain the master plan in Items – Planning (cprpd1100m000)", "Only initialize the scenario (no master plan needed)", "Enable handling units for the warehouse", "Create a warehousing order type for transfer"], "cor": 0, "exp": "Master-based planning requires a master plan in Items – Planning."}, {"id": "nq17", "type": "single", "cat": "Planning", "q": "Company XYZ wants to plan long-term with family-level forecasts but execute short-term with detailed orders. Which approach supports this?", "opts": ["Combine master planning and order planning with horizon-based use", "Use only warehousing procedures", "Use only distribution supply source", "Use only assembly orders in warehousing"], "cor": 0, "exp": "LN combines master planning (long-term, forecast) with order planning (short-term, execution) based on horizons."}, {"id": "nq18", "type": "multi", "cat": "Planning", "q": "Company XYZ plans a product family forecast and wants LN to distribute it to items (e.g. 80/20). What configuration supports this? (Select TWO)", "opts": ["Define the product family as a family in plan items and maintain Aggregation Relationships", "Maintain Aggr. Perc. Demand Forecast percentages for sub-plan-items", "Enable handling units in the warehouse", "Convert all planned orders directly to warehousing orders"], "cor": [0, 1], "exp": "Family/plan item setup + Aggregation Relationships with demand forecast allocation percentages."}, {"id": "nq19", "type": "single", "cat": "Planning", "q": "Company XYZ wants family-level forecast to update item forecasts, but does NOT want production/purchase plans/orders to be aggregated/disaggregated. What do you do?", "opts": ["Clear the (Dis)Aggregate check boxes for production/purchase/inventory plans in Aggregation Relationships detail", "Enable 'Include Child Items' in Generate Order Planning", "Set Default Supply Source to Distribution", "Change Warehouse Type to Project"], "cor": 0, "exp": "Aggregation Relationships detail has checkboxes controlling which data is (dis)aggregated — clear them to disable."}, {"id": "nq20", "type": "multi", "cat": "Planning", "q": "During 'Generate Order Planning (Item)' Company XYZ wants child items and pegging relations updated. Which options are relevant? (Select TWO)", "opts": ["Select Include Child Items", "Select Update Pegging Relations (Do also)", "Clear 'Generate (Item Master Plan)'", "Enable 'Print Bills of Lading'"], "cor": [0, 1], "exp": "Include Child Items + Update Pegging Relations are the relevant options."}, {"id": "nq21", "type": "single", "cat": "Planning", "q": "Company XYZ wants demand for item P500 to be fulfilled by another item via distribution. What is the first master data step on the receiving item?", "opts": ["Set Default Supply Source = Distribution on the item by site", "Enable handling units", "Create warehouse locations", "Set Report Material = Backflush"], "cor": 0, "exp": "Receiving item must use Distribution as default supply source."}, {"id": "nq22", "type": "multi", "cat": "Planning", "q": "Company XYZ wants item demand to automatically create distribution orders between clusters/items over a defined period. What do you configure? (Select TWO)", "opts": ["Define Item Supplying Relationships (supplying cluster, effective date, supply time)", "Maintain the receiving item's supply source as Distribution", "Configure Warehouse – Locations storing sequence only", "Create a warehousing assembly order type"], "cor": [0, 1], "exp": "Supplying relationships (time-phased) + receiving item set to Distribution."}, {"id": "nq23", "type": "single", "cat": "Warehousing", "q": "Company XYZ cannot change 'Handling Units in Use' per warehouse — LN forces it at site level. What do you do?", "opts": ["Maintain it in Warehousing Settings by Site — it propagates and is not warehouse-overridable", "Maintain it in Warehouse – Locations", "Maintain it in Warehousing Order Types", "Maintain it in Items – Planning"], "cor": 0, "exp": "Warehousing Settings by Site controls this and propagates to warehouses/items."}, {"id": "nq24", "type": "single", "cat": "Warehousing", "q": "Company XYZ designs a warehouse with locations but receiving fails because LN demands specific default locations. What do you configure?", "opts": ["Ensure receiving location and staging location exist (mandatory when using locations)", "Set warehouse type to Service reject", "Disable inspections", "Change plan item type to family"], "cor": 0, "exp": "Warehouses with locations require a receiving location and a staging location."}, {"id": "nq25", "type": "single", "cat": "Warehousing", "q": "Company XYZ wants warehouse staff to follow an optimized physical route for picking. Which setup supports this?", "opts": ["Define storing and picking sequences in Warehouse – Locations", "Change item planning method", "Define a sourcing strategy", "Generate a budget structure for sales quotations"], "cor": 0, "exp": "Warehouse – Locations includes storing/picking sequences for physical route optimization."}, {"id": "nq26", "type": "single", "cat": "Warehousing", "q": "Company XYZ sets 'Generate Picking List' to Automatic in one order type and sees the change reflected elsewhere. What explains this?", "opts": ["Warehouse procedure changes apply to every order type that uses that procedure", "LN automatically copies order types every night", "Only receipt procedures are shared; outbound advice never is", "This occurs only when handling units are enabled"], "cor": 0, "exp": "Procedure changes are shared across all order types using that procedure."}, {"id": "nq27", "type": "multi", "cat": "Warehousing", "q": "Company XYZ wants a receipt order type that automatically generates inbound advice and supports inspection. (Select TWO)", "opts": ["Assign a Receipt Procedure and set Generate Inbound Advice = Automatic", "Assign an Inspection Procedure and ensure inspection activities are applicable", "Clear 'Include in Enterprise Planning' for the warehouse", "Use a Transfer transaction type instead of Receipt"], "cor": [0, 1], "exp": "Assign Receipt + Inspection procedures with the relevant automatic activities."}, {"id": "nq28", "type": "single", "cat": "Warehousing", "q": "What does LN generate when a warehousing assembly order is created?", "opts": ["Only inbound order line for the assembled item", "Outbound lines for components and an inbound line for the assembled item", "A production order in Manufacturing plus a receipt in Warehousing", "A sourcing strategy record"], "cor": 1, "exp": "Outbound lines for each component + inbound line for assembled item — no production order needed."}, {"id": "nq29", "type": "multi", "cat": "Warehousing", "q": "Company XYZ wants warehouses used in Enterprise Planning but also to restrict which POs a warehouse can process based on business partner. Which fields matter? (Select TWO)", "opts": ["Include in Enterprise Planning (warehouse)", "Buy-from/Ship-from (warehouse)", "Project Type (project)", "Backflush Hours (operation)"], "cor": [0, 1], "exp": "Include in EP flag + Buy-from/Ship-from restrict PO processing by BP."}, {"id": "nq30", "type": "single", "cat": "Project Control", "q": "Company XYZ wants to create a customer quotation using a project budget. Which PCS function supports generating sales quotations based on project budget data?", "opts": ["Generate Sales Quotations for Project", "Warehouse Manager Dashboard", "Disaggregate Channel, Plans & Orders", "Report Operations Completed"], "cor": 0, "exp": "Generate Sales Quotations for Project creates quotations from project budget data."}, {"id": "nq31", "type": "single", "cat": "Project Control", "q": "Company XYZ converts a quotation to a sales order, but LN creates a configured standard item instead of a customized item and causes redundant costing. What configuration prevents this?", "opts": ["Ensure With PCS is selected for the item in Items (tcibd0501m000)", "Disable 'Generate Requirements' in scenario initialization", "Make the warehouse type 'Project'", "Clear 'Use Handling Units'"], "cor": 0, "exp": "With PCS must be selected so the budget is copied to a project."}, {"id": "nq32", "type": "multi", "cat": "Project Control", "q": "Company XYZ needs ETO projects with clear hierarchy and controlled status transitions. Which actions support this? (Select TWO)", "opts": ["Maintain hierarchy using Project Structure (main/subprojects)", "Control status using Global Update of Project Status", "Use Warehouse – Locations to create subprojects", "Use Sourcing Strategy to activate subprojects"], "cor": [0, 1], "exp": "Project Structure + Global Update of Project Status control hierarchy and status transitions."}, {"id": "nq33", "type": "single", "cat": "Project Control", "q": "Company XYZ wants to copy an entire standard product structure into a customized structure for a project. Which copy method is used?", "opts": ["Multilevel", "Single-level only", "Dynamic cross-docking", "Disaggregate channel"], "cor": 0, "exp": "Multilevel copy method copies the entire product structure."}, {"id": "nq34", "type": "multi", "cat": "Project Control", "q": "Company XYZ misses project deadlines due to long lead-time materials. They want activity-based planning. What do you implement? (Select TWO)", "opts": ["Use Module planning linked to Network Planning activities for critical materials", "Define safety time relative to activity duration for required supply time", "Replace module planning with warehouse assembly orders", "Turn off net requirement planning so proposals never change"], "cor": [0, 1], "exp": "Module planning + safety time relative to activity duration drive activity-based material planning."}, {"id": "nq35", "type": "single", "cat": "Project Control", "q": "Company XYZ wants to plan and control project activities, calculate critical path timing, and link critical materials/capacity to activities. Which PCS capability is designed for this?", "opts": ["Network planning", "Warehouse receipts with handling units", "Report Orders Completed", "Warehouse procedures"], "cor": 0, "exp": "Network planning plans/controls project activities and links critical materials/capacity."}, {"id": "tbg1", "type": "single", "cat": "Planning", "q": "A company produces SIM cards and cannot meet demand. They produce 70% in-house and 30% outsourced, but want replenishment to be cost-efficient while still reacting quickly to volatile demand. Which ordering method best fits if they want to replenish up to a defined target level whenever projected inventory drops too low?", "opts": ["Lot-for-Lot", "Economic order quantity (EOQ)", "Fixed order quantity", "Replenish to maximum inventory"], "cor": 3, "exp": "Replenish to Maximum generates orders when projected inventory falls below the plan/safety stock and refills up to the defined maximum. Lot-for-Lot matches net requirements, EOQ enforces a minimum cost-based lot, and Fixed always orders the fixed quantity."}, {"id": "tbg2", "type": "single", "cat": "Planning", "q": "A planner sets an item's method to Lot-for-Lot and maintains an Order Quantity Increment of 25. The net requirement is 62 units. What order quantity is most consistent with LN behavior?", "opts": ["50", "62", "75", "100"], "cor": 2, "exp": "Lot-for-Lot starts from the required quantity and rounds up to the next multiple of the order increment. 62 rounds up to 75 when the increment is 25. The other quantities do not match the \"round up to next multiple\" rule."}, {"id": "tbg3", "type": "single", "cat": "Planning", "q": "Demand for an item is 430, and the item is set to Lot-for-Lot. The Maximum Order Quantity is 400. What is the most likely planning result?", "opts": ["One planned order for 430", "One planned order for 400 and shortage remains", "Two planned orders (split due to maximum)", "No planned orders generated"], "cor": 2, "exp": "If the calculated quantity exceeds the maximum, LN generates multiple orders rather than one oversized order. The system splits to respect the max limit; it does not leave shortages by default when planning supply."}, {"id": "tbg4", "type": "single", "cat": "Planning", "q": "A company wants every replenishment to be a constant pack size of 30 units, even when demand is smaller. Which method should be used?", "opts": ["Lot-for-Lot", "Fixed order quantity", "Economic order quantity (EOQ)", "Replenish to maximum inventory"], "cor": 1, "exp": "Fixed Order Quantity always proposes the fixed quantity and creates multiple orders if demand exceeds it. Lot-for-Lot varies with demand, EOQ is cost-minimizing and sets quantities at least the EOQ, and replenish-to-max refills up to a target."}, {"id": "tbg5", "type": "single", "cat": "Planning", "q": "An item is set to EOQ, with an EOQ of 300. A shortage of 120 occurs. What is the most consistent planned order quantity behavior?", "opts": ["120", "300", "240", "600"], "cor": 1, "exp": "With EOQ, LN sets planned order quantities to at least the EOQ value (subject to min/max constraints). Lot-for-Lot would match 120 (then round), but EOQ enforces the economic lot size."}, {"id": "tbg6", "type": "multi", "cat": "Manufacturing", "q": "A planner wants planned orders to be eligible for execution creation (production/purchase/warehouse execution). Which two steps describe the correct lifecycle?", "opts": ["Generate Order Planning", "Confirm Order Planning", "Transfer Order Planning", "Close production order financially"], "cor": [0, 1, 2], "exp": "Planned orders are first generated, then confirmed (status becomes eligible), and then transferred to execution modules. Financial close is an execution accounting step and not part of the planned-order-to-execution lifecycle."}, {"id": "tbg7", "type": "single", "cat": "Warehousing", "q": "After transferring confirmed planned orders, the planner no longer sees them in the planned orders overview. What is the most likely explanation?", "opts": ["Planned orders are hidden until the next scenario roll", "Planned orders are deleted randomly during transfer", "Planned orders are converted into execution orders, so proposals disappear", "Planned orders become purchase requisitions automatically"], "cor": 2, "exp": "Transfer converts planned orders into actual execution documents (e.g., production/purchase/warehouse orders). Once converted, the planned proposals no longer remain in the planned orders list."}, {"id": "tbg8", "type": "single", "cat": "Planning", "q": "A planner runs an order planning session and is warned that the scenario must be rolled but continues anyway. What is the most likely risk?", "opts": ["The run always fails", "Results can be generated but may be based on an outdated scenario state", "Only purchase planned orders will be created", "LN auto-rolls in the background with no risk"], "cor": 1, "exp": "Continuing can still generate planning results, but rolling aligns the scenario with updates; skipping it risks inconsistencies. The other options overstate failure modes or describe behavior that contradicts the prompt's meaning."}, {"id": "tbg9", "type": "multi", "cat": "Planning", "q": "A planner runs order planning with Include Child Items and Update Pegging Relations enabled. Which outcomes are most consistent?", "opts": ["Only the selected top item is planned", "Dependent components/subassemblies can be included in results", "Pegging relations between demand and supply can be refreshed", "Net change planning is forced on automatically"], "cor": [1, 2], "exp": "Including child items expands planning to dependent items and updating pegging refreshes demand/supply links. Net change behavior is controlled separately and is not forced by pegging updates."}, {"id": "tbg10", "type": "single", "cat": "Warehousing", "q": "A consultant wants a method that is especially suitable when demand is hard to predict or lead times are long, and storage cost is relatively low. Which method best matches?", "opts": ["Lot-for-Lot", "Fixed order quantity", "Replenish to maximum inventory", "EOQ"], "cor": 2, "exp": "Replenish-to-maximum is described as suitable when demand is difficult to predict or lead times are long and holding cost is low. The other methods do not target \"refill-to-target\" behavior for uncertain demand.  Medium & Hard (practice-exam style, cross-module)"}, {"id": "tbg11", "type": "single", "cat": "Planning", "q": "A company defines Minimum Order Quantity = 800 and uses Lot-for-Lot. Net requirement is 130. What is the most consistent planned order quantity?", "opts": ["130", "200", "800", "930"], "cor": 2, "exp": "Minimum order quantity applies to all methods; if calculated quantity is below the minimum, LN raises it to at least the minimum. Lot-for-Lot starts from requirement but must respect the minimum."}, {"id": "tbg12", "type": "single", "cat": "Manufacturing", "q": "A planner wants a full regeneration run (not net change). Which selection is most relevant?", "opts": ["Select \"Run a Net Change Planning\"", "Clear \"Run a Net Change Planning\"", "Select \"Block During Warehouse Cycle Counting\"", "Select \"Subcontracting Order\""], "cor": 1, "exp": "Clearing the net change option indicates the planner is not using net change logic for the run. Cycle counting and subcontracting are unrelated to planning run mode."}, {"id": "tbg13", "type": "single", "cat": "Warehousing", "q": "A warehouse outbound flow requires that picking can only happen after outbound advice is released. Which statement best matches LN sequencing?", "opts": ["Picking list can be generated from unreleased advice if shipment is confirmed", "Outbound advice must be released before picking list generation", "Shipment documents always print before picking is confirmed", "Picking confirmation is unrelated to staging"], "cor": 1, "exp": "Outbound advice release precedes picking list creation in the standard outbound procedure. Picking confirmation records picking (typically into staging), so the other statements contradict sequencing or meaning."}, {"id": "tbg14", "type": "multi", "cat": "Planning", "q": "A company created new warehouse order types, but sales orders still use old handling logic. Which two approaches make new warehouse order types effective?", "opts": ["Set them in Default Order Types by Origin", "Link them through newly defined sales/purchase order types", "Enable Demand Pegging", "Change item ordering method to EOQ"], "cor": [0, 1], "exp": "LN can apply new warehouse order types via defaults by origin or via linkage through order management order types. Pegging and EOQ do not determine warehouse order type selection."}, {"id": "tbg15", "type": "single", "cat": "Warehousing", "q": "Cycle counting orders are generated based on ABC and intervals. When does LN generate a cycle count order line for a stock point?", "opts": ["Always, regardless of last counting date", "When the stock point is due based on last counting date/interval", "Only if another cycle count order already exists", "Only for category A items"], "cor": 1, "exp": "LN generates cycle count lines for stock points that become due based on the last counting date and defined intervals. It is not \"always,\" not restricted to only A-items, and not dependent on already having another order."}, {"id": "tbg16", "type": "single", "cat": "Warehousing", "q": "A warehouse manager enables Block During Warehouse Cycle Counting. What should they expect?", "opts": ["Inventory remains available until the order is processed", "Inventory is blocked for transactions until processed or line deleted", "Only receipts are blocked, issues are allowed", "Only handling units are blocked"], "cor": 1, "exp": "The blocking parameter prevents transactions against blocked inventory until the count is processed or lines are removed. The other options incorrectly narrow or negate the effect."}, {"id": "tbg17", "type": "single", "cat": "Manufacturing", "q": "A customer wants to do kitting/assembly inside the warehouse without manufacturing orders. Which concept supports this?", "opts": ["Warehousing assembly orders", "Subcontracting with material flow", "PCS structure generation", "Net change planning"], "cor": 0, "exp": "Warehousing assembly orders create outbound lines for components and an inbound line for the assembled item, enabling warehouse-only kitting/assembly. The other options refer to manufacturing outsourcing, project structure, or planning mode."}, {"id": "tbg18", "type": "multi", "cat": "Manufacturing", "q": "When a warehousing assembly order is created, which records are generated?", "opts": ["Outbound-order lines for each component", "Inbound-order line for the assembled item", "A Job Shop production order automatically", "A cycle count order automatically"], "cor": [0, 1], "exp": "Assembly orders drive component picking (outbound lines) and receipt/put-away of the assembled item (inbound line). They do not automatically create production orders or cycle counts."}, {"id": "tbg19", "type": "single", "cat": "Project Control", "q": "A project planner wants to stop PRP from continuously changing a planned order while negotiations are ongoing. What should they do?", "opts": ["Change status from Planned to Firm-Planned", "Delete the scenario", "Disable warehousing locations", "Enable serial tracking"], "cor": 0, "exp": "PRP planned orders can be set to Firm-Planned to exclude them from re-planning during evaluation. The other actions do not control PRP replanning behavior."}, {"id": "tbg20", "type": "single", "cat": "Project Control", "q": "In PRP, which project order system option means a planned purchase order is created irrespective of available stock?", "opts": ["PRP Purchase Order", "Manual", "PRP (generic) with stock check", "Replenish to Maximum Inventory"], "cor": 0, "exp": "PRP Purchase Order explicitly indicates stock is ignored for that item and a planned PO is created anyway. Manual means PRP does not plan orders, and replenish-to-max is an EP ordering method, not a PRP order system option."}, {"id": "tbg21", "type": "single", "cat": "Project Control", "q": "A PRP planner sees a rescheduling message Reschedule In. What does it mean?", "opts": ["Deliver earlier because the order delivery date is later than required", "Deliver later because the order delivery date is earlier than required", "Cancel because supplier is blocked", "Convert planned to firm-planned automatically"], "cor": 0, "exp": "Reschedule In is advice to move the delivery earlier when the planned delivery is too late versus the required date. The other options describe different advice or unrelated causes."}, {"id": "tbg22", "type": "single", "cat": "Project Control", "q": "A PRP planner sees Cancel advice. Which condition most closely matches?", "opts": ["Ordered quantity exceeds available quantity due to reductions/over-ordering", "Project planning board is closed", "Production order was released", "Serials are not in inventory"], "cor": 0, "exp": "Cancel advice occurs when an order is no longer needed because ordered quantity exceeds what is required/available after changes. Other options do not represent PRP cancel logic."}, {"id": "tbg23", "type": "multi", "cat": "Manufacturing", "q": "A company uses subcontracting with material flow support for an operation. Which master data conditions are required?", "opts": ["Subcontracting work center must have a shop floor warehouse", "Demand pegging must always be enabled", "Subassembly supply system must allow order-controlled supply (Order Controlled/Single)", "Sales order type must always have inspection procedure"], "cor": [0, 2], "exp": "Material-flow subcontracting requires correct work center/warehouse setup and subassembly supply settings that support order-controlled supply. Demand pegging and sales inspection are not mandatory prerequisites."}, {"id": "tbg24", "type": "single", "cat": "Manufacturing", "q": "During subcontracting with material flow, which document is printed as an additional external order document describing the subcontracted operation and required materials?", "opts": ["Bill of Lading", "Subcontracting note", "Picking list", "Cycle counting report"], "cor": 1, "exp": "The subcontracting note is used to communicate operation details and material requirements to the subcontractor. Bill of lading is shipping, picking list is warehousing picking, and cycle counting is inventory counting."}, {"id": "tbg25", "type": "single", "cat": "Manufacturing", "q": "A consultant needs to validate routings that contain subcontracting operations and print a report of errors. Which is the correct approach?", "opts": ["Use a routing subcontracting validation session/report", "Use Inventory 360", "Use Generate Order Planning", "Use Warehousing Procedures setup"], "cor": 0, "exp": "Subcontracting routing validation is done via a dedicated validation session that checks required settings and prints errors. Inventory inquiry and planning runs do not validate routing subcontracting setup."}, {"id": "tbg26", "type": "single", "cat": "Manufacturing", "q": "A planner generates order planning and gets a planned distribution order, then transfers it and sees a warehouse order created. What does this indicate?", "opts": ["Planned distribution orders can be transferred into warehouse orders for execution", "Distribution planning is only informative", "Distribution orders always become production orders", "Distribution requires subcontracting PO types"], "cor": 0, "exp": "Distribution planned orders are meant to become executable logistics orders; transferring creates the warehouse order required to execute the inventory movement."}, {"id": "tbg27", "type": "single", "cat": "Manufacturing", "q": "A company wants a stable planned order batch for execution and decides to group planned production orders in Enterprise Planning. Which statement is correct?", "opts": ["An EP planned order can belong to multiple EP order groups", "Only planned production orders in the actual scenario can be in an EP order group", "Only planned purchase orders can be grouped in EP order groups", "EP order groups can only be created after transfer"], "cor": 1, "exp": "Only planned production orders belonging to the actual scenario can be part of an EP order group, and a planned order can belong to only one EP order group."}, {"id": "tbg28", "type": "multi", "cat": "Planning", "q": "You want the EP order group to be automatically updated as new planned orders meet criteria. Which two configuration ideas are consistent?", "opts": ["Select the Automatic Update checkbox when creating the EP order group", "Use criteria-based inclusion (status/filters) rather than selecting specific orders", "\"Spec. Orders\" must be used together with Automatic Update", "Maximum group size has no relevance when auto-updating"], "cor": [0, 1], "exp": "Automatic Update is enabled by selecting the checkbox and using criteria that define which planned orders should be included. \"Spec. Orders\" is only available when Automatic Update is cleared, and maximum group size can still constrain inclusion."}, {"id": "tbg29", "type": "single", "cat": "Project Control", "q": "A consultant explains what happens after confirming planned orders in an EP order group. Which status change is correct?", "opts": ["Planned → Released", "Planned/Firm-Planned → Confirmed", "Confirmed → Closed", "Planned → Archived"], "cor": 1, "exp": "Confirm Order Planning changes Planned or Firm-Planned orders to Confirmed so they can be transferred to execution. Release/close are execution-level states, not planned order statuses."}, {"id": "tbg30", "type": "single", "cat": "Manufacturing", "q": "A customer wants rate-based control for high volume, similar products on dedicated lines and says \"we don't want classic production orders.\" Which typology fits best?", "opts": ["Job shop", "Assembly", "Project", "Repetitive"], "cor": 3, "exp": "Repetitive manufacturing is described as rate-based production of similar products in high volume on dedicated lines, with minimal administrative burden and no classic production orders."}, {"id": "tbg31", "type": "single", "cat": "Warehousing", "q": "A planner notices planned EP schedule \"runs\" are replaced by many schedule lines when entering a time window. What explains this?", "opts": ["Within the schedule horizon, planned EP schedule orders (runs) are replaced by schedule lines", "Outside the schedule horizon, schedule lines become purchase orders", "Schedule horizon converts sales orders into schedules", "Schedule horizon only affects warehouse receipts"], "cor": 0, "exp": "Repetitive planning states that within the schedule horizon, the planned EP schedule order (run) is replaced by schedule lines. Other options mix unrelated objects."}, {"id": "tbg32", "type": "multi", "cat": "Planning", "q": "In repetitive scheduling, which two statements are correct?", "opts": ["Scheduling takes all work cells in a Work Cell Plan Group into account", "The schedule engine always plans finite forward", "The schedule engine always plans infinite backward", "Repetitive scheduling can only be triggered from warehousing"], "cor": [0, 1], "exp": "Repetitive scheduling considers all work cells in the plan group and plans finite forward. The starting point includes schedule lines initially generated by planning (infinite backward), but the schedule engine itself plans forward; triggering can come from Enterprise Planning."}, {"id": "tbg33", "type": "single", "cat": "Planning", "q": "A customer wants the repetitive scheduler to reduce lateness by re-sequencing and moving work across cells. Which optional optimization is explicitly described?", "opts": ["Optimize by cumulative lateness (move/swap/offload)", "Replace schedule lines with purchase orders", "Use only infinite backward scheduling", "Convert work lists into invoices"], "cor": 0, "exp": "The repetitive scheduling engine can optionally optimize based on cumulative lateness, including moving/swapping runs and offloading to another work cell. The other options are unrelated."}, {"id": "tbg34", "type": "single", "cat": "Warehousing", "q": "A shop-floor operator asks which object they use to see shift work, track progress, register hours, and report produced quantities in repetitive manufacturing.", "opts": ["Warehouse receipt", "Work list", "Planned purchase order", "Sales order"], "cor": 1, "exp": "The Work List is described as showing planned work for the shift, indicating progress, and being used to register hours and report produced quantities."}, {"id": "tbg35", "type": "single", "cat": "Project Control", "q": "PRP integrates multiple domains. Which set of areas is shown as integrated around LN Project requirements planning?", "opts": ["Only procurement and finance", "Procurement, warehousing, manufacturing, invoicing (and more)", "Only warehousing and cycle counting", "Only service and CRM"], "cor": 1, "exp": "The LN Project overview shows integration across procurement, warehousing, manufacturing, invoicing, and additional domains (scheduling/service/quality). The other options incorrectly narrow the integration."}, {"id": "tbg36", "type": "single", "cat": "Project Control", "q": "PRP \"doesn't plan an order before the current date,\" even if lead time would suggest it. What is the best interpretation?", "opts": ["PRP ignores lead time completely", "PRP avoids planning receipts in the past because it's unrealistic", "PRP always cancels such requirements", "PRP forces EOQ for all items"], "cor": 1, "exp": "PRP avoids recommending orders before the current date because it is unrealistic to execute them in the past. This doesn't mean lead times are ignored; it's a realism constraint."}, {"id": "tbg37", "type": "multi", "cat": "Warehousing", "q": "A project warehouse has special constraints. Which two statements are correct?", "opts": ["Project warehouse cannot be used for pegged items", "Cycle counting and adjustment orders are possible for project warehouse", "Pegged items must always be handled via project warehouse", "Project warehouse removes the need for warehousing orders"], "cor": [0, 1], "exp": "The project warehouse overview states pegged items cannot be handled using a project warehouse, and cycle counting/adjustments are possible. The other options contradict those constraints."}, {"id": "tbg38", "type": "single", "cat": "Project Control", "q": "A company wants to combine many planned PRP warehouse orders into fewer executable warehouse orders. Which mechanism is described?", "opts": ["Combine PRP Warehouse orders using a time bucket and combine options", "Convert all planned PRP orders into one sales order", "Replace PRP with repetitive scheduling", "Use only Lot-for-Lot to avoid combining"], "cor": 0, "exp": "PRP supports combining multiple planned warehouse orders into fewer warehouse orders using combine options such as time bucket logic. This reduces one-order-per-line behavior."}, {"id": "tbg39", "type": "single", "cat": "Warehousing", "q": "A planner needs to transfer planned purchase orders and must specify execution document setup. Which combination is most directly needed?", "opts": ["Purchase order type and purchase order series", "ABC code and cycle counting interval", "Inspection procedure and staging location", "Work list and takt time"], "cor": 0, "exp": "Transfer to execution requires the purchase order type and numbering (series) to create actual purchase orders. ABC/cycle counting and warehousing procedures are unrelated to PO creation prerequisites."}, {"id": "tbg40", "type": "single", "cat": "Manufacturing", "q": "A planner wants planned orders to show up as one actual purchase order after transfer even though there were multiple planned purchase orders. Which explanation is most consistent with the training scenario outcome?", "opts": ["Transfer can consolidate planned purchase orders into one actual PO", "Transfer always keeps a 1:1 mapping for purchase orders", "Transfer deletes purchase orders and creates only production orders", "This is only possible if net change planning is disabled"], "cor": 0, "exp": "In the described planning exercise, multiple planned purchase orders can be transferred into a single actual purchase order. This reflects consolidation during transfer rather than strict 1:1 conversion."}, {"id": "tbg41", "type": "single", "cat": "Planning", "q": "A customer wants to store inventory efficiently and reduce ordering/holding trade-offs. Which method is explicitly described as minimizing total cost considering order costs and inventory handling costs?", "opts": ["Lot-for-Lot", "EOQ", "Fixed order quantity", "Replenish to maximum"], "cor": 1, "exp": "EOQ is defined as the lot size that yields the lowest total cost considering ordering and inventory handling costs. The other methods do not explicitly optimize total cost in that way."}, {"id": "tbg42", "type": "single", "cat": "Planning", "q": "A planner sets Fixed Order Quantity = 20 and net requirement is 70. What is the most consistent planned order proposal?", "opts": ["One order for 70", "Three orders for 20 (60 total)", "Four orders for 20 (80 total)", "One order for 80 only if EOQ is enabled"], "cor": 2, "exp": "Fixed order quantity generates multiples of the fixed quantity to cover requirements. For 70 with fixed 20, LN generates four orders of 20, totaling 80."}, {"id": "tbg43", "type": "single", "cat": "Warehousing", "q": "A customer wants to apply replenish-to-max for an item and asks what triggers order generation. Which is correct?", "opts": ["Orders are generated only when demand exists on sales orders", "Orders are generated when projected inventory drops below plan/safety stock", "Orders are generated only when a warehouse is blocked", "Orders are generated only when EOQ is calculated"], "cor": 1, "exp": "Replenish-to-maximum generates orders when projected inventory drops below the inventory plan or safety stock, then refills to the maximum. Other triggers listed are not the replenish-to-max logic."}, {"id": "tbg44", "type": "multi", "cat": "Planning", "q": "A company wants order quantities to respect increments and limits. Which two settings are used by Lot-for-Lot, EOQ, and Replenish-to-Max (as described)?", "opts": ["Order Increment", "Minimum Order Quantity", "Fixed Order Quantity", "Planner code"], "cor": [0, 1], "exp": "Order increment is used by Lot-for-Lot, EOQ, and replenish-to-max to ensure multiples; minimum applies to all methods. Fixed order quantity is only used when the method is Fixed Order Quantity."}, {"id": "tbg45", "type": "single", "cat": "Planning", "q": "A company sets Lot-for-Lot but also maintains a maximum order quantity. Which statement is correct?", "opts": ["Maximum is ignored for Lot-for-Lot", "Maximum can force split orders even for Lot-for-Lot", "Maximum only applies to EOQ", "Maximum only applies to purchase-controlled items"], "cor": 1, "exp": "If Lot-for-Lot calculated quantity exceeds the maximum, LN generates multiple orders. Maximum is a general constraint used across methods, not limited to EOQ or purchasing."}, {"id": "tbg46", "type": "single", "cat": "Manufacturing", "q": "A consultant wants to design the most stable flow from planning outputs to execution across modules. Which sequence is most correct?", "opts": ["Generate Order Planning → Confirm planned orders → Transfer planned orders → Execute in producti
