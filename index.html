on/purchasing/warehousing", "Execute in production → Generate Order Planning → Close → Ship", "Cycle count → Transfer → Generate → Approve sales order", "Approve subcontracting PO → Print bill of lading → Run EOQ"], "cor": 0, "exp": "LN's standard lifecycle is to generate planned orders, confirm them (eligible), transfer them to execution documents, then execute. The other sequences mix unrelated steps or reverse dependencies."}, {"id": "tbg47", "type": "single", "cat": "Project Control", "q": "A project planner wants PRP planned orders to be transferable. Which statement aligns with PRP rules?", "opts": ["Transfer is possible in any work authorization status", "Transfer is only possible for Released status", "Transfer requires the project warehouse to be mandatory", "Transfer is blocked unless net change planning is enabled"], "cor": 1, "exp": "PRP notes a parameter about planning in other statuses, but transferring orders is only possible for Released status. Warehouse settings and net change planning are unrelated to that transfer eligibility rule."}, {"id": "tbg48", "type": "single", "cat": "Project Control", "q": "A PRP user transfers multiple lines for the same supplier and expects consolidation. What is the most accurate statement?", "opts": ["Transfer always creates one PO per line", "Lines might be combined on the same purchase order; detail lines only for same item/service", "Consolidation is impossible in PRP", "Consolidation happens only if the item method is EOQ"], "cor": 1, "exp": "PRP notes that multiple lines for the same supplier/subcontractor might be combined on the same purchase order; detail lines are limited to same item/service. This is not controlled by EOQ."}, {"id": "tbg49", "type": "single", "cat": "Project Control", "q": "In repetitive manufacturing, which statement best describes the environment characteristic: \"supply planning decoupled from leveled demand; production regulates itself\"?", "opts": ["Repetitive environment", "Project environment", "Pure purchasing environment", "Cash management environment"], "cor": 0, "exp": "The repetitive environment description explicitly includes decoupled supply planning and self-regulating production, alongside minimal admin burden and near real-time insight."}, {"id": "tbg50", "type": "multi", "cat": "Planning", "q": "A company is choosing how to replenish items for storage efficiency. Which two statements are correct about Lot-for-Lot vs Replenish-to-Max?", "opts": ["Lot-for-Lot starts from required quantity and then applies increment/min/max rules", "Replenish-to-Max refills to the maximum inventory level when projected inventory drops too low", "Lot-for-Lot always orders the fixed quantity regardless of demand", "Replenish-to-Max is the same as EOQ (minimum cost lot)"], "cor": [0, 1], "exp": "Lot-for-Lot matches requirements and then respects increment/min/max, and replenish-to-max refills to a target maximum when inventory falls below plan/safety stock. Fixed quantity and EOQ cost logic are different methods.  Set 2 --- 50 Questions (One or Two Correct Answers Only)"}, {"id": "tbg51", "type": "multi", "cat": "Planning", "q": "A planner sets an item to Replenish to Maximum Inventory. Which two statements best describe how LN will create planned orders?", "opts": ["Planned orders are generated only when there is a sales order shortage", "Planned orders are generated when projected inventory drops below the plan or safety stock", "Order quantity is sized to refill inventory up to the defined maximum inventory level", "Order quantity always equals the fixed order quantity"], "cor": [1, 2], "exp": "Replenish-to-max triggers when projected inventory falls below plan/safety stock and proposes enough quantity to reach the maximum inventory. It does not rely exclusively on sales orders, and it is not a fixed-quantity method."}, {"id": "tbg52", "type": "single", "cat": "Planning", "q": "An item is Lot-for-Lot with an Order Increment of 10. Net requirement is 41 units. Minimum order quantity is 0. What planned quantity is most consistent?", "opts": ["40", "41", "50", "60"], "cor": 2, "exp": "Lot-for-Lot starts from the required quantity and rounds up to the next multiple of the order increment. 41 rounds up to 50 when increment is 10."}, {"id": "tbg53", "type": "multi", "cat": "Planning", "q": "A planner uses Fixed Order Quantity = 25. Demand in a period is 60. Which two statements are consistent with LN behavior?", "opts": ["LN will create two orders of 25 and leave the remaining 10 uncovered", "LN will create three orders of 25 (total 75)", "LN may generate multiple orders when demand exceeds the fixed quantity", "LN always creates exactly one order regardless of demand size"], "cor": [1, 2], "exp": "Fixed Order Quantity forces orders in multiples of the fixed quantity when demand is higher than the fixed quantity. LN does not leave demand uncovered by design in this scenario; it overshoots to cover demand."}, {"id": "tbg54", "type": "single", "cat": "Planning", "q": "A company wants the lot-sizing method that explicitly targets minimizing total cost considering ordering costs and inventory handling costs. Which method should the consultant recommend?", "opts": ["Lot-for-Lot", "EOQ", "Fixed Order Quantity", "Replenish to Maximum Inventory"], "cor": 1, "exp": "EOQ is defined as the quantity that minimizes total cost considering ordering and inventory handling costs. Other methods primarily match demand, force fixed packs, or refill to a target level."}, {"id": "tbg55", "type": "multi", "cat": "Planning", "q": "Which two constraints can cause LN to split a planned order into multiple orders even if the method is Lot-for-Lot?", "opts": ["Maximum order quantity", "Warehouse receipt procedure", "Fixed order quantity method", "Demand pegging is enabled"], "cor": [0, 2], "exp": "Lot-for-Lot can split due to maximum order quantity limits. Also, when Fixed Order Quantity is used (a different method), LN splits/creates multiples by definition---both lead to multiple planned orders. Warehouse procedures and pegging do not inherently cause lot splitting."}, {"id": "tbg56", "type": "single", "cat": "Manufacturing", "q": "A planner confirms planned orders and expects them to become executable orders automatically. What is the correct statement about Confirm Order Planning?", "opts": ["Confirming converts planned orders directly into production/purchase orders", "Confirming changes planned orders to a status eligible for transfer", "Confirming closes the production orders financially", "Confirming creates warehouse receipts immediately"], "cor": 1, "exp": "Confirming planned orders changes their status so they can be transferred to execution modules. Conversion into execution documents happens during transfer, not confirmation."}, {"id": "tbg57", "type": "multi", "cat": "Project Control", "q": "Which two steps belong in the correct end-to-end sequence from planning proposals to execution?", "opts": ["Generate Order Planning", "Confirm planned orders", "Post production receipt", "Transfer planned orders"], "cor": [0, 1, 3], "exp": "The standard lifecycle is generate planned orders → confirm them → transfer them to create execution orders. Posting receipts is an execution activity after orders exist and are processed."}, {"id": "tbg58", "type": "single", "cat": "Manufacturing", "q": "A planner transfers planned orders and sees that planned orders disappear from the planned orders overview. Why?", "opts": ["Planned orders are automatically archived for audit", "Planned orders are converted into execution orders during transfer", "Planned orders are deleted when scenarios are rolled", "Planned orders become cycle count orders"], "cor": 1, "exp": "Transfer creates execution documents (e.g., purchase/production orders), so the planned proposals are no longer shown as planned orders. Rolling scenarios and cycle counting are unrelated to this effect."}, {"id": "tbg59", "type": "multi", "cat": "Manufacturing", "q": "A planner wants pegging links refreshed during planning. Which two actions can generate/refresh pegging relations?", "opts": ["Enable \"Update Pegging Relations\" during Generate Order Planning", "Run a dedicated Generate Pegging Relations session/process", "Confirm planned orders", "Release production orders"], "cor": [0, 1], "exp": "Pegging relations can be generated during order planning if the update option is selected, or via a dedicated pegging generation process. Confirming and releasing do not create pegging relations by themselves."}, {"id": "tbg60", "type": "single", "cat": "Manufacturing", "q": "A scenario forces \"Update Pegging Relations during Order Planning\" to Always. What happens in the planning run UI?", "opts": ["The checkbox remains editable", "The checkbox becomes non-editable and is determined by scenario settings", "Pegging is disabled for the entire site", "Only purchase planned orders can be pegged"], "cor": 1, "exp": "If the scenario dictates Always/Never, LN controls the checkbox and users cannot change it in the run session. This is a scenario-control behavior, not a site-wide pegging shutdown.  Manufacturing + Procurement (Subcontracting) Focus"}, {"id": "tbg61", "type": "multi", "cat": "Manufacturing", "q": "A customer uses subcontracting with material flow support. Which two master data checks are most critical to prevent errors and enable supply lines?", "opts": ["Subcontracting work center has a shop floor warehouse", "Serial control at receipt is enabled", "Subassembly supply system supports Order Controlled/Single", "Cycle counting is disabled"], "cor": [0, 2], "exp": "Subcontracting with material flow requires correct work center + shop floor warehouse setup and subassembly supply settings that support order-controlled supply. Serial control and cycle counting are not core prerequisites for this flow."}, {"id": "tbg62", "type": "single", "cat": "Manufacturing", "q": "In subcontracting with material flow, which document is printed as an additional external document describing the subcontracted operation and needed materials?", "opts": ["Picking list", "Subcontracting note", "Bill of lading", "Cycle counting report"], "cor": 1, "exp": "The subcontracting note is used to describe the subcontracted operation and its material requirements to the subcontractor. The other documents relate to warehousing picking, shipping, or counting."}, {"id": "tbg63", "type": "multi", "cat": "Manufacturing", "q": "A consultant troubleshoots why supply orders were not created for subcontracting supply lines. Which two checks are most relevant?", "opts": ["Ensure supply-order generation activity ran (or is automatic)", "Ensure subassembly supply system allows order-controlled supply", "Ensure outbound advice was released", "Ensure project status is Closed"], "cor": [0, 1], "exp": "Supply orders depend on the subcontracting supply-order generation activity and proper subassembly supply setup. Outbound advice and project closure status do not drive creation of subcontracting supply orders."}, {"id": "tbg64", "type": "single", "cat": "Manufacturing", "q": "A subcontracting purchase order is received. What is the most accurate statement about subcontracted operations in this process?", "opts": ["LN automatically reports subcontracted operations as completed upon PO receipt", "Operations are always completed manually only", "Receiving cancels the routing operations", "Receiving creates cycle counting orders"], "cor": 0, "exp": "In the described subcontracting flow, receiving the subcontracting PO triggers automatic completion reporting for subcontracted operations. The other statements contradict the described behavior."}, {"id": "tbg65", "type": "multi", "cat": "Manufacturing", "q": "Which two configuration issues commonly cause subcontracting routing validation failures?", "opts": ["Missing subcontracting rates for the subcontracting work center", "Missing required subassembly fields around subcontracted operations", "Missing ABC classification", "Purchase order series not equal to production series"], "cor": [0, 1], "exp": "Validation checks focus on subcontracting rates and correct subassembly definitions around subcontracted steps when required. ABC codes and series equality are not core subcontracting routing validation requirements."}, {"id": "tbg66", "type": "single", "cat": "Project Control", "q": "Which session/purpose best matches \"validate routings containing subcontracting operations and print errors\"?", "opts": ["Inventory 360 inquiry", "Subcontracting routing validation session", "Generate Order Planning", "Warehousing procedures setup"], "cor": 1, "exp": "Subcontracting routing validation is done through a dedicated validation session designed to check required subcontracting settings and output errors. The other options do not validate routing subcontracting setup.  PCS / PRP + Cross-Module"}, {"id": "tbg67", "type": "single", "cat": "Project Control", "q": "In PRP, a project planner wants to stop the system from continuously changing a planned order while negotiations are ongoing. What should they do?", "opts": ["Change status from Planned to Firm-Planned", "Delete the planning scenario", "Disable warehousing locations", "Enable serial tracking"], "cor": 0, "exp": "Setting PRP planned orders to Firm-Planned excludes them from re-planning while discussions occur. The other actions do not directly control PRP re-planning of that order."}, {"id": "tbg68", "type": "multi", "cat": "Project Control", "q": "PRP planned orders are recommendations and may be changed for valid reasons. Which two examples are explicitly consistent with why planners deviate?", "opts": ["Budget not complete or incorrect", "Prefer buying directly for project instead of via warehousing", "Item must always be stocked anonymously", "Work cell plan group is missing"], "cor": [0, 1], "exp": "PRP notes deviations may occur due to incomplete/incorrect budgets or a preference to buy directly instead of through warehousing. Anonymous stocking and work cell plan groups are not stated as PRP deviation reasons."}, {"id": "tbg69", "type": "single", "cat": "Project Control", "q": "A PRP planner sees \"Reschedule In\" advice. What does it mean?", "opts": ["Deliver earlier because delivery date is later than required date", "Deliver later because delivery date is earlier than required date", "Cancel because supplier is blocked", "Convert planned to confirmed automatically"], "cor": 0, "exp": "Reschedule In is advice to move delivery earlier when current delivery is too late compared to the required date. It is not a cancel message or an automatic status conversion."}, {"id": "tbg70", "type": "multi", "cat": "Project Control", "q": "Which two statements about PRP transfer eligibility are consistent?", "opts": ["PRP may allow planning for other work authorization statuses (parameter-driven)", "Transferring PRP orders is only possible for Released status", "PRP transfers are possible only for Closed projects", "PRP transfers require EOQ ordering method"], "cor": [0, 1], "exp": "PRP describes a parameter that affects which authorization statuses can be used in planning, but transfer is only possible for Released status. Closed projects and EOQ are not prerequisites for PRP transfers."}, {"id": "tbg71", "type": "multi", "cat": "Project Control", "q": "Which two PRP outputs are explicitly listed as planned order types generated by PRP for a project?", "opts": ["Planned warehouse orders (material)", "Planned purchase orders (material, equipment, subcontracting)", "Planned sales invoices", "Planned cycle count orders"], "cor": [0, 1], "exp": "PRP planning outputs include planned warehouse orders and planned purchase orders for relevant categories. Sales invoices and cycle count orders are not PRP planning outputs.  Repetitive Manufacturing / Scheduling"}, {"id": "tbg72", "type": "single", "cat": "Manufacturing", "q": "A customer says: \"We don't want classic production orders. We want rate-based control with minimal administration.\" Which manufacturing typology best fits?", "opts": ["Job Shop", "Assembly", "Project", "Repetitive"], "cor": 3, "exp": "Repetitive manufacturing is positioned as rate-based production for high-volume similar products, with minimal administrative burden and without classic production orders."}, {"id": "tbg73", "type": "multi", "cat": "Warehousing", "q": "A planner sees planned schedule runs replaced by schedule lines once entering a time window. Which two statements match LN behavior?", "opts": ["Within the schedule horizon, planned schedule runs are replaced by schedule lines", "Outside the schedule horizon, schedule lines are replaced by work lists", "Schedule horizon drives this replacement behavior", "This behavior is caused by cycle counting"], "cor": [0, 2], "exp": "LN describes that within the schedule horizon planned runs are replaced by schedule lines. Cycle counting and work list conversion are unrelated to the schedule horizon replacement logic."}, {"id": "tbg74", "type": "single", "cat": "Planning", "q": "A shop-floor operator asks what they use to register hours and report produced quantities in repetitive manufacturing.", "opts": ["Work list", "Sales order", "Planned purchase order", "Invoice"], "cor": 0, "exp": "The Work List is described as showing shift work and is used to register hours and report produced quantities. The other documents are not execution reporting tools for the operator."}, {"id": "tbg75", "type": "multi", "cat": "Planning", "q": "A customer wants to reduce lateness by resequencing and moving work across work cells. Which two actions are explicitly listed as part of cumulative lateness optimization?", "opts": ["Moving/swapping runs on the same work cell", "Offloading runs to a different work cell", "Converting work lists to sales invoices", "Removing schedule horizon logic"], "cor": [0, 1], "exp": "LN lists moving/swapping runs and offloading runs as optimization actions for cumulative lateness. Invoice conversion and removing schedule horizon logic are not listed as optimization actions.  Enterprise Planning Order Groups (EP → Execution)"}, {"id": "tbg76", "type": "single", "cat": "Manufacturing", "q": "Which statement about EP planned order groups is correct?", "opts": ["Planned orders can belong to multiple EP order groups at the same time", "Only planned production orders in the actual scenario can be part of an EP order group", "EP order groups are only for planned purchase orders", "EP order groups can only be created after transfer to execution"], "cor": 1, "exp": "EP order groups collect planned production orders that belong to the actual scenario. A planned order can only be in one EP group, and grouping occurs before transfer."}, {"id": "tbg77", "type": "multi", "cat": "Warehousing", "q": "When creating an EP order group, which two methods are valid to specify which planned orders to include?", "opts": ["Select specific planned orders (when not using automatic update)", "Define criteria such as order status and let LN collect matching planned orders", "Convert confirmed orders back to planned and regroup them", "Use warehouse receipt lines as selection input"], "cor": [0, 1], "exp": "LN allows selecting specific planned orders (when automatic update is off) or using criteria-based selection so LN collects matching planned orders. Warehouse receipts and converting confirmed orders back are not described as grouping methods."}, {"id": "tbg78", "type": "single", "cat": "Project Control", "q": "After confirmation, what status do planned orders typically have to become transferable to execution modules?", "opts": ["Planned", "Confirmed", "Released", "Closed"], "cor": 1, "exp": "Confirm Order Planning changes planned/firm-planned orders to Confirmed, making them eligible for transfer. Released/Closed are execution-level statuses.  Warehousing + Planning Integration"}, {"id": "tbg79", "type": "single", "cat": "Manufacturing", "q": "A planner transfers a planned distribution order and sees a warehouse order created. What does this indicate?", "opts": ["Planned distribution orders can be transferred into warehouse orders for execution", "Distribution planning is never executable", "Distribution orders always become production orders", "Distribution planning requires subcontracting PO types"], "cor": 0, "exp": "Transferring a planned distribution order into a warehouse order reflects standard integration where distribution planned orders become executable logistics orders."}, {"id": "tbg80", "type": "multi", "cat": "Warehousing", "q": "A warehouse outbound process requires advice release before picking. Which two statements align with this design?", "opts": ["Outbound advice must be released before a picking list can be generated", "Picking list confirmation records the picking result (typically into staging)", "Shipment confirmation must happen before picking exists", "Invoice posting triggers picking"], "cor": [0, 1], "exp": "LN outbound sequencing starts with outbound advice that must be released before picking. Picking confirmation records the picking outcome. Shipment confirmation and invoicing do not trigger picking."}, {"id": "tbg81", "type": "multi", "cat": "Project Control", "q": "A company wants to apply new warehouse order types broadly. Which two approaches are valid?", "opts": ["Maintain Default Order Types by Origin", "Link via newly defined sales/purchase order types", "Change item ordering method to EOQ", "Set PRP to Manual"], "cor": [0, 1], "exp": "LN applies new warehouse order types either via defaults by origin or through order management order types that point to specific warehouse order types. EOQ and PRP manual do not control warehouse order type selection.  More Mixed (Planning / PCS / Warehouse / Manufacturing)"}, {"id": "tbg82", "type": "single", "cat": "Planning", "q": "A planner chooses Replenish to Maximum Inventory because the item is cheap to hold and demand is unpredictable. Which outcome is most aligned?", "opts": ["Orders always match exact net requirement", "Orders refill inventory back to the maximum when projected inventory drops too low", "Orders are never generated for planned items", "Orders always equal the EOQ value"], "cor": 1, "exp": "Replenish-to-max refills to a target maximum when inventory dips below plan/safety stock. Lot-for-Lot matches net need; EOQ sets a minimum cost-based lot; \"never generated\" is incorrect."}, {"id": "tbg83", "type": "multi", "cat": "Planning", "q": "Which two order quantity settings apply across all ordering methods (as described)?", "opts": ["Minimum order quantity", "Maximum order quantity", "EOQ field", "Fixed order field"], "cor": [0, 1], "exp": "Minimum and maximum apply to all order methods as constraints. EOQ and Fixed order fields are only used when their corresponding methods are selected."}, {"id": "tbg84", "type": "single", "cat": "Planning", "q": "A fixed order quantity is configured but is below the minimum order quantity. What is the correct rule expectation?", "opts": ["LN allows any fixed quantity, even below minimum", "Fixed order quantity must be ≥ minimum and ≤ maximum when fixed method is used", "Minimum is ignored when fixed method is used", "LN switches the method automatically to Lot-for-Lot"], "cor": 1, "exp": "For the fixed method, the fixed quantity must respect min/max bounds. LN does not ignore minimum nor automatically switch methods based solely on inconsistent values."}, {"id": "tbg85", "type": "single", "cat": "Project Control", "q": "In PRP, planned orders can be entered manually. What status do manually entered planned orders default to (as described)?", "opts": ["Planned", "Firm-Planned", "Confirmed", "Released"], "cor": 1, "exp": "PRP indicates manually entered planned orders default to Firm-Planned status. This prevents constant replanning and reflects a deliberate user decision."}, {"id": "tbg86", "type": "multi", "cat": "Warehousing", "q": "Which two statements about a project warehouse are consistent with the described constraints?", "opts": ["Pegged items cannot be handled using a project warehouse", "Cycle counting and adjustments are possible for a project warehouse", "Project warehouse is mandatory for all PRP items", "Project warehouse eliminates the need for warehousing receipts"], "cor": [0, 1], "exp": "The project warehouse cannot be used for pegged items, but cycle counting/adjustments are possible. It is optional, and warehousing processes still apply."}, {"id": "tbg87", "type": "single", "cat": "Planning", "q": "A planner wants the method that is \"simplest\" and starts from required quantity, then applies increment/min/max logic. Which method is this?", "opts": ["Fixed Order Quantity", "EOQ", "Lot-for-Lot", "Replenish to Maximum Inventory"], "cor": 2, "exp": "Lot-for-Lot is described as the simplest method: start from required quantity, then apply rounding to increments and min/max constraints (including possible split orders)."}, {"id": "tbg88", "type": "multi", "cat": "Manufacturing", "q": "A company wants planned purchase orders and planned production orders confirmed and transferred. Which two configuration data elements are typically needed during transfer?", "opts": ["Production order series (numbering)", "Purchase order type and purchase order series", "ABC classification for all items", "Cycle counting intervals"], "cor": [0, 1], "exp": "Transfer to execution requires proper document types/series for production and purchase order creation. ABC and cycle counting are inventory control topics, not transfer prerequisites."}, {"id": "tbg89", "type": "single", "cat": "Planning", "q": "A planner selects EOQ but does not calculate or maintain a meaningful EOQ value. What is the most likely impact?", "opts": ["LN cannot plan the item at all", "Planned orders will be sized at least to the EOQ value maintained (even if minimal), subject to min/max", "LN will force Replenish to Maximum automatically", "LN will always create a single consolidated order"], "cor": 1, "exp": "EOQ method sets planned quantities to at least the EOQ value maintained (then constrained by min/max). LN does not automatically switch to other methods nor guarantee consolidation into one order."}, {"id": "tbg90", "type": "single", "cat": "Manufacturing", "q": "A customer wants to understand why repetitive scheduling can be started even though it is \"stand-alone.\" What is the correct statement?", "opts": ["Repetitive scheduling is stand-alone but can be triggered by Enterprise Planning", "Repetitive scheduling only runs after invoicing", "Repetitive scheduling can only be triggered by Warehousing", "Repetitive scheduling requires classic production orders"], "cor": 0, "exp": "LN describes repetitive scheduling as stand-alone but able to be triggered by Enterprise Planning. The other statements contradict how it's positioned."}, {"id": "tbg91", "type": "multi", "cat": "Project Control", "q": "A customer wants to model \"what do we need, how much, when, and where\" in a project context. Which two PRP outputs are directly aligned?", "opts": ["Planned purchase orders", "Planned warehouse orders", "Sales invoices", "Customer dunning letters"], "cor": [0, 1], "exp": "PRP generates planned purchase orders and planned warehouse orders to satisfy project requirements. Invoicing and dunning are finance activities, not PRP planning outputs."}, {"id": "tbg92", "type": "single", "cat": "Manufacturing", "q": "A consultant describes how order planning creates planned orders during simulation. Which activity is NOT part of the planning procedure?", "opts": ["Determine finish date", "Select supply source and suppliers", "Determine order quantity and adjust dates", "Close production orders financially"], "cor": 3, "exp": "Financial closing is an execution/accounting step, not part of planning simulation that determines dates, quantities, and sourcing."}, {"id": "tbg93", "type": "multi", "cat": "Manufacturing", "q": "A company wants to group planned production orders in EP and then transfer the whole group. Which two statements are correct?", "opts": ["Confirming can be done for an entire EP order group", "After confirmation, orders become eligible for transfer to execution", "EP order groups are only for purchase orders", "Confirming automatically posts receipts"], "cor": [0, 1], "exp": "LN supports confirming planned orders for an order group, after which the status becomes eligible for transfer. EP order groups are for planned production orders and confirming does not post receipts."}, {"id": "tbg94", "type": "single", "cat": "Warehousing", "q": "A repetitive scheduler must consider multiple work cells together. Which object groups them for scheduling?", "opts": ["Work Cell Plan Group", "Planning Cluster", "Project Warehouse", "ABC Class"], "cor": 0, "exp": "Repetitive scheduling considers all work cells in a Work Cell Plan Group. Planning clusters relate to multi-site planning, and the other options are unrelated."}, {"id": "tbg95", "type": "single", "cat": "Project Control", "q": "A PRP run can issue advice messages: Reschedule Out, Reschedule In, Cancel. What is the best classification of these messages?", "opts": ["Execution postings", "Planning rescheduling advice", "Inventory valuation transactions", "Sales credit holds"], "cor": 1, "exp": "These are planning advice messages indicating timing changes or cancellation recommendations. They are not execution postings, valuation transactions, or sales credit controls."}, {"id": "tbg96", "type": "multi", "cat": "Project Control", "q": "A company transfers multiple PRP lines for the same supplier and hopes for consolidation. Which two statements match PRP transfer behavior described?", "opts": ["Multiple lines may be combined into one purchase order", "Detail lines can be combined only when they are for the same item/service", "PRP always creates one PO per line", "Consolidation is controlled exclusively by EOQ"], "cor": [0, 1], "exp": "PRP transfer can consolidate to the same PO, with detail-line constraints tied to same item/service. It is not always one PO per line and not exclusively controlled by EOQ."}, {"id": "tbg97", "type": "single", "cat": "Planning", "q": "A planner wants to explain why minimum order quantity can force larger planned orders even under Lot-for-Lot. What is the correct statement?", "opts": ["Minimum order quantity applies only to purchase items", "Minimum order quantity applies to all order methods and can raise planned quantity", "Minimum order quantity applies only to EOQ", "Minimum order quantity is ignored when max order quantity exists"], "cor": 1, "exp": "Minimum order quantity is a general constraint used across all methods; if calculated quantity is below minimum, LN raises it. It is not limited to purchasing or EOQ, and it is not ignored due to max settings."}, {"id": "tbg98", "type": "multi", "cat": "Planning", "q": "A consultant wants to design replenishment for a low-cost item with unpredictable demand. Which two methods could be plausible depending on whether the company prefers target-based replenishment vs exact matching?", "opts": ["Replenish to Maximum Inventory", "Lot-for-Lot", "Close production order financially", "Print Goods Received Note"], "cor": [0, 1], "exp": "Replenish-to-max suits target-based replenishment when demand is uncertain and holding cost is low, while Lot-for-Lot matches net requirements closely. Closing orders and printing documents are execution activities, not lot-sizing methods."}];

const CATS=[...new Set(Q.map(q=>q.cat))];
const CC={"Manufacturing":{bg:"#EEEDFE",t:"#3C3489",b:"#AFA9EC"},"Planning":{bg:"#E6F1FB",t:"#0C447C",b:"#85B7EB"},"Project Control":{bg:"#E1F5EE",t:"#085041",b:"#5DCAA5"},"Warehousing":{bg:"#FAEEDA",t:"#633806",b:"#FAC775"},"Infor OS":{bg:"#FAECE7",t:"#712B13",b:"#F0997B"},"Services Procurement":{bg:"#FBEAF0",t:"#72243E",b:"#ED93B1"}};
const TL={single:"Single Choice",multi:"Multiple Choice",order:"Reihenfolge",match:"Zuordnung"};
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function badge(text,bg,color,border){return `<span class="badge" style="background:${bg};color:${color};border:1px solid ${border}">${text}</span>`;}
function $(s){return document.querySelector(s);}

let state={mode:"menu",qs:[],idx:0,ans:{},filter:"all",exam:false,t0:0,timer:null};

function render(){
  const app=document.getElementById("app");
  if(state.mode==="menu") return renderMenu(app);
  if(state.mode==="results") return renderResults(app);
  if(state.mode==="overview") return renderOverview(app);
  renderQuestion(app);
}

function renderMenu(el){
  const fc=state.filter==="all"?Q.length:Q.filter(q=>q.cat===state.filter).length;
  el.innerHTML=`
    <div style="margin-bottom:22px">
      <h1 style="font-size:22px;font-weight:600;margin-bottom:4px">LN Cloud: Manufacturing & Planning</h1>
      <p style="font-size:13px;color:#888">Zertifizierungs-Lernapp — ${Q.length} Fragen, 6 Bereiche</p>
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Bereich filtern</label>
      <select id="catFilter" style="width:100%;padding:9px 12px;border-radius:10px;font-size:13px;border:1.5px solid #e8e6e1;background:#fff">
        <option value="all">Alle Bereiche (${Q.length})</option>
        ${CATS.map(c=>`<option value="${c}" ${state.filter===c?"selected":""}>${c} (${Q.filter(q=>q.cat===c).length})</option>`).join("")}
      </select>
    </div>
    <div class="menu-grid">
      <button class="menu-card" id="btnLearn"><h3>Lernmodus</h3><p>Sofortiges Feedback, ${fc} Fragen</p></button>
      <button class="menu-card" id="btnExam"><h3>Prüfungsmodus</h3><p>Timer + Auswertung, ${fc} Fragen</p></button>
    </div>
    <div class="card-flat">
      <div style="font-size:12px;color:#888;margin-bottom:6px">Bereiche</div>
      <div class="tags" style="margin-bottom:6px">${CATS.map(c=>{const col=CC[c];return badge(c+" ("+Q.filter(q=>q.cat===c).length+")",col.bg,col.t,col.b);}).join("")}</div>
      <div class="tags">${Object.entries(TL).map(([k,v])=>badge(v,"#F1EFE8","#444","#B4B2A9")).join("")}</div>
    </div>`;
  $("#catFilter").onchange=e=>{state.filter=e.target.value;render();};
  $("#btnLearn").onclick=()=>startSession(false);
  $("#btnExam").onclick=()=>startSession(true);
}

function startSession(isExam){
  let qs=state.filter==="all"?[...Q]:Q.filter(q=>q.cat===state.filter);
  qs=shuf(qs);
  state={...state,mode:isExam?"exam":"learn",qs,idx:0,ans:{},exam:isExam,t0:Date.now()};
  if(state.timer)clearInterval(state.timer);
  if(isExam){state.timer=setInterval(()=>{const el=$("#timer");if(el){const d=Date.now()-state.t0,m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);el.textContent=m+":"+String(s).padStart(2,"0");}},1000);}
  render();
}

function renderQuestion(el){
  const q=state.qs[state.idx],col=CC[q.cat],total=state.qs.length,done=state.idx in state.ans;
  const pct=((state.idx+1)/total*100).toFixed(1);
  el.innerHTML=`
    <div class="nav">
      <button class="nav-back" id="navMenu">← Menü</button>
      <div class="nav-info">${!state.exam?'<button class="btn" id="ovBtn" style="padding:4px 12px;font-size:11px;border-radius:6px;">Übersicht</button>':''}${state.exam?'<span class="timer" id="timer">0:00</span>':""}<span>${state.idx+1}/${total}</span></div>
    </div>
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:#3B7BE8"></div></div>
    <div class="tags" style="margin-bottom:10px">${badge(TL[q.type],"#F1EFE8","#444","#B4B2A9")} ${badge(q.cat,col.bg,col.t,col.b)}</div>
    <h2 style="font-size:15px;font-weight:500;line-height:1.5;margin-bottom:14px">${q.q}</h2>
    <div id="qBody"></div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn" id="prevBtn" ${state.idx===0?"disabled":""}>← Zurück</button>
      <button class="btn btn-primary" id="nextBtn" ${!done?"disabled":""}>${state.idx===total-1&&state.exam?"Auswerten":"Weiter →"}</button>
    </div>`;
  $("#navMenu").onclick=()=>{clearInterval(state.timer);state.mode="menu";render();};
  const ovb=$("#ovBtn");if(ovb)ovb.onclick=()=>{state.mode="overview";render();};
  $("#prevBtn").onclick=()=>{if(state.idx>0){state.idx--;render();}};
  $("#nextBtn").onclick=()=>{if(state.idx<total-1){state.idx++;render();}else if(state.exam){clearInterval(state.timer);state.mode="results";render();}};
  if(q.type==="single"||q.type==="multi") renderChoice(q,done);
  else if(q.type==="order") renderOrder(q,done);
  else if(q.type==="match") renderMatch(q,done);
}

function renderChoice(q,done){
  const isM=q.type==="multi";let sel=isM?[]:-1;const body=$("#qBody");
  function draw(){
    body.innerHTML=(isM?'<p style="font-size:12px;color:#888;margin-bottom:6px">Mehrere Antworten möglich</p>':"")+
      q.opts.map((o,i)=>{const isSel=isM?sel.includes(i):sel===i;let cls="opt-btn";if(!done&&isSel)cls+=" selected";if(done){const ic=isM?q.cor.includes(i):q.cor===i;const wp=isM?sel.includes(i):sel===i;if(ic)cls+=" correct";else if(wp)cls+=" wrong";else cls+=" dimmed";}return `<button class="${cls}" data-i="${i}"><span class="indicator${isM?" multi":""}${isSel?" active":""}"></span>${o}</button>`;}).join("")+
      (!done?`<button class="btn" id="checkBtn" style="margin-top:10px" ${(isM?sel.length===0:sel===-1)?"disabled":""}>Prüfen</button>`:"")+
      (done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".opt-btn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;if(isM){sel.includes(i)?sel=sel.filter(x=>x!==i):sel.push(i);}else sel=i;draw();});const cb=body.querySelector("#checkBtn");if(cb)cb.onclick=()=>{let c;if(isM){const s=[...sel].sort(),cr=[...q.cor].sort();c=s.length===cr.length&&s.every((v,i)=>v===cr[i]);}else c=sel===q.cor;state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderOrder(q,done){
  let items=done?q._userOrder||shuf(q.items):shuf(q.items);if(!done)q._userOrder=items;const body=$("#qBody");
  function draw(){
    body.innerHTML='<p style="font-size:12px;color:#888;margin-bottom:6px">Mit Pfeilen sortieren</p>'+items.map((item,i)=>{let cls="order-item";if(done){cls+=q.items[q.corOrd[i]]===item?" correct":" wrong";}return `<div class="order-row"><div class="order-arrows"><button class="arrow-btn" data-d="up" data-i="${i}" ${done||i===0?"disabled":""}>▲</button><button class="arrow-btn" data-d="dn" data-i="${i}" ${done||i===items.length-1?"disabled":""}>▼</button></div><div class="${cls}"><span class="order-num">${i+1}</span>${item}</div></div>`;}).join("")+(!done?'<button class="btn" id="checkBtn" style="margin-top:8px">Prüfen</button>':"")+(done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".arrow-btn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i,d=b.dataset.d==="up"?-1:1,t=i+d;if(t<0||t>=items.length)return;[items[i],items[t]]=[items[t],items[i]];q._userOrder=items;draw();});body.querySelector("#checkBtn").onclick=()=>{const c=items.every((item,i)=>q.items[q.corOrd[i]]===item);state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderMatch(q,done){
  const rights=shuf(q.pairs.map(p=>p.r));let asgn={};const body=$("#qBody");
  function draw(){
    const used=Object.values(asgn);
    body.innerHTML='<p style="font-size:12px;color:#888;margin-bottom:6px">Richtige Beschreibung zuordnen</p>'+q.pairs.map((p,i)=>{const ok=done&&asgn[i]===p.r;const cls=done?(ok?"correct":"wrong"):"";return `<div class="match-block"><div class="match-label" style="${done?"color:"+(ok?"#1D9E75":"#E24B4A"):""}">${p.l} ${done?(ok?"✓":"✗"):""}</div><select class="match-select ${cls}" data-i="${i}" ${done?"disabled":""}><option value="">— Bitte wählen —</option>${rights.map(r=>`<option value="${r}" ${asgn[i]===r?"selected":""} ${used.includes(r)&&asgn[i]!==r?"disabled":""}>${r}</option>`).join("")}</select>${done&&!ok?`<div class="match-hint">→ ${p.r}</div>`:""}</div>`;}).join("")+(!done?`<button class="btn" id="checkBtn" style="margin-top:8px" ${Object.keys(asgn).length<q.pairs.length?"disabled":""}>Prüfen</button>`:"")+(done?`<div class="feedback ${state.ans[state.idx]?"ok":"fail"}">${state.ans[state.idx]?"Richtig!":"Falsch."} ${q.exp}</div>`:"");
    if(!done){body.querySelectorAll(".match-select").forEach(s=>s.onchange=()=>{const i=+s.dataset.i;if(s.value)asgn[i]=s.value;else delete asgn[i];draw();});const cb=body.querySelector("#checkBtn");if(cb)cb.onclick=()=>{const c=q.pairs.every((p,i)=>asgn[i]===p.r);state.ans[state.idx]=c;done=true;draw();$("#nextBtn").disabled=false;};}
  }draw();
}

function renderOverview(el){
  const total=state.qs.length,answered=Object.keys(state.ans).length,score=Object.values(state.ans).filter(Boolean).length,wrong=answered-score,open=total-answered,pct=answered>0?Math.round(score/answered*100):0;
  const catGroups={};state.qs.forEach((q,i)=>{if(!catGroups[q.cat])catGroups[q.cat]=[];catGroups[q.cat].push({q,i});});
  let catHTML=Object.entries(catGroups).map(([cat,items])=>{const cl=CC[cat];const ca=items.filter(x=>x.i in state.ans).length;const cc=items.filter(x=>state.ans[x.i]===true).length;const cp=ca>0?Math.round(cc/ca*100):0;
    return `<div class="ov-cat"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px">${badge(cat,cl.bg,cl.t,cl.b)}<span style="font-size:12px;color:#888">${cc}/${items.length}</span></div>${ca>0?`<span style="font-size:12px;font-weight:500;color:${cp>=80?"#1D9E75":cp>=50?"#EF9F27":"#E24B4A"}">${cp}%</span>`:'<span style="font-size:12px;color:#ccc">—</span>'}</div><div class="ov-grid">${items.map(({q,i})=>{const d=i in state.ans;const cls=d?(state.ans[i]?"ok":"fail"):"";const cur=i===state.idx?"current":"";return `<button class="ov-dot ${cls} ${cur}" data-i="${i}" title="${q.q.substring(0,60)}">${i+1}</button>`;}).join("")}</div>${ca>0?`<div style="height:3px;border-radius:2px;background:#e8e6e1;overflow:hidden;margin-top:4px"><div style="height:100%;width:${items.length>0?(cc/items.length*100):0}%;background:${cl.b};border-radius:2px"></div></div>`:''}</div>`;
  }).join("");
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:20px;font-weight:600">Übersicht</h1><button class="btn" id="ovBack" style="padding:5px 14px;font-size:12px">← Weiterlernen</button></div>
    <div class="ov-stats"><div class="ov-stat"><div class="ov-stat-val" style="color:#1D9E75">${score}</div><div class="ov-stat-lbl">Richtig</div></div><div class="ov-stat"><div class="ov-stat-val" style="color:#E24B4A">${wrong}</div><div class="ov-stat-lbl">Falsch</div></div><div class="ov-stat"><div class="ov-stat-val" style="color:#888">${open}</div><div class="ov-stat-lbl">Offen</div></div></div>
    ${answered>0?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:12px 14px;border-radius:10px;background:#fff;border:1.5px solid #e8e6e1"><div style="position:relative;width:48px;height:48px;flex-shrink:0"><svg width="48" height="48" style="transform:rotate(-90deg)"><circle cx="24" cy="24" r="20" fill="none" stroke="#e8e6e1" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A"}" stroke-width="4" stroke-dasharray="${2*3.14159*20}" stroke-dashoffset="${2*3.14159*20-(pct/100)*2*3.14159*20}" stroke-linecap="round"/></svg><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:600">${pct}%</span></div><div><div style="font-size:13px;font-weight:500">${score} von ${answered} richtig</div><div style="font-size:11px;color:#888">${open} Fragen offen</div></div></div>`:''}
    <div class="ov-legend"><span><span class="ov-legend-dot" style="background:#1D9E75"></span>Richtig</span><span><span class="ov-legend-dot" style="background:#E24B4A"></span>Falsch</span><span><span class="ov-legend-dot" style="background:#e8e6e1"></span>Offen</span><span><span class="ov-legend-dot" style="background:transparent;border:2px solid #3B7BE8;width:8px;height:8px"></span>Aktuell</span></div>
    ${catHTML}
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn" id="ovMenu" style="flex:1">Menü</button>${wrong>0?`<button class="btn btn-danger" id="ovRetry" style="flex:1">Nur Fehler (${wrong})</button>`:''}</div>`;
  $("#ovBack").onclick=()=>{state.mode="learn";render();};
  $("#ovMenu").onclick=()=>{state.mode="menu";render();};
  const rw=$("#ovRetry");if(rw)rw.onclick=()=>{const wqs=Object.entries(state.ans).filter(([k,v])=>!v).map(([k])=>state.qs[+k]);state.qs=shuf(wqs);state.idx=0;state.ans={};state.mode="learn";render();};
  el.querySelectorAll(".ov-dot").forEach(d=>d.onclick=()=>{state.idx=+d.dataset.i;state.mode="learn";render();});
}

function renderResults(el){
  const score=Object.values(state.ans).filter(Boolean).length,total=state.qs.length,pct=total?Math.round(score/total*100):0;
  const d=Date.now()-state.t0,m=Math.floor(d/60000),s=Math.floor((d%60000)/1000);
  const col=pct>=80?"#1D9E75":pct>=50?"#EF9F27":"#E24B4A";const r=37,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  let catHTML=CATS.filter(c=>state.qs.some(q=>q.cat===c)).map(c=>{const cq=state.qs.map((q,i)=>({q,i})).filter(x=>x.q.cat===c);const cs=cq.filter(x=>state.ans[x.i]).length;const cl=CC[c];return `<div class="cat-bar"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">${badge(c,cl.bg,cl.t,cl.b)}<span style="font-size:12px;color:#888">${cs}/${cq.length}</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${cq.length?(cs/cq.length*100):0}%;background:${cl.b}"></div></div></div>`;}).join("");
  el.innerHTML=`
    <div style="text-align:center;margin-bottom:22px"><h1 style="font-size:22px;font-weight:600;margin-bottom:4px">Ergebnis</h1><p style="font-size:13px;color:#888">${m}:${String(s).padStart(2,"0")} Minuten</p></div>
    <div style="display:flex;justify-content:center;align-items:center;gap:18px;margin-bottom:24px"><div class="result-ring"><svg width="80" height="80"><circle cx="40" cy="40" r="${r}" fill="none" stroke="#e8e6e1" stroke-width="5"/><circle cx="40" cy="40" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg><div class="result-pct">${pct}%</div></div><div><div style="font-size:24px;font-weight:600">${score}/${total}</div><div style="font-size:12px;color:#888">richtig</div></div></div>
    ${catHTML}
    <div style="display:flex;gap:10px;margin-top:18px"><button class="btn" id="backMenu" style="flex:1">Menü</button><button class="btn btn-primary" id="retry" style="flex:1">Nochmal</button></div>`;
  $("#backMenu").onclick=()=>{state.mode="menu";render();};
  $("#retry").onclick=()=>startSession(true);
}

render();


// PWA: Register inline service worker for offline support
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='infor-ln-v1';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
          if(e.request.method==='GET'&&resp.ok){
            const c=resp.clone();
            caches.open(CACHE).then(cache=>cache.put(e.request,c));
          }
          return resp;
        }).catch(()=>caches.match('./')))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// PWA: Install prompt handler
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  const btn=document.getElementById('installBtn');
  if(btn)btn.style.display='inline-block';
});
window.installApp=function(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const btn=document.getElementById('installBtn');if(btn)btn.style.display='none';});
  }
};

</script>
</body>
</html>
